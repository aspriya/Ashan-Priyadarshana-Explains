// SLIDE 18 — Timeline
function initTimeline(){
  const canvas = document.getElementById('timelineCanvas');
  if(!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const resize = ()=>{
    const r = canvas.getBoundingClientRect();
    canvas.width = r.width * dpr;
    canvas.height = r.height * dpr;
  };
  resize();
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = canvas.width/dpr, H = canvas.height/dpr;

  const events = [
    {y:2020, label:'GPT-3', cap:0.05, color:'#64748B'},
    {y:2021, label:'Codex', cap:0.10, color:'#64748B'},
    {y:2022, label:'ChatGPT', cap:0.20, color:'#4C9BE8'},
    {y:2023, label:'GPT-4 + plugins', cap:0.35, color:'#4C9BE8'},
    {y:2023.5, label:'AutoGPT', cap:0.30, color:'#8B5CF6'},
    {y:2024, label:'Devin · Computer Use · MCP', cap:0.65, color:'#F97316'},
    {y:2025, label:'Multi-agent · A2A', cap:0.85, color:'#00D4AA'},
    {y:2026, label:'???', cap:0.95, color:'#00D4AA'}
  ];

  ctx.clearRect(0,0,W,H);
  // Axis
  const padL = 50, padR = 40, padT = 40, padB = 60;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const yMin = 2020, yMax = 2026;

  // Title
  ctx.fillStyle = '#F0F4F8';
  ctx.font = 'bold 13px Space Grotesk';
  ctx.textAlign = 'left';
  ctx.fillText('Agent Capability Over Time', padL, 22);
  ctx.fillStyle = '#64748B';
  ctx.font = '10px Space Grotesk';
  ctx.fillText('Approximate normalized capability ↑', padL, 36);

  // Y axis line
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padL, padT);
  ctx.lineTo(padL, H - padB);
  ctx.lineTo(W - padR, H - padB);
  ctx.stroke();

  // Y ticks
  ctx.fillStyle = '#64748B';
  ctx.font = '9px JetBrains Mono';
  ctx.textAlign = 'right';
  [0, 0.25, 0.5, 0.75, 1].forEach(v=>{
    const y = H - padB - v * plotH;
    ctx.fillText((v*100).toFixed(0), padL - 8, y + 3);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(W - padR, y);
    ctx.stroke();
  });

  // X ticks
  ctx.textAlign = 'center';
  for(let yr = 2020; yr <= 2026; yr++){
    const x = padL + ((yr - yMin) / (yMax - yMin)) * plotW;
    ctx.fillStyle = '#64748B';
    ctx.fillText(yr, x, H - padB + 14);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.moveTo(x, padT);
    ctx.lineTo(x, H - padB);
    ctx.stroke();
  }

  // Curve through points (simple bezier-ish)
  ctx.strokeStyle = '#00D4AA';
  ctx.lineWidth = 2;
  ctx.beginPath();
  events.forEach((e, i)=>{
    const x = padL + ((e.y - yMin) / (yMax - yMin)) * plotW;
    const y = H - padB - e.cap * plotH;
    if(i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Points + labels
  events.forEach((e, i)=>{
    const x = padL + ((e.y - yMin) / (yMax - yMin)) * plotW;
    const y = H - padB - e.cap * plotH;
    ctx.fillStyle = e.color;
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Label - alternate above/below
    ctx.fillStyle = '#F0F4F8';
    ctx.font = '10px JetBrains Mono';
    const above = i % 2 === 0;
    ctx.textAlign = i === events.length - 1 ? 'right' : 'left';
    const offY = above ? -10 : 18;
    ctx.fillText(e.label, x + (i === events.length - 1 ? -8 : 8), y + offY);
  });
}

  dot.title = `${i+1}. ${s.label}`;
  dot.onclick = ()=>goTo(i);
  navDots.appendChild(dot);
});

function goTo(idx){
  if(idx < 0 || idx >= SLIDES.length || idx === currentSlide) return;
  // Cancel animations
  if(reactState.raf) cancelAnimationFrame(reactState.raf);
  if(evalChartInstance){ try{ evalChartInstance.destroy(); }catch(e){} evalChartInstance = null; }

  const slides = deck.querySelectorAll('.slide');
  slides[currentSlide].classList.remove('active');
  slides[currentSlide].classList.add('prev');
  setTimeout(()=>slides[currentSlide].classList.remove('prev'), 500);

  currentSlide = idx;
  slides[currentSlide].classList.add('active');

  // Nav
  document.querySelectorAll('.nav-dot').forEach((d, i)=>d.classList.toggle('active', i === currentSlide));
  navLabel.textContent = `Slide ${currentSlide + 1} / ${SLIDES.length} · ${SLIDES[currentSlide].label}`;
  progressBar.style.width = `${((currentSlide + 1) / SLIDES.length) * 100}%`;
  prevBtn.disabled = currentSlide === 0;
  nextBtn.disabled = currentSlide === SLIDES.length - 1;

  // Initialize slide
  setTimeout(()=>{
    try {
      if(SLIDES[currentSlide].init) SLIDES[currentSlide].init();
    } catch(e) {
      console.error('Init error for slide', currentSlide, e);
    }
  }, 50);
}

prevBtn.onclick = ()=>goTo(currentSlide - 1);
nextBtn.onclick = ()=>goTo(currentSlide + 1);

document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowLeft' || e.key === 'PageUp'){ e.preventDefault(); goTo(currentSlide - 1); }
  if(e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' '){
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    e.preventDefault(); goTo(currentSlide + 1);
  }
  if(e.key === 'Home'){ e.preventDefault(); goTo(0); }
  if(e.key === 'End'){ e.preventDefault(); goTo(SLIDES.length - 1); }
});

// Initialize first slide
progressBar.style.width = `${(1 / SLIDES.length) * 100}%`;
navLabel.textContent = `Slide 1 / ${SLIDES.length} · ${SLIDES[0].label}`;
prevBtn.disabled = true;
setTimeout(()=>{
  try { if(SLIDES[0].init) SLIDES[0].init(); } catch(e) { console.error(e); }
}, 100);

// Resize handler — reinitialize current slide for canvas-heavy slides
let resizeTimer;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{
    try { if(SLIDES[currentSlide].init) SLIDES[currentSlide].init(); } catch(e){}
  }, 250);
});

</script>
</body>
</html>
