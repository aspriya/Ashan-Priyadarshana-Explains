<style>
:root{--navy:#0D1B2A;--navy2:#1A2B3C;--navy3:#243447;--teal:#00D4AA;--teal2:#00A882;--blue:#4C9BE8;--purple:#8B5CF6;--amber:#F59E0B;--red:#EF4444;--orange:#F97316;--green:#10B981;--white:#F0F4F8;--muted:#A8B5C7;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--navy);color:var(--white);font-family:'Space Grotesk',sans-serif;-webkit-font-smoothing:antialiased;}
body{background:radial-gradient(ellipse at top left,rgba(0,212,170,0.08),transparent 50%),radial-gradient(ellipse at bottom right,rgba(76,155,232,0.08),transparent 50%),var(--navy);}
.progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--blue));z-index:100;transition:width 0.4s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 10px rgba(0,212,170,0.5);}
.deck{position:fixed;inset:0;bottom:64px;overflow:hidden;}
.slide{position:absolute;inset:0;padding:48px 56px 16px;opacity:0;transform:translateX(40px);transition:opacity 0.5s cubic-bezier(0.4,0,0.2,1),transform 0.5s cubic-bezier(0.4,0,0.2,1);pointer-events:none;overflow:hidden;display:flex;flex-direction:column;}
.slide.active{opacity:1;transform:translateX(0);pointer-events:auto;}
.slide.prev{transform:translateX(-40px);}
.nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(13,27,42,0.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:90;}
.nav-dots{display:flex;gap:5px;flex-wrap:wrap;max-width:50%;}
.nav-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.15);cursor:pointer;transition:all 0.2s;}
.nav-dot:hover{background:rgba(255,255,255,0.3);}
.nav-dot.active{background:var(--teal);width:22px;border-radius:4px;box-shadow:0 0 8px rgba(0,212,170,0.6);}
.nav-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;font-weight:500;}
.nav-credit{font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:center;font-family:'Fraunces',serif;font-style:italic;padding:0 12px;border-left:1px solid var(--border);}
.nav-credit-by{font-size:9.5px;text-transform:uppercase;letter-spacing:0.18em;font-style:normal;font-family:'JetBrains Mono',monospace;color:var(--teal);font-weight:600;}
.nav-credit-name{color:var(--white);font-weight:500;}
.nav-buttons{display:flex;gap:8px;}
.nav-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--white);padding:8px 18px;border-radius:8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;transition:all 0.2s;min-width:70px;min-height:36px;}
.nav-btn:hover{background:rgba(0,212,170,0.15);border-color:var(--teal);color:var(--teal);}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.02em;}
.italic{font-style:italic;}
code,.mono{font-family:'JetBrains Mono',monospace;}
.section-tag{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:var(--teal);font-weight:600;padding:4px 10px;background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.2);border-radius:4px;margin-bottom:12px;}
.slide-title{font-size:36px;line-height:1.1;margin-bottom:6px;color:var(--white);}
.slide-subtitle{font-size:16px;color:var(--muted);font-weight:400;margin-bottom:18px;}
.title-slide{justify-content:center;align-items:center;text-align:center;padding:64px;}
#titleCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;opacity:0.55;}
.title-content{position:relative;z-index:1;max-width:900px;}
.week-badge{display:inline-flex;align-items:center;gap:12px;font-size:12px;text-transform:uppercase;letter-spacing:0.3em;color:var(--teal);margin-bottom:24px;font-weight:600;}
.week-badge::before,.week-badge::after{content:'';width:28px;height:1px;background:var(--teal);}
.title-main{font-family:'Fraunces',serif;font-size:clamp(48px,7vw,86px);line-height:0.98;margin-bottom:20px;font-weight:600;}
.title-main .italic{color:var(--teal);font-style:italic;font-weight:500;}
.title-tagline{font-size:17px;color:var(--muted);max-width:600px;margin:0 auto 32px;line-height:1.6;}
.topic-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:760px;margin:0 auto;}
.presenter-block{margin-top:48px;padding-top:24px;border-top:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:4px;}
.presenter-label{font-size:11px;text-transform:uppercase;letter-spacing:0.32em;color:var(--teal);font-weight:600;}
.presenter-name{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--white);letter-spacing:-0.01em;margin-top:4px;}
.presenter-channel{font-size:13px;color:var(--muted);font-style:italic;font-family:'Fraunces',serif;margin-top:2px;}
.pill{padding:6px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:999px;font-size:12px;color:var(--white);font-family:'JetBrains Mono',monospace;}
.pill.t{color:var(--teal);border-color:rgba(0,212,170,0.3);}
.pill.b{color:var(--blue);border-color:rgba(76,155,232,0.3);}
.pill.p{color:var(--purple);border-color:rgba(139,92,246,0.3);}
.pill.a{color:var(--amber);border-color:rgba(245,158,11,0.3);}
.pill.o{color:var(--orange);border-color:rgba(249,115,22,0.3);}
.pill.g{color:var(--green);border-color:rgba(16,185,129,0.3);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0;}
.col{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;display:flex;flex-direction:column;overflow:hidden;}
.col-title{font-size:12px;text-transform:uppercase;letter-spacing:0.18em;color:var(--muted);margin-bottom:14px;font-weight:600;}
.spectrum-positions{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:6px;}
.spec-pos{text-align:center;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;transition:color 0.3s;cursor:pointer;line-height:1.3;}
.spec-pos.active{color:var(--teal);font-weight:600;}
.spectrum-track{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;position:relative;margin:8px 0 18px;cursor:pointer;}
.spectrum-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));border-radius:4px;transition:width 0.4s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 14px rgba(0,212,170,0.4);}
.spectrum-thumb{position:absolute;top:50%;width:20px;height:20px;background:var(--white);border:3px solid var(--teal);border-radius:50%;transform:translate(-50%,-50%);cursor:grab;transition:left 0.4s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 16px rgba(0,212,170,0.6);}
.spec-desc{background:rgba(0,212,170,0.06);border:1px solid rgba(0,212,170,0.18);border-radius:10px;padding:14px;margin-top:4px;}
.spec-desc-title{font-family:'Fraunces',serif;font-size:18px;color:var(--teal);margin-bottom:6px;font-style:italic;}
.spec-desc-body{font-size:15.5px;color:var(--white);line-height:1.6;}
.property-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.prop-card{padding:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;transition:all 0.3s;opacity:0.4;}
.prop-card.lit{opacity:1;background:rgba(76,155,232,0.08);border-color:rgba(76,155,232,0.3);}
.prop-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--blue);margin-bottom:3px;}
.prop-name{font-family:'Fraunces',serif;font-size:17px;margin-bottom:3px;}
.prop-desc{font-size:15px;color:var(--muted);line-height:1.6;}
.callout{background:linear-gradient(135deg,rgba(0,212,170,0.08),rgba(76,155,232,0.08));border:1px solid rgba(0,212,170,0.25);border-radius:10px;padding:13px 15px;font-size:15.5px;color:var(--white);line-height:1.6;margin-top:12px;}
.callout strong{color:var(--teal);}
.react-wrap{display:grid;grid-template-columns:1fr 300px;gap:18px;flex:1;min-height:0;}
.react-canvas-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;display:flex;flex-direction:column;}
#reactCanvas{flex:1;width:100%;min-height:240px;}
.react-step-display{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:13.5px;line-height:1.6;min-height:70px;color:var(--white);white-space:pre-wrap;overflow-y:auto;max-height:120px;}
.react-step-label{font-family:'Space Grotesk',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.2em;margin-bottom:4px;font-weight:600;}
.react-controls{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap;}
.mini-btn{background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);color:var(--teal);padding:5px 11px;border-radius:6px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:500;transition:all 0.2s;min-height:30px;}
.mini-btn:hover{background:rgba(0,212,170,0.2);border-color:var(--teal);}
.complexity-control{display:flex;gap:6px;align-items:center;margin-left:auto;font-size:11px;color:var(--muted);}
.complexity-buttons{display:flex;gap:3px;}
.cx-btn{width:24px;height:24px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--white);border-radius:4px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;transition:all 0.2s;}
.cx-btn.active{background:var(--blue);border-color:var(--blue);color:var(--white);}
.react-sidebar{display:flex;flex-direction:column;gap:10px;overflow-y:auto;}
.side-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:11px 13px;}
.side-card-title{font-family:'Fraunces',serif;font-style:italic;font-size:17px;color:var(--teal);margin-bottom:5px;}
.side-card-body{font-size:15.5px;color:var(--white);line-height:1.6;opacity:0.9;}
.memory-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:12px;flex:1;min-height:0;}
.mem-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;display:flex;flex-direction:column;}
.mem-card:hover{background:rgba(255,255,255,0.06);}
.mem-card.expanded{background:rgba(0,212,170,0.05);border-color:rgba(0,212,170,0.3);}
.mem-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.mem-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.1em;}
.mem-icon{font-size:18px;}
.mem-name{font-family:'Fraunces',serif;font-size:17px;margin-bottom:3px;}
.mem-tag{display:inline-block;font-size:10px;color:var(--blue);background:rgba(76,155,232,0.1);padding:2px 8px;border-radius:999px;margin-bottom:8px;font-family:'JetBrains Mono',monospace;align-self:flex-start;}
.mem-detail{font-size:15px;color:var(--white);line-height:1.6;opacity:0.9;flex:1;overflow:hidden;}
.mem-detail-row{margin-bottom:4px;}
.mem-detail-row strong{color:var(--teal);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;margin-right:6px;}
.mem-visual{margin-top:8px;height:24px;background:rgba(0,0,0,0.25);border-radius:5px;position:relative;overflow:hidden;}
.tool-wrap{display:grid;grid-template-columns:280px 1fr;gap:18px;flex:1;min-height:0;}
.tool-cat{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:5px;cursor:pointer;transition:all 0.2s;}
.tool-cat:hover{background:rgba(255,255,255,0.06);}
.tool-cat-head{display:flex;justify-content:space-between;align-items:center;}
.tool-cat-name{font-family:'Fraunces',serif;font-size:14.5px;color:var(--white);}
.tool-cat-tag{font-size:10px;color:var(--blue);background:rgba(76,155,232,0.1);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;}
.tool-cat-list{font-size:11.5px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace;line-height:1.5;display:none;}
.tool-cat.open .tool-cat-list{display:block;}
.tool-controls{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.tool-select{background:rgba(0,0,0,0.3);border:1px solid var(--border);color:var(--white);padding:6px 9px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12.5px;}
.tool-input{flex:1;min-width:120px;background:rgba(0,0,0,0.3);border:1px solid var(--border);color:var(--white);padding:6px 9px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12.5px;}
.tool-output{background:#000;border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:13.5px;line-height:1.65;flex:1;overflow-y:auto;}
.tool-line{margin-bottom:3px;}
.tool-line.req{color:var(--blue);}
.tool-line.spin{color:var(--amber);}
.tool-line.res{color:var(--teal);}
.tool-line.inj{color:var(--purple);}
.tool-def-card{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.55;color:var(--muted);white-space:pre;overflow-x:auto;}
.tool-def-card .k{color:var(--teal);}
.tool-def-card .v{color:var(--amber);}
.tool-def-card .com{color:var(--muted);}
.mcp-wrap{display:grid;grid-template-columns:1fr 1fr;gap:18px;flex:1;min-height:0;}
.mcp-arch{display:flex;flex-direction:column;gap:6px;}
.mcp-layer{padding:11px;border-radius:10px;text-align:center;cursor:pointer;transition:all 0.2s;border:2px solid transparent;}
.mcp-layer.host{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3);}
.mcp-layer.client{background:rgba(76,155,232,0.08);border-color:rgba(76,155,232,0.3);}
.mcp-layer.server{background:rgba(139,92,246,0.08);border-color:rgba(139,92,246,0.3);}
.mcp-layer:hover{filter:brightness(1.3);}
.mcp-layer-name{font-family:'Fraunces',serif;font-size:15.5px;margin-bottom:2px;}
.mcp-layer-desc{font-size:12px;color:var(--muted);}
.mcp-arrow{text-align:center;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:12px;}
.mcp-detail{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-size:14.5px;line-height:1.6;color:var(--white);min-height:60px;}
.mcp-detail strong{color:var(--teal);}
.mcp-servers{display:flex;gap:6px;overflow-x:auto;padding:5px 2px;}
.mcp-srv{flex-shrink:0;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--white);white-space:nowrap;}
.analogy-card{background:linear-gradient(135deg,rgba(245,158,11,0.08),rgba(249,115,22,0.08));border:1px solid rgba(245,158,11,0.25);border-radius:10px;padding:11px 13px;font-size:15px;color:var(--white);line-height:1.6;}
.analogy-card strong{color:var(--amber);}
.nm-prob{display:flex;justify-content:space-around;align-items:center;background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:8px;font-family:'JetBrains Mono',monospace;font-size:11px;}
.nm-arr{color:var(--red);font-size:16px;}
.code-block{background:#000;border:1px solid var(--border);border-radius:6px;padding:9px;font-family:'JetBrains Mono',monospace;font-size:10.5px;line-height:1.6;color:var(--teal);overflow-x:auto;margin-top:6px;white-space:pre;}
.code-block .kw{color:var(--purple);}
.code-block .str{color:var(--amber);}
.code-block .com{color:var(--muted);}
.code-block .fn{color:var(--blue);}
.arch-tabs{display:flex;gap:6px;margin-bottom:12px;}
.arch-tab{flex:1;padding:8px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;cursor:pointer;text-align:center;font-size:12px;transition:all 0.2s;}
.arch-tab.active{background:rgba(0,212,170,0.1);border-color:var(--teal);color:var(--teal);}
.arch-display{display:grid;grid-template-columns:1fr 320px;gap:14px;flex:1;min-height:0;}
.arch-canvas-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;}
#archCanvas{flex:1;width:100%;min-height:200px;}
.arch-info{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.arch-info-title{font-family:'Fraunces',serif;font-size:20px;color:var(--teal);}
.arch-info-body{font-size:15.5px;color:var(--white);line-height:1.65;}
.arch-info-body strong{color:var(--blue);}
.ct{width:100%;border-collapse:collapse;font-size:14px;margin-top:6px;}
.ct th,.ct td{padding:5px 8px;text-align:left;border-bottom:1px solid var(--border);}
.ct th{font-weight:500;color:var(--teal);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;}
.ct td{color:var(--white);}
.ct td:first-child{color:var(--muted);font-weight:500;}
.break-slide{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:stretch;flex:1;min-height:0;}
.break-half{padding:28px;border-radius:14px;border:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;}
.break-done{background:linear-gradient(135deg,rgba(0,212,170,0.06),transparent);border-color:rgba(0,212,170,0.2);}
.break-next{background:linear-gradient(135deg,rgba(76,155,232,0.06),transparent);border-color:rgba(76,155,232,0.2);}
.break-label{font-size:10px;text-transform:uppercase;letter-spacing:0.25em;font-weight:600;margin-bottom:14px;}
.break-done .break-label{color:var(--teal);}
.break-next .break-label{color:var(--blue);}
.break-headline{font-family:'Fraunces',serif;font-size:26px;line-height:1.15;margin-bottom:14px;}
.break-list{list-style:none;}
.break-list li{padding:8px 0;font-size:16.5px;color:var(--white);line-height:1.6;display:flex;gap:8px;}
.break-list li::before{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-weight:600;}
.break-done .break-list li::before{content:'✓';color:var(--teal);}
.break-next .break-list li::before{content:'→';color:var(--blue);}
.matrix-table{width:100%;border-collapse:collapse;font-size:15.5px;margin-bottom:10px;}
.matrix-table th,.matrix-table td{padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}
.matrix-table th{font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);}
.matrix-table th.eng{color:var(--teal);}
.matrix-table tr td:first-child{color:var(--blue);font-weight:500;font-family:'Fraunces',serif;font-style:italic;}
.matrix-table tr td:nth-child(2){color:var(--muted);}
.matrix-table tr td:nth-child(3){color:var(--white);}
.complexity-bar{display:flex;flex-direction:column;gap:4px;}
.clx-row{display:grid;grid-template-columns:50px 1fr;gap:8px;align-items:center;padding:8px 12px;border-radius:6px;background:rgba(255,255,255,0.03);font-size:15px;transition:all 0.2s;}
.clx-row:hover{background:rgba(255,255,255,0.06);}
.clx-lvl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--teal);font-weight:600;}
.clx-desc{color:var(--white);}
.clx-row[data-l="6"]{background:rgba(0,212,170,0.06);border:1px solid rgba(0,212,170,0.2);}
.devin-wrap{display:grid;grid-template-columns:1fr 320px;gap:18px;flex:1;min-height:0;}
.devin-canvas-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;min-height:0;}
.devin-diagram{position:relative;flex:1;min-height:260px;width:100%;}
.devin-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.devin-svg line{stroke:rgba(255,255,255,0.18);stroke-width:0.25;}
.devin-node{position:absolute;transform:translate(-50%,-50%);background:rgba(255,255,255,0.04);border:1.5px solid;border-radius:10px;padding:10px 18px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap;z-index:1;}
.devin-node:hover{background:rgba(255,255,255,0.1);transform:translate(-50%,-50%) scale(1.05);box-shadow:0 6px 18px rgba(0,0,0,0.3);}
.devin-node.active{background:rgba(255,255,255,0.14);border-width:2.5px;font-weight:700;box-shadow:0 0 0 4px rgba(255,255,255,0.06);}
.devin-detail{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:15px;line-height:1.6;color:var(--white);margin-top:12px;min-height:64px;flex-shrink:0;}
.devin-detail strong{color:var(--orange);}
.devin-cards{display:flex;flex-direction:column;gap:7px;overflow-y:auto;}
.devin-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:9px 11px;}
.devin-card-name{font-family:'Fraunces',serif;font-size:15.5px;color:var(--orange);font-style:italic;margin-bottom:3px;}
.devin-card-body{font-size:14.5px;color:var(--white);line-height:1.6;opacity:0.9;}
.trace-wrap{display:grid;grid-template-columns:1fr 1fr 280px;gap:14px;flex:1;min-height:0;}
.trace-col{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;overflow:hidden;}
.trace-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.trace-name{font-family:'Fraunces',serif;font-size:16px;}
.trace-name.a{color:var(--teal);}
.trace-name.b{color:var(--orange);}
.trace-meta{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.trace-list{flex:1;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.6;}
.trace-step{padding:5px 8px;border-left:2px solid var(--border);margin-bottom:3px;color:var(--muted);transition:all 0.3s;opacity:0.4;}
.trace-step.shown{opacity:1;color:var(--white);border-left-color:var(--teal);background:rgba(0,212,170,0.04);}
.trace-step.b.shown{border-left-color:var(--orange);background:rgba(249,115,22,0.04);}
.trace-step.debug.shown{border-left-color:var(--amber);background:rgba(245,158,11,0.08);}
.trace-controls{display:flex;gap:6px;margin-top:8px;}
.eco-wrap{display:flex;flex-direction:column;gap:12px;flex:1;min-height:0;}
.eco-quad{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;position:relative;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:34px 14px 14px 28px;min-height:0;}
.eco-axis-x{position:absolute;top:6px;left:0;right:0;text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);font-weight:600;}
.eco-axis-y{position:absolute;top:50%;left:8px;font-size:9px;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);font-weight:600;white-space:nowrap;writing-mode:vertical-rl;transform:rotate(180deg);}
.eco-cell{background:rgba(255,255,255,0.02);border:1px dashed var(--border);border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.eco-cell-head{font-size:9.5px;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);margin-bottom:8px;flex-shrink:0;}
.eco-tools{display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start;flex-shrink:0;}
.eco-cell-detail{flex:1;min-height:0;margin-top:10px;padding:10px 12px;background:rgba(0,0,0,0.28);border:1px solid var(--border);border-radius:8px;font-size:14px;line-height:1.55;color:var(--white);overflow-y:auto;opacity:0;transition:opacity 0.2s;}
.eco-cell-detail.shown{opacity:1;}
.eco-cell-detail strong{color:var(--teal);}
.eco-cell-detail.b strong{color:var(--blue);}
.eco-cell-detail.o strong{color:var(--orange);}
.eco-cell-detail.p strong{color:var(--purple);}
.eco-tool{padding:3px 9px;background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.25);border-radius:999px;font-size:12px;color:var(--teal);cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all 0.2s;}
.eco-tool.b{background:rgba(76,155,232,0.08);border-color:rgba(76,155,232,0.25);color:var(--blue);}
.eco-tool.p{background:rgba(139,92,246,0.08);border-color:rgba(139,92,246,0.25);color:var(--purple);}
.eco-tool.o{background:rgba(249,115,22,0.08);border-color:rgba(249,115,22,0.25);color:var(--orange);}
.eco-tool.active{background:rgba(255,255,255,0.15);transform:scale(1.05);}
.eco-detail{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:15px;color:var(--white);line-height:1.6;min-height:46px;}
.eco-detail strong{color:var(--teal);}
.eco-perspective{background:linear-gradient(135deg,rgba(245,158,11,0.06),rgba(249,115,22,0.06));border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:11px 14px;font-size:15px;line-height:1.6;}
.eco-perspective strong{color:var(--amber);}
.adk-wrap{display:grid;grid-template-columns:1fr 1fr;gap:18px;flex:1;min-height:0;}
.adk-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.adk-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all 0.2s;}
.adk-card:hover{background:rgba(0,212,170,0.06);border-color:rgba(0,212,170,0.25);}
.adk-card.active{background:rgba(0,212,170,0.08);border-color:var(--teal);}
.adk-card-num{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--teal);margin-bottom:3px;}
.adk-card-name{font-family:'Fraunces',serif;font-size:15.5px;font-style:italic;margin-bottom:3px;}
.adk-card-desc{font-size:14px;color:var(--muted);line-height:1.55;}
.anatomy-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:12px;flex:1;min-height:0;}
.anat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all 0.3s;display:flex;flex-direction:column;overflow:hidden;}
.anat-card:hover{background:rgba(255,255,255,0.06);}
.anat-card.expanded{background:rgba(0,212,170,0.04);border-color:rgba(0,212,170,0.3);}
.anat-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.anat-name{font-family:'Fraunces',serif;font-size:19px;}
.anat-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--teal);}
.anat-desc{font-size:15px;color:var(--muted);margin-bottom:6px;line-height:1.6;}
.anat-code{flex:1;overflow:hidden;font-size:9.5px;}
.anat-key{margin-top:6px;font-size:14.5px;color:var(--white);line-height:1.6;font-style:italic;border-top:1px solid var(--border);padding-top:6px;}
.anat-key strong{color:var(--teal);font-style:normal;}
.walk-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1;min-height:0;}
.walk-code{background:#000;border:1px solid var(--border);border-radius:10px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:10.5px;line-height:1.55;overflow-y:auto;color:var(--white);}
.walk-line{padding:1px 4px;transition:background 0.2s;display:block;border-left:3px solid transparent;white-space:pre;}
.walk-line.active{background:rgba(0,212,170,0.12);border-left-color:var(--teal);}
.walk-line .com{color:var(--muted);}
.walk-line .kw{color:var(--purple);}
.walk-line .str{color:var(--amber);}
.walk-line .fn{color:var(--blue);}
.walk-line .var{color:var(--teal);}
.walk-side{display:flex;flex-direction:column;gap:10px;min-height:0;}
.walk-trace{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;flex:1;min-height:0;}
.walk-trace-head{font-size:10px;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);margin-bottom:8px;}
.walk-trace-content{flex:1;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.65;}
.walk-trace-line{padding:2px 0;color:var(--white);opacity:0;transition:opacity 0.3s;white-space:pre-wrap;}
.walk-trace-line.shown{opacity:1;}
.walk-trace-line.t{color:var(--teal);}
.walk-trace-line.a{color:var(--blue);}
.walk-trace-line.o{color:var(--purple);}
.walk-trace-line.ans{color:var(--amber);}
.walk-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.walk-step-info{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-left:auto;}
.walk-projects{display:flex;gap:6px;}
.walk-proj{flex:1;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:7px 9px;font-size:12px;}
.walk-proj.easy{border-color:rgba(16,185,129,0.3);}
.walk-proj.med{border-color:rgba(245,158,11,0.3);}
.walk-proj.hard{border-color:rgba(239,68,68,0.3);}
.pattern-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:10px;flex:1;min-height:0;}
.ptn-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all 0.3s;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.ptn-card:hover{background:rgba(0,212,170,0.04);}
.ptn-card.active{background:rgba(0,212,170,0.06);border-color:var(--teal);}
.ptn-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.ptn-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--teal);}
.ptn-name{font-family:'Fraunces',serif;font-size:17px;margin-bottom:4px;font-style:italic;}
.ptn-tag{display:inline-block;font-size:9px;color:var(--blue);background:rgba(76,155,232,0.1);padding:1px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;}
.ptn-desc{font-size:14.5px;color:var(--muted);line-height:1.55;margin:4px 0 8px;}
.ptn-canvas{flex:1;min-height:110px;background:rgba(0,0,0,0.25);border-radius:8px;margin:6px 0;display:flex;align-items:center;justify-content:center;padding:8px;}
.ptn-canvas svg{width:100%;height:100%;max-height:100%;display:block;}
.ptn-tradeoffs{display:none;flex-direction:column;gap:5px;margin:4px 0 8px;padding:9px 11px;background:rgba(0,212,170,0.05);border:1px solid rgba(0,212,170,0.2);border-radius:8px;font-size:13px;line-height:1.5;color:var(--white);}
.ptn-card.active .ptn-tradeoffs{display:flex;}
.ptn-card.active .ptn-desc{display:none;}
.ptn-to-row{display:flex;gap:8px;align-items:flex-start;}
.ptn-to-label{flex-shrink:0;width:42px;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;padding-top:2px;}
.ptn-to-row.when .ptn-to-label{color:var(--teal);}
.ptn-to-row.pro .ptn-to-label{color:var(--green);}
.ptn-to-row.con .ptn-to-label{color:var(--amber);}
.ptn-to-text{flex:1;color:var(--white);}
.fail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;flex:1;min-height:0;}
.fail-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;overflow:hidden;border-left:3px solid var(--amber);}
.fail-card.crit{border-left-color:var(--red);}
.fail-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
.fail-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
.fail-sev{font-size:9px;padding:1px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;background:rgba(239,68,68,0.15);color:var(--red);font-weight:600;}
.fail-sev.med{background:rgba(245,158,11,0.15);color:var(--amber);}
.fail-name{font-family:'Fraunces',serif;font-size:16.5px;margin-bottom:6px;font-style:italic;}
.fail-row{font-size:14.5px;color:var(--white);line-height:1.6;margin-bottom:5px;}
.fail-row strong{color:var(--teal);text-transform:uppercase;font-size:9px;letter-spacing:0.1em;font-weight:500;display:block;margin-bottom:2px;}
.fail-row.mit strong{color:var(--green);}
.eval-wrap{display:grid;grid-template-columns:1fr 1.1fr 1fr;gap:14px;flex:1;min-height:0;}
.eval-col{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;overflow:hidden;}
.eval-chal{display:flex;flex-direction:column;gap:6px;}
.eval-chal-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:8px 10px;}
.eval-chal-name{font-family:'Fraunces',serif;font-size:15.5px;color:var(--amber);font-style:italic;margin-bottom:3px;}
.eval-chal-body{font-size:14px;color:var(--white);line-height:1.55;opacity:0.9;}
.eval-chart-wrap{position:relative;flex:1;min-height:200px;}
.eval-sources{margin-top:8px;padding:9px 11px;background:rgba(0,0,0,0.28);border:1px solid var(--border);border-radius:8px;font-size:11px;line-height:1.55;color:var(--muted);max-height:120px;overflow-y:auto;flex-shrink:0;}
.eval-sources strong{color:var(--teal);}
.eval-sources .mono{font-size:10.5px;color:var(--blue);}
.eval-approaches{display:flex;flex-direction:column;gap:6px;flex:1;overflow-y:auto;}
.eval-app{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:8px 11px;font-size:14px;color:var(--white);line-height:1.55;}
.eval-app strong{color:var(--teal);font-size:14.5px;}
.eval-bench{background:linear-gradient(135deg,rgba(0,212,170,0.06),rgba(76,155,232,0.06));border:1px solid rgba(0,212,170,0.25);border-radius:8px;padding:10px 13px;font-size:14.5px;line-height:1.6;margin-top:8px;}
.eval-bench strong{color:var(--teal);}
.timeline-wrap{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;flex:1;min-height:0;}
.timeline-canvas-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;}
#timelineCanvas{flex:1;width:100%;min-height:280px;}
.trends{display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.trend-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:11px 13px;border-left:3px solid var(--teal);}
.trend-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.trend-name{font-family:'Fraunces',serif;font-size:16.5px;font-style:italic;}
.trend-conf{font-size:9px;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;padding:2px 7px;border-radius:4px;}
.trend-conf.high{background:rgba(0,212,170,0.15);color:var(--teal);}
.trend-conf.med{background:rgba(245,158,11,0.15);color:var(--amber);}
.trend-body{font-size:15px;color:var(--white);line-height:1.6;opacity:0.9;}
.closing-slide{padding:48px 56px 16px;}
.closing-headline{font-family:'Fraunces',serif;font-size:42px;line-height:1.05;margin-bottom:6px;}
.closing-sub{font-size:15px;color:var(--muted);margin-bottom:16px;font-style:italic;font-family:'Fraunces',serif;}
.flip-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;flex:1;min-height:0;}
.flip-card{perspective:1000px;cursor:pointer;height:100%;min-height:120px;}
.flip-inner{position:relative;width:100%;height:100%;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);transform-style:preserve-3d;}
.flip-card.flipped .flip-inner{transform:rotateY(180deg);}
.flip-side{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:12px;padding:16px;display:flex;flex-direction:column;justify-content:center;border:1px solid var(--border);}
.flip-front{background:var(--card);}
.flip-back{background:rgba(0,0,0,0.5);transform:rotateY(180deg);}
.flip-color{font-family:'Fraunces',serif;font-size:22px;font-style:italic;margin-bottom:4px;}
.flip-hint{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;}
.flip-back-text{font-size:15px;color:var(--white);line-height:1.6;}
.closing-quote{margin-top:14px;padding:12px 16px;background:rgba(0,0,0,0.3);border-left:3px solid var(--teal);border-radius:4px;font-family:'Fraunces',serif;font-style:italic;font-size:14.5px;line-height:1.55;color:var(--white);}
.recap-wrap{display:grid;grid-template-columns:1.3fr 1fr;gap:24px;flex:1;min-height:0;}
.recap-col{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;display:flex;flex-direction:column;overflow-y:auto;}
.recap-col-title{font-family:'Fraunces',serif;font-size:22px;margin-bottom:14px;}
.recap-col-title.t{color:var(--teal);}
.recap-col-title.b{color:var(--blue);}
.recap-list{list-style:none;}
.recap-list li{padding:8px 0;font-size:16px;color:var(--white);line-height:1.6;display:flex;gap:8px;border-bottom:1px solid var(--border);}
.recap-list li:last-child{border-bottom:none;}
.recap-list li::before{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-weight:600;}
.recap-col.l .recap-list li::before{content:'✓';color:var(--teal);}
.recap-col.r .recap-list li::before{content:'→';color:var(--blue);}
.week7-tag{font-size:11px;color:var(--blue);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:6px;font-weight:600;}
@media (max-width:768px){
  .slide{padding:32px 16px 12px;overflow-y:auto;}
  .slide-title{font-size:24px;}
  .slide-subtitle{font-size:12px;}
  .two-col,.react-wrap,.mcp-wrap,.devin-wrap,.adk-wrap,.walk-wrap,.timeline-wrap,.recap-wrap,.eval-wrap,.tool-wrap,.arch-display{display:flex !important;flex-direction:column;}
  .memory-grid,.anatomy-grid,.flip-grid,.fail-grid,.pattern-grid,.adk-cards,.eco-quad,.trace-wrap{display:flex !important;flex-direction:column;}
  .deck{overflow-y:auto;}
  .nav{padding:0 12px;}
  .nav-buttons .nav-btn{min-width:44px;min-height:44px;padding:8px 10px;}
  .nav-credit{display:none;}
  .title-main{font-size:42px;}
