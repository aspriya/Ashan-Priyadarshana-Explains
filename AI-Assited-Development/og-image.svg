<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&amp;family=Space+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500;600;700&amp;display=swap');
      text { font-family: 'Fraunces', serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .sans { font-family: 'Space Grotesk', sans-serif; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a0a0b"/>
      <stop offset="55%" stop-color="#161618"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <radialGradient id="glowCoral" cx="0.82" cy="0.30" r="0.55">
      <stop offset="0%"   stop-color="#ff6b3d" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff6b3d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowWarm" cx="0.16" cy="0.85" r="0.45">
      <stop offset="0%"   stop-color="#ff8a63" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ff8a63" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grain" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2"  cy="2"  r="0.9" fill="#f5f5f0" fill-opacity="0.025"/>
      <circle cx="20" cy="14" r="0.6" fill="#f5f5f0" fill-opacity="0.018"/>
    </pattern>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%"   stop-color="#ff8a63"/>
      <stop offset="100%" stop-color="#ff6b3d"/>
    </linearGradient>
    <linearGradient id="spectrumGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3a3a40"/>
      <stop offset="50%"  stop-color="#ff8a63"/>
      <stop offset="100%" stop-color="#ff6b3d"/>
    </linearGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grain)"/>
  <rect width="1200" height="630" fill="url(#glowCoral)"/>
  <rect width="1200" height="630" fill="url(#glowWarm)"/>

  <!-- Left spine accent bar -->
  <rect x="0" y="0" width="5" height="630" fill="#ff6b3d"/>

  <!-- Right side: capability spectrum + multi-agent fanout -->
  <g transform="translate(720,160)">
    <text x="0" y="0" class="mono" font-size="11" font-weight="600" letter-spacing="2.4" fill="#6e6e68">THE SPECTRUM · 7 TIERS · ONE LESSON</text>

    <line x1="20" y1="170" x2="430" y2="170" stroke="url(#spectrumGrad)" stroke-width="3" stroke-linecap="round"/>

    <circle cx="20"  cy="170" r="16" fill="#0a0a0b" stroke="#3a3a40" stroke-width="2.5"/>
    <text x="20"  y="174" font-size="13" font-weight="500" text-anchor="middle" fill="#6e6e68">1</text>
    <circle cx="88"  cy="170" r="17" fill="#0a0a0b" stroke="#55525a" stroke-width="2.5"/>
    <text x="88"  y="175" font-size="14" font-weight="500" text-anchor="middle" fill="#82828a">2</text>
    <circle cx="156" cy="170" r="18" fill="#0a0a0b" stroke="#7a6b65" stroke-width="2.5"/>
    <text x="156" y="175" font-size="14" font-weight="500" text-anchor="middle" fill="#9a8a82">3</text>
    <circle cx="224" cy="170" r="19" fill="#0a0a0b" stroke="#b67a52" stroke-width="2.5"/>
    <text x="224" y="175" font-size="15" font-weight="500" text-anchor="middle" fill="#c89472">4</text>
    <circle cx="292" cy="170" r="21" fill="#0a0a0b" stroke="#ff8a63" stroke-width="2.5"/>
    <text x="292" y="176" font-size="16" font-weight="500" text-anchor="middle" fill="#ff8a63">5</text>
    <circle cx="360" cy="170" r="23" fill="#0a0a0b" stroke="#ff6b3d" stroke-width="2.5"/>
    <text x="360" y="176" font-size="17" font-weight="500" text-anchor="middle" fill="#ff6b3d">6</text>
    <circle cx="430" cy="170" r="28" fill="#ff6b3d" stroke="#0a0a0b" stroke-width="3"/>
    <text x="430" y="177" font-size="19" font-weight="600" text-anchor="middle" fill="#0a0a0b">7</text>

    <circle cx="258" cy="170" r="38" fill="none" stroke="#ff6b3d" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="3,4"/>
    <text x="258" y="234" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" text-anchor="middle" fill="#ff6b3d">YOU ARE HERE · MAY 2026</text>

    <g stroke="#ff6b3d" stroke-opacity="0.55" stroke-width="1.4" stroke-dasharray="3,4" fill="none">
      <line x1="430" y1="148" x2="395" y2="80"/>
      <line x1="430" y1="148" x2="430" y2="60"/>
      <line x1="430" y1="148" x2="465" y2="80"/>
    </g>
    <circle cx="395" cy="80" r="11" fill="#0a0a0b" stroke="#ff6b3d" stroke-width="2"/>
    <circle cx="430" cy="60" r="11" fill="#0a0a0b" stroke="#ff6b3d" stroke-width="2"/>
    <circle cx="465" cy="80" r="11" fill="#0a0a0b" stroke="#ff6b3d" stroke-width="2"/>

    <text x="20"  y="138" class="sans" font-size="13" font-weight="500" text-anchor="middle" fill="#82828a">Autocomplete</text>
    <text x="20"  y="206" class="mono" font-size="10" letter-spacing="1.2" text-anchor="middle" fill="#6e6e68">tab · inline</text>

    <text x="430" y="138" class="sans" font-size="13" font-weight="600" text-anchor="middle" fill="#ff6b3d">Orchestration</text>
    <text x="430" y="206" class="mono" font-size="10" letter-spacing="1.2" text-anchor="middle" fill="#ff6b3d" font-style="italic">multi-agent</text>

    <g transform="translate(0,275)">
      <line x1="20" y1="0" x2="410" y2="0" stroke="#3a3a40" stroke-width="1.5"/>
      <polygon points="410,-5 425,0 410,5" fill="#ff6b3d"/>
      <text x="222" y="22" class="mono" font-size="11" font-weight="600" letter-spacing="2.2" text-anchor="middle" fill="#6e6e68">AUTONOMY  →</text>
    </g>
  </g>

  <!-- Left side: copy -->
  <text x="62" y="115" class="mono" font-size="13" font-weight="700" letter-spacing="3" fill="#ff6b3d">CODEV LABS  ·  INTERACTIVE LECTURE  ·  MAY 2026</text>

  <text fill="#f5f5f0">
    <tspan x="60" y="215" font-size="94" font-weight="400" letter-spacing="-2.5">Agentic</tspan>
    <tspan x="60" y="310" font-size="94" font-weight="400" font-style="italic" letter-spacing="-2.5" fill="url(#titleGrad)">Engineering.</tspan>
  </text>

  <text x="60" y="370" font-size="22" font-weight="400" fill="#b0b0a8">
    <tspan x="60" dy="0">AI-assisted development in <tspan font-weight="600" fill="#f5f5f0">May 2026</tspan> —</tspan>
    <tspan x="60" dy="32" font-style="italic">the tools, the conventions, the dangers, and the new craft.</tspan>
  </text>

  <g class="mono" font-size="13" font-weight="600">
    <g transform="translate(60,460)">
      <rect width="118" height="32" rx="16" fill="rgba(255,107,61,0.13)" stroke="#ff6b3d" stroke-opacity="0.55"/>
      <text x="59" y="21" text-anchor="middle" fill="#ff6b3d">AGENTS.md</text>
    </g>
    <g transform="translate(186,460)">
      <rect width="60" height="32" rx="16" fill="rgba(255,138,99,0.13)" stroke="#ff8a63" stroke-opacity="0.55"/>
      <text x="30" y="21" text-anchor="middle" fill="#ff8a63">MCP</text>
    </g>
    <g transform="translate(254,460)">
      <rect width="106" height="32" rx="16" fill="rgba(176,176,168,0.10)" stroke="#82828a" stroke-opacity="0.55"/>
      <text x="53" y="21" text-anchor="middle" fill="#b0b0a8">Worktrees</text>
    </g>
    <g transform="translate(368,460)">
      <rect width="138" height="32" rx="16" fill="rgba(255,107,61,0.13)" stroke="#ff6b3d" stroke-opacity="0.55"/>
      <text x="69" y="21" text-anchor="middle" fill="#ff6b3d">Orchestration</text>
    </g>
  </g>

  <line x1="60" y1="540" x2="700" y2="540" stroke="#f5f5f0" stroke-opacity="0.08"/>

  <text x="60" y="572" class="mono" font-size="12" font-weight="700" letter-spacing="3" fill="#ff6b3d">PRESENTED BY</text>
  <text x="60" y="606" font-size="26" font-weight="600" fill="#f5f5f0">Ashan Priyadarshana<tspan class="sans" font-weight="400" font-size="18" fill="#b0b0a8">  ·  CoDev Labs  |  Cognition Partner</tspan></text>

  <text x="1140" y="606" class="mono" font-size="13" font-weight="500" font-style="italic" text-anchor="end" fill="#b0b0a8">Ashan Priyadarshana Explains</text>
</svg>
