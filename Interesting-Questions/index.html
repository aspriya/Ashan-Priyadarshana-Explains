<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Interactive learning slides for algorithm problems that are easy once you see the insight." />
    <title>Easy once you get it — interactive algorithm slides</title>

    <!--
      Fonts come from Google Fonts via CDN (the only external dependency permitted
      by AGENTS.md). No JS libraries, no bundler, no build step.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      /* =====================================================================
         Design tokens — colors, fonts, radii, spacing.
         Semantic roles per AGENTS.md:
           purple = insight,
           teal   = data structure,
           coral  = naive / bad,
           amber  = live state during animation,
           gray   = structural / neutral.
         ===================================================================== */
      :root {
        /* Purple — insight */
        --purple-50:  #F2EFFC;
        --purple-100: #DDD2F7;
        --purple-400: #8C7AE6;
        --purple-600: #534AB7;
        --purple-800: #2A2380;

        /* Teal — data structure */
        --teal-50:  #E6F7F2;
        --teal-100: #BCEADC;
        --teal-400: #2EB89A;
        --teal-600: #0E8A75;
        --teal-800: #074F44;

        /* Coral — naive / bad */
        --coral-50:  #FCEEE8;
        --coral-100: #F8CFC0;
        --coral-400: #E97A56;
        --coral-600: #BF4528;
        --coral-800: #6F2613;

        /* Amber — live state */
        --amber-50:  #FFF7E0;
        --amber-100: #FFE7A1;
        --amber-400: #F2B400;
        --amber-600: #B58400;
        --amber-800: #6B4D00;

        /* Gray — neutral */
        --gray-50:  #F7F7F9;
        --gray-100: #ECECEF;
        --gray-400: #A1A1AB;
        --gray-600: #595965;
        --gray-800: #1E1E28;

        /* Fonts */
        --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
        --font-body:    'Space Grotesk', system-ui, -apple-system, 'Segoe UI', sans-serif;
        --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', 'Menlo', monospace;

        /* Radii */
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 16px;

        /* Layout */
        --content-max: 1100px;
        --slide-py: 64px;
        --slide-px: 48px;

        /* Shadows */
        --shadow-sm: 0 1px 2px rgba(30, 30, 40, 0.06), 0 1px 1px rgba(30, 30, 40, 0.04);
        --shadow-md: 0 6px 18px rgba(30, 30, 40, 0.08), 0 2px 6px rgba(30, 30, 40, 0.04);
        --shadow-lg: 0 14px 40px rgba(30, 30, 40, 0.10), 0 4px 12px rgba(30, 30, 40, 0.06);
      }

      /* =====================================================================
         Base reset and document layout.
         ===================================================================== */
      *, *::before, *::after { box-sizing: border-box; }

      html, body { margin: 0; padding: 0; }

      body {
        font-family: var(--font-body);
        font-size: 19px;
        line-height: 1.6;
        color: var(--gray-800);
        background: var(--gray-50);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      h1, h2, h3, h4 {
        font-family: var(--font-display);
        font-weight: 500;
        margin: 0;
        color: var(--gray-800);
        letter-spacing: -0.01em;
      }

      p { margin: 0; }
      button { font-family: inherit; }
      kbd {
        font-family: var(--font-mono);
        font-size: 12px;
        padding: 2px 6px;
        background: var(--gray-100);
        border: 1px solid var(--gray-100);
        border-bottom-width: 2px;
        border-radius: 4px;
        color: var(--gray-800);
      }

      /* =====================================================================
         Header — title, scene progress, hint row.
         ===================================================================== */
      .app-header {
        display: flex;
        align-items: center;
        gap: 32px;
        padding: 18px 32px 14px;
        border-bottom: 1px solid var(--gray-100);
        background: #ffffff;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        width: 12px;
        height: 12px;
        border-radius: 4px;
        background: linear-gradient(135deg, var(--purple-600), var(--teal-600));
        box-shadow: 0 0 0 2px var(--purple-100);
      }

      .brand-title {
        font-family: var(--font-display);
        font-size: 18px;
        font-weight: 500;
        color: var(--gray-800);
        white-space: nowrap;
      }

      .progress-bar {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      .progress-meta {
        display: flex;
        align-items: baseline;
        gap: 10px;
        font-size: 14px;
        color: var(--gray-600);
      }

      .progress-scene-title {
        font-family: var(--font-display);
        font-size: 15px;
        font-weight: 500;
        color: var(--gray-800);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .progress-numerals {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--gray-600);
      }

      .progress-numerals .dot { margin: 0 6px; color: var(--gray-400); }

      .progress-track {
        height: 3px;
        width: 100%;
        background: var(--gray-100);
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-fill {
        display: block;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--purple-600), var(--teal-600));
        border-radius: 999px;
        transition: width 220ms ease-out;
      }

      .help-hint {
        font-size: 12px;
        color: var(--gray-600);
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .help-hint .sep {
        color: var(--gray-400);
        margin: 0 4px;
      }

      /* =====================================================================
         Stage — where the active slide is mounted.
         ===================================================================== */
      #stage {
        flex: 1;
        display: flex;
        justify-content: center;
        padding: var(--slide-py) var(--slide-px);
        outline: none;
      }

      .slide {
        width: 100%;
        max-width: var(--content-max);
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .slide > header.slide-header {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .scene-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.03em;
        color: var(--gray-600);
        text-transform: lowercase;
      }

      .scene-tag::before {
        content: '';
        display: block;
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--gray-400);
      }

      .slide h1 {
        font-size: 44px;
        line-height: 1.1;
        font-weight: 500;
      }

      .slide h2 {
        font-size: 24px;
        font-family: var(--font-body);
        font-weight: 500;
        color: var(--gray-800);
      }

      .slide p { font-size: 19px; }

      .slide .lead {
        font-size: 21px;
        color: var(--gray-800);
        max-width: 70ch;
      }

      /* Role-specific accent strips on the left edge of each slide title */
      .slide-problem     .scene-tag::before { background: var(--gray-600); }
      .slide-naive       .scene-tag::before { background: var(--coral-600); }
      .slide-insight     .scene-tag::before { background: var(--purple-600); }
      .slide-walkthrough .scene-tag::before { background: var(--teal-600); }
      .slide-followup    .scene-tag::before { background: var(--amber-600); }

      /* =====================================================================
         Reusable content blocks: callout, code, viz, complexity.
         ===================================================================== */
      .callout {
        padding: 20px 24px;
        border-radius: var(--radius-md);
        border-left: 4px solid var(--gray-400);
        background: var(--gray-50);
        color: var(--gray-800);
        font-size: 18px;
      }
      .callout--insight {
        border-left-color: var(--purple-600);
        background: var(--purple-50);
        color: var(--purple-800);
      }
      .callout--data {
        border-left-color: var(--teal-600);
        background: var(--teal-50);
        color: var(--teal-800);
      }
      .callout--naive {
        border-left-color: var(--coral-600);
        background: var(--coral-50);
        color: var(--coral-800);
      }
      .callout--live {
        border-left-color: var(--amber-600);
        background: var(--amber-50);
        color: var(--amber-800);
      }
      .callout strong { font-weight: 600; }

      .code {
        font-family: var(--font-mono);
        font-size: 16px;
        background: var(--gray-800);
        color: #E6E6F0;
        padding: 20px 24px;
        border-radius: var(--radius-md);
        line-height: 1.6;
        overflow-x: auto;
        white-space: pre;
      }
      .code .c-key  { color: #C9A6FF; }
      .code .c-op   { color: #FFA6C9; }
      .code .c-num  { color: #FFC470; }
      .code .c-str  { color: #97E1B8; }
      .code .c-com  { color: #8E8E9E; font-style: italic; }
      .code .c-fn   { color: #82D7FF; }
      .code .c-ty   { color: #FFD27F; }

      .complexity {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        font-family: var(--font-mono);
        font-size: 16px;
        color: var(--gray-800);
        padding: 10px 14px;
        background: #ffffff;
        border: 1px solid var(--gray-100);
        border-radius: var(--radius-sm);
      }
      .complexity .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .complexity .pill::before {
        content: '';
        display: block;
        width: 8px; height: 8px;
        border-radius: 999px;
        background: var(--gray-400);
      }
      .complexity .pill.time::before  { background: var(--purple-600); }
      .complexity .pill.space::before { background: var(--teal-600); }
      .complexity .pill.bad::before   { background: var(--coral-600); }

      .viz {
        background: #ffffff;
        border: 1px solid var(--gray-100);
        border-radius: var(--radius-lg);
        padding: 28px 28px 20px;
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .viz-caption {
        font-size: 14px;
        color: var(--gray-600);
        margin-top: 4px;
      }

      .viz-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .viz-actions .spacer { flex: 1; }

      /* =====================================================================
         Buttons and form controls.
         ===================================================================== */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        line-height: 1.2;
        border-radius: 999px;
        border: 1px solid var(--gray-100);
        background: #ffffff;
        color: var(--gray-800);
        cursor: pointer;
        transition: background 150ms ease, border-color 150ms ease, transform 100ms ease;
      }
      .btn:hover { background: var(--gray-50); }
      .btn:active { transform: translateY(1px); }
      .btn:focus-visible { outline: 2px solid var(--purple-400); outline-offset: 2px; }
      .btn[disabled] {
        opacity: 0.45;
        cursor: not-allowed;
        background: var(--gray-50);
      }
      .btn--primary {
        background: var(--gray-800);
        color: #ffffff;
        border-color: var(--gray-800);
      }
      .btn--primary:hover { background: #000000; }
      .btn--insight {
        background: var(--purple-600);
        color: #ffffff;
        border-color: var(--purple-600);
      }
      .btn--insight:hover { background: var(--purple-800); }
      .btn--data {
        background: var(--teal-600);
        color: #ffffff;
        border-color: var(--teal-600);
      }
      .btn--data:hover { background: var(--teal-800); }
      .btn--ghost {
        background: transparent;
      }

      /* =====================================================================
         Bottom navigation bar.
         ===================================================================== */
      .nav-bar {
        position: sticky;
        bottom: 0;
        z-index: 8;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-top: 1px solid var(--gray-100);
        padding: 12px 32px;
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }

      .nav-bar .nav-group {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .nav-jump {
        font-family: var(--font-mono);
        font-size: 13px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--gray-100);
        background: #ffffff;
        color: var(--gray-800);
        cursor: pointer;
      }
      .nav-jump:focus-visible { outline: 2px solid var(--purple-400); outline-offset: 2px; }

      /* =====================================================================
         Overview dialog.
         ===================================================================== */
      dialog#overview {
        border: none;
        padding: 0;
        border-radius: var(--radius-lg);
        background: transparent;
        max-width: min(90vw, 900px);
        width: 100%;
      }
      dialog#overview::backdrop {
        background: rgba(15, 15, 25, 0.55);
        backdrop-filter: blur(2px);
      }

      .overview-inner {
        background: #ffffff;
        border-radius: var(--radius-lg);
        padding: 24px 28px 28px;
        box-shadow: var(--shadow-lg);
      }

      .overview-inner > header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
      }

      .overview-inner h2 {
        font-family: var(--font-display);
        font-size: 24px;
        font-weight: 500;
        color: var(--gray-800);
      }

      .overview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 14px;
      }

      .scene-tile {
        display: flex;
        flex-direction: column;
        gap: 6px;
        text-align: left;
        padding: 16px 18px;
        background: var(--gray-50);
        border: 1px solid var(--gray-100);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: background 150ms ease, transform 100ms ease, border-color 150ms ease;
        font-family: inherit;
        color: inherit;
      }
      .scene-tile:hover {
        background: var(--purple-50);
        border-color: var(--purple-100);
      }
      .scene-tile:focus-visible { outline: 2px solid var(--purple-400); outline-offset: 2px; }
      .tile-num {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--gray-600);
        text-transform: lowercase;
      }
      .tile-title {
        font-family: var(--font-display);
        font-size: 19px;
        font-weight: 500;
        color: var(--gray-800);
      }
      .tile-meta {
        font-size: 13px;
        color: var(--gray-600);
      }

      .close-btn {
        background: transparent;
        border: 1px solid var(--gray-100);
        border-radius: 999px;
        width: 32px; height: 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--gray-600);
      }
      .close-btn:hover { background: var(--gray-50); color: var(--gray-800); }

      /* =====================================================================
         Speaker notes panel.
         ===================================================================== */
      .notes-panel {
        position: fixed;
        right: 20px;
        bottom: 84px;
        z-index: 9;
        width: min(380px, 90vw);
        max-height: 50vh;
        background: var(--gray-800);
        color: #F4F4F8;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        padding: 14px 18px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transform: translateY(20px);
        opacity: 0;
        pointer-events: none;
        transition: transform 200ms ease, opacity 200ms ease;
      }
      .notes-panel.open {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }
      .notes-panel header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: var(--font-mono);
        font-size: 12px;
        text-transform: lowercase;
        color: var(--gray-400);
      }
      .notes-panel .close-btn {
        border-color: rgba(255,255,255,0.15);
        color: #C9C9D5;
      }
      .notes-panel .close-btn:hover { background: rgba(255,255,255,0.06); color: #ffffff; }
      .notes-panel .notes-content {
        font-size: 14px;
        line-height: 1.55;
        overflow-y: auto;
      }
      .notes-panel .notes-content:empty::after {
        content: 'No notes for this slide.';
        color: var(--gray-400);
        font-style: italic;
      }

      /* =====================================================================
         Scene 1 — Bucket-count and print: visualization styles.
         ===================================================================== */

      /* Chip — a small square representing one input value. */
      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 44px;
        height: 44px;
        padding: 0 6px;
        font-family: var(--font-mono);
        font-size: 16px;
        font-weight: 500;
        color: var(--gray-800);
        background: #ffffff;
        border: 1px solid var(--gray-100);
        border-radius: var(--radius-sm);
        box-shadow: var(--shadow-sm);
        transition: transform 600ms cubic-bezier(0.25, 0.7, 0.3, 1),
                    opacity 280ms ease,
                    background 280ms ease,
                    border-color 280ms ease;
        position: relative;
        will-change: transform;
      }
      .chip[data-bucket="0-9"]    { background: var(--purple-50);  border-color: var(--purple-100); color: var(--purple-800); }
      .chip[data-bucket="10-19"]  { background: var(--teal-50);    border-color: var(--teal-100);   color: var(--teal-800); }
      .chip[data-bucket="20-29"]  { background: var(--amber-50);   border-color: var(--amber-100);  color: var(--amber-800); }
      .chip[data-bucket="30-39"]  { background: var(--coral-50);   border-color: var(--coral-100);  color: var(--coral-800); }
      .chip[data-bucket="40-49"]  { background: var(--purple-50);  border-color: var(--purple-100); color: var(--purple-800); }
      .chip[data-bucket="50-59"]  { background: var(--teal-50);    border-color: var(--teal-100);   color: var(--teal-800); }
      .chip.chip-cursor {
        background: var(--amber-100);
        border-color: var(--amber-400);
        color: var(--amber-800);
        box-shadow: 0 0 0 2px var(--amber-100), var(--shadow-md);
      }
      /* Anchor cursor: the slow/outer index in a nested scan (Scene 2 naive). */
      .chip.chip-cursor--anchor {
        background: var(--coral-100);
        border-color: var(--coral-400);
        color: var(--coral-800);
        box-shadow: 0 0 0 2px var(--coral-100), var(--shadow-md);
      }
      /* Answer chip — the algorithm's chosen output. */
      .chip.chip-found {
        background: var(--teal-100);
        border-color: var(--teal-400);
        color: var(--teal-800);
        box-shadow: 0 0 0 2px var(--teal-100), var(--shadow-md);
      }
      .chip.chip-consumed {
        opacity: 0;
        transform: scale(0.4);
      }
      .chip.chip-pulse {
        animation: chip-pulse 320ms ease;
      }
      @keyframes chip-pulse {
        0%   { box-shadow: 0 0 0 0 var(--amber-400); }
        100% { box-shadow: 0 0 0 8px rgba(242,180,0,0); }
      }

      .output-block {
        font-family: var(--font-mono);
        font-size: 15px;
        line-height: 1.7;
        white-space: pre;
        background: var(--gray-800);
        color: #F0F0F5;
        border-radius: var(--radius-md);
        padding: 18px 22px;
        min-height: 1.6em;
        max-height: 280px;
        overflow-y: auto;
      }
      .output-block .placeholder {
        color: var(--gray-400);
        font-style: italic;
      }

      /* Two-column generic split */
      .split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
      }
      .split.split-wide-left { grid-template-columns: 1.4fr 1fr; }
      .split.split-wide-right { grid-template-columns: 1fr 1.4fr; }
      @media (max-width: 880px) {
        .split, .split.split-wide-left, .split.split-wide-right {
          grid-template-columns: 1fr;
        }
      }

      .stack { display: flex; flex-direction: column; gap: 14px; }
      .stack-sm { display: flex; flex-direction: column; gap: 8px; }

      /* ---- Bucket grid (101 cells, 0-100) ---- */
      .bucket-stage {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .bucket-grid {
        --cols: 101;
        display: grid;
        grid-template-columns: repeat(var(--cols), 1fr);
        gap: 1px;
        background: var(--gray-100);
        border: 1px solid var(--gray-100);
        border-radius: var(--radius-sm);
        padding: 1px;
        position: relative;
      }
      .bucket {
        position: relative;
        background: #ffffff;
        min-height: 36px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        font-family: var(--font-mono);
        font-size: 10px;
        transition: background 220ms ease;
      }
      .bucket-count {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 600;
        color: var(--gray-600);
        line-height: 1;
        padding: 3px 0 2px;
        min-height: 12px;
      }
      .bucket-fill {
        width: 100%;
        height: 0%;
        background: linear-gradient(180deg, var(--teal-100), var(--teal-400));
        transition: height 220ms ease;
      }
      .bucket-label {
        position: absolute;
        bottom: -18px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 10px;
        color: var(--gray-600);
        font-family: var(--font-mono);
      }
      .bucket.bucket-active {
        background: var(--teal-50);
      }
      .bucket.bucket-cursor {
        background: var(--amber-100);
        outline: 1px solid var(--amber-400);
        z-index: 2;
      }
      .bucket.bucket-flash {
        animation: bucket-flash 260ms ease;
      }
      @keyframes bucket-flash {
        0%   { background: var(--amber-100); }
        100% { background: var(--teal-50); }
      }

      .bucket-axis {
        display: flex;
        justify-content: space-between;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--gray-600);
        padding: 0 2px;
      }

      /* The "ghost" chips used during fly-to-bucket animation.
         They are absolutely positioned overlays so they can travel anywhere. */
      .fly-layer {
        position: relative;
        min-height: 1px;
      }

      /* ---- StringBuilder visualization ---- */
      .sb-buffer {
        background: #ffffff;
        border: 1px solid var(--gray-100);
        border-radius: var(--radius-md);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        position: relative;
      }
      .sb-buffer-label {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--gray-600);
      }
      .sb-capacity {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--gray-400);
        position: absolute;
        top: 12px;
        right: 14px;
      }
      .sb-buffer-slots {
        display: grid;
        grid-template-columns: repeat(16, 1fr);
        gap: 4px;
      }
      .sb-slot {
        height: 28px;
        background: var(--gray-50);
        border: 1px dashed var(--gray-100);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--gray-800);
        transition: background 200ms ease, border-color 200ms ease, color 200ms ease;
      }
      .sb-slot.filled {
        background: var(--purple-50);
        border: 1px solid var(--purple-400);
        color: var(--purple-800);
      }
      .sb-buffer.flash .sb-slot.filled {
        animation: sb-flash 260ms ease;
      }
      @keyframes sb-flash {
        0% { background: var(--amber-100); }
        100% { background: var(--purple-50); }
      }
      .sb-buffer.cleared .sb-slot {
        animation: sb-clear 320ms ease;
      }
      @keyframes sb-clear {
        0%   { background: var(--coral-50); border-color: var(--coral-100); }
        100% { background: var(--gray-50); border-color: var(--gray-100); }
      }

      /* ---- Counter (used on follow-up / sum slide) ---- */
      .big-number {
        font-family: var(--font-display);
        font-size: 56px;
        font-weight: 500;
        line-height: 1;
        color: var(--gray-800);
      }
      .big-number.live {
        color: var(--amber-600);
      }
      .big-number.answer {
        color: var(--purple-600);
      }

      /* =====================================================================
         Scene 3 — Find the missing number: sum cards + dual-row visualization.
         ===================================================================== */
      .chip.chip-missing {
        background: var(--gray-50);
        border: 1px dashed var(--coral-400);
        color: var(--coral-600);
        font-style: italic;
      }
      .chip.chip-faded {
        opacity: 0.35;
        background: var(--gray-50);
        border-color: var(--gray-100);
        color: var(--gray-600);
        box-shadow: none;
      }
      .chip.chip-ghost {
        background: var(--purple-50);
        border: 1px dashed var(--purple-400);
        color: var(--purple-600);
        font-style: italic;
        animation: chip-ghost-in 320ms ease;
      }
      @keyframes chip-ghost-in {
        0% { opacity: 0; transform: scale(0.6); }
        100% { opacity: 1; transform: scale(1); }
      }

      .sum-cards {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
      }
      .sum-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 18px 12px;
        background: var(--gray-50);
        border: 1px solid var(--gray-100);
        border-radius: var(--radius-md);
        text-align: center;
        min-height: 130px;
        justify-content: center;
        transition: background 200ms ease, border-color 200ms ease, opacity 200ms ease;
      }
      .sum-card--expected { border-color: var(--teal-100); background: var(--teal-50); }
      .sum-card--actual   { border-color: var(--amber-100); background: var(--amber-50); }
      .sum-card--answer   { border-color: var(--purple-400); background: var(--purple-50); }
      .sum-card--hidden   { opacity: 0.25; }
      .sum-label {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--gray-600);
        text-transform: lowercase;
      }
      .sum-card--expected .sum-label { color: var(--teal-600); }
      .sum-card--actual   .sum-label { color: var(--amber-600); }
      .sum-card--answer   .sum-label { color: var(--purple-600); }
      .sum-explain {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--gray-600);
      }
      .sum-card.tick {
        animation: sum-tick 320ms ease;
      }
      @keyframes sum-tick {
        0%   { transform: scale(1); }
        40%  { transform: scale(1.05); }
        100% { transform: scale(1); }
      }

      .dual-sum {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .dual-sum__row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 720px) {
        .dual-sum__row, .sum-cards { grid-template-columns: 1fr; }
      }
      .dual-sum__cell {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 12px 14px;
        background: var(--gray-50);
        border: 1px solid var(--gray-100);
        border-radius: var(--radius-md);
      }
      .dual-sum__cell--expected { border-color: var(--teal-100); }
      .dual-sum__cell--actual   { border-color: var(--amber-100); }
      .dual-sum__label {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--gray-600);
        text-transform: lowercase;
      }
      .dual-sum__chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      /* =====================================================================
         Scene 4 — Most frequent in a stream: bar chart + most-frequent card.
         ===================================================================== */
      .chip.chip--event { font-weight: 600; }
      .chip.chip--event[data-ev="A"] { background: var(--teal-50);  border-color: var(--teal-100);  color: var(--teal-800); }
      .chip.chip--event[data-ev="B"] { background: var(--amber-50); border-color: var(--amber-100); color: var(--amber-800); }
      .chip.chip--event[data-ev="C"] { background: var(--coral-50); border-color: var(--coral-100); color: var(--coral-800); }

      .bar-chart {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .bar-row {
        display: grid;
        grid-template-columns: 40px 1fr 48px;
        align-items: center;
        gap: 12px;
      }
      .bar-label {
        font-family: var(--font-mono);
        font-size: 18px;
        font-weight: 600;
        text-align: center;
        color: var(--gray-800);
      }
      .bar-track {
        height: 22px;
        background: var(--gray-50);
        border: 1px solid var(--gray-100);
        border-radius: 999px;
        overflow: hidden;
        position: relative;
      }
      .bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--teal-100), var(--teal-400));
        border-radius: 999px;
        transition: width 320ms ease, background 280ms ease;
      }
      .bar-row.is-leader .bar-fill {
        background: linear-gradient(90deg, var(--purple-400), var(--purple-600));
      }
      .bar-row.is-scanned .bar-track {
        outline: 2px solid var(--amber-400);
        outline-offset: 2px;
      }
      .bar-count {
        font-family: var(--font-mono);
        font-size: 14px;
        color: var(--gray-800);
        text-align: right;
      }
      .bar-row.is-leader .bar-count {
        color: var(--purple-600);
        font-weight: 600;
      }

      .most-frequent-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 28px 20px;
        border: 1px solid var(--purple-100);
        background: var(--purple-50);
        border-radius: var(--radius-lg);
        text-align: center;
        min-height: 160px;
        justify-content: center;
        transition: background 240ms ease, border-color 240ms ease;
      }
      .most-frequent-card .big-number { color: var(--purple-600); font-size: 64px; }
      .most-frequent-card.flash {
        animation: most-flash 460ms ease;
      }
      @keyframes most-flash {
        0%   { background: var(--amber-100); border-color: var(--amber-400); transform: scale(1); }
        40%  { background: var(--amber-100); border-color: var(--amber-400); transform: scale(1.04); }
        100% { background: var(--purple-50); border-color: var(--purple-100); transform: scale(1); }
      }
      .most-frequent-card .sum-label { color: var(--purple-600); }

      /* =====================================================================
         Reduced motion: disable nice-to-have transitions, keep final state.
         ===================================================================== */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          transition-duration: 0.001ms !important;
          animation-duration: 0.001ms !important;
        }
      }

      /* =====================================================================
         Small screens — keep usable on tablet portrait.
         ===================================================================== */
      @media (max-width: 720px) {
        :root { --slide-px: 24px; --slide-py: 36px; }
        .app-header { flex-wrap: wrap; gap: 16px; padding: 14px 18px; }
        .help-hint { display: none; }
        .nav-bar { padding: 10px 16px; }
        .slide h1 { font-size: 34px; }
        .slide p, .slide .lead { font-size: 17px; }
      }
    </style>
  </head>

  <body>
    <!-- ===================================================================
         Header
         =================================================================== -->
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-title">Easy once you get it</span>
      </div>
      <div class="progress-bar" aria-label="Deck progress">
        <div class="progress-meta">
          <span class="progress-scene-title" id="progress-title">—</span>
          <span class="progress-numerals">
            <span id="progress-scene">1 / 1</span>
            <span class="dot">·</span>
            <span id="progress-slide">Slide 1</span>
          </span>
        </div>
        <span class="progress-track" aria-hidden="true">
          <span class="progress-fill" id="progress-fill"></span>
        </span>
      </div>
      <div class="help-hint" aria-hidden="true">
        <kbd>←</kbd><kbd>→</kbd>
        <span>navigate</span>
        <span class="sep">·</span>
        <kbd>N</kbd>
        <span>notes</span>
        <span class="sep">·</span>
        <kbd>Esc</kbd>
        <span>overview</span>
      </div>
    </header>

    <!-- ===================================================================
         Stage — engine writes the active slide here.
         =================================================================== -->
    <main id="stage" tabindex="-1" aria-live="polite"></main>

    <!-- ===================================================================
         Bottom nav bar
         =================================================================== -->
    <nav class="nav-bar" aria-label="Slide navigation">
      <div class="nav-group">
        <button class="btn" id="prev-btn" aria-label="Previous slide">← Prev</button>
        <button class="btn" id="next-btn" aria-label="Next slide">Next →</button>
      </div>
      <div class="nav-group">
        <select class="nav-jump" id="nav-jump" aria-label="Jump to scene"></select>
        <button class="btn btn--ghost" id="overview-btn" aria-label="Open scene overview">Overview</button>
        <button class="btn btn--ghost" id="notes-btn" aria-label="Toggle speaker notes">Notes</button>
      </div>
    </nav>

    <!-- ===================================================================
         Overview dialog
         =================================================================== -->
    <dialog id="overview" aria-label="Scene overview">
      <div class="overview-inner">
        <header>
          <h2>Scenes</h2>
          <button class="close-btn" id="overview-close" aria-label="Close overview" type="button">&times;</button>
        </header>
        <div class="overview-grid" id="overview-grid"></div>
      </div>
    </dialog>

    <!-- ===================================================================
         Speaker notes panel
         =================================================================== -->
    <aside id="notes" class="notes-panel" aria-label="Speaker notes" aria-hidden="true">
      <header>
        <span>Speaker notes</span>
        <button class="close-btn" id="notes-close" aria-label="Close notes" type="button">&times;</button>
      </header>
      <div class="notes-content"></div>
    </aside>

    <!-- ===================================================================
         SCENE TEMPLATES
         A scene is added by dropping a new <template id="scene-N">…</template>
         block here. The navigation engine discovers scenes via
         document.querySelectorAll('template[id^="scene-"]') — no registry to
         update, no script changes required.
         =================================================================== -->

    <!-- ----- Scene 1: Bucket-count and print ----- -->
    <template id="scene-1">
      <article class="scene" data-scene-title="Bucket-count and print">

        <!-- Slide 1: Problem -->
        <section
          class="slide slide-problem"
          data-init="scene-1-problem"
          data-notes="Anchor: 1M integers in [0,100]. Group by value, sort ascending, comma-separate each line. Stress: the values are bounded — that's the hidden gift."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 1 · the problem</span>
            <h1>Bucket-count and print</h1>
          </header>

          <p class="lead">
            You're handed an array of about one million integers. Every value
            sits in the range 0–100. Print all occurrences grouped by value,
            sorted ascending, one value per line, comma-separated.
          </p>

          <div class="split split-wide-left">
            <div class="viz">
              <h2>Tiny example — 17 inputs</h2>
              <div class="chip-row" id="scene-1-input-chips"></div>
              <p class="viz-caption">
                The input we'll use throughout this scene. Real input is a
                million long; this slice keeps the logic visible.
              </p>
            </div>

            <div class="viz">
              <h2>Expected output</h2>
              <pre class="output-block">0,0,0
1,1,1
2,2
3,3
4,4,4
21
31
51
54,54</pre>
              <p class="viz-caption">
                One line per distinct value, in ascending order. Solo values
                still get a line — single number, no commas.
              </p>
            </div>
          </div>

          <div class="callout">
            <strong>Two facts to hold onto.</strong>
            The input size <code style="font-family:var(--font-mono)">n ≈ 10⁶</code> is large.
            The value range <code style="font-family:var(--font-mono)">k = 101</code> is small.
            Those two facts are the whole story.
          </div>
        </section>

        <!-- Slide 2: Naive -->
        <section
          class="slide slide-naive"
          data-init="scene-1-naive"
          data-notes="Naive: sort the array, then walk emitting newlines on value change. Works correctly, but pays log n per element for ordering we could derive from the value itself."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 1 · the naive try</span>
            <h1>Sort it, then walk it</h1>
          </header>

          <p class="lead">
            The obvious move: hand the array to the language's sort routine,
            then walk left to right, emitting a newline whenever the value
            changes. It works. It also pays for an ordering you didn't need.
          </p>

          <div class="split split-wide-right">
            <div class="stack">
              <div class="code"><span class="c-com">// pseudocode</span>
<span class="c-key">sort</span>(arr)                       <span class="c-com">// built-in comparison sort</span>
<span class="c-key">prev</span> = <span class="c-key">none</span>
<span class="c-key">line</span> = []
<span class="c-key">for</span> v <span class="c-key">in</span> arr:
  <span class="c-key">if</span> v != prev <span class="c-op">and</span> line:
    print(join(line, <span class="c-str">","</span>))
    line.clear()
  line.append(v)
  prev = v
<span class="c-key">if</span> line: print(join(line, <span class="c-str">","</span>))</div>

              <div class="complexity" role="note">
                <span class="pill bad">Time: O(n log n)</span>
                <span class="pill space">Space: O(1) or O(n)</span>
                <span style="color:var(--gray-600); font-size: 14px;">(depends on sort)</span>
              </div>

              <div class="callout callout--naive">
                <strong>Why this is wasteful.</strong>
                The values are bounded to 0–100. Sorting pays
                <code style="font-family:var(--font-mono)">log n</code>
                per element for an order you can derive from the value itself.
              </div>
            </div>

            <div class="viz">
              <h2>Watch the sort, then the walk</h2>
              <div class="chip-row" id="scene-1-naive-chips"></div>
              <pre class="output-block" id="scene-1-naive-output"><span class="placeholder">Output will fill here…</span></pre>
              <div class="viz-actions">
                <button class="btn btn--primary" data-action="run-sort">Run sort</button>
                <button class="btn" data-action="walk-emit" disabled>Walk and emit</button>
                <span class="spacer"></span>
                <button class="btn btn--ghost" data-action="reset">Reset</button>
              </div>
              <p class="viz-caption">
                Sort first, then a cursor walks the sorted chips, opening a new
                line every time the value changes.
              </p>
            </div>
          </div>
        </section>

        <!-- Slide 3: Insight -->
        <section
          class="slide slide-insight"
          data-init="scene-1-insight"
          data-notes="The insight: the values ARE the indices. One int[101] of counts. One linear pass to fill it. Then walk 0→100, print each non-zero value count times."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 1 · the insight</span>
            <h1>The values <em style="font-style: italic;">are</em> the indices</h1>
          </header>

          <div class="split split-wide-left">
            <div class="stack">
              <p class="lead">
                Stop sorting. Make an array of 101 counters, one per possible
                value. One pass over the input increments the counter at each
                value's index. The order falls out for free.
              </p>

              <div class="callout callout--insight">
                <strong>One sentence.</strong>
                When the value range is small and dense, the value itself
                becomes an index — and comparisons become direct array access.
              </div>

              <div class="code"><span class="c-key">int</span>[] counts = <span class="c-key">new</span> <span class="c-key">int</span>[<span class="c-num">101</span>];
<span class="c-key">for</span> (<span class="c-key">int</span> v : arr) counts[v]++;   <span class="c-com">// O(n) — one pass</span>
<span class="c-key">for</span> (<span class="c-key">int</span> v = <span class="c-num">0</span>; v &lt;= <span class="c-num">100</span>; v++)
  <span class="c-key">if</span> (counts[v] &gt; <span class="c-num">0</span>) emit(v, counts[v]); <span class="c-com">// O(k)</span></div>

              <div class="complexity" role="note">
                <span class="pill time">Time: O(n + k)</span>
                <span class="pill space">Space: O(k)</span>
                <span style="color:var(--gray-600); font-size: 14px;">k = 101</span>
              </div>
            </div>

            <div class="viz">
              <h2>Counting array — 101 buckets, indexed by value</h2>

              <div class="bucket-stage">
                <div class="fly-layer" id="scene-1-insight-fly-layer">
                  <div class="chip-row" id="scene-1-insight-chips"></div>
                </div>

                <div class="bucket-grid" id="scene-1-insight-buckets" aria-hidden="true"></div>
                <div class="bucket-axis" aria-hidden="true">
                  <span>0</span><span>10</span><span>20</span><span>30</span>
                  <span>40</span><span>50</span><span>60</span><span>70</span>
                  <span>80</span><span>90</span><span>100</span>
                </div>
              </div>

              <div class="viz-actions">
                <button class="btn btn--insight" data-action="run-pass">Run the pass</button>
                <button class="btn" data-action="step-one">Step one</button>
                <span class="spacer"></span>
                <button class="btn btn--ghost" data-action="reset">Reset</button>
              </div>

              <p class="viz-caption">
                Each chip flies into the bucket whose label matches its value.
                Watch buckets <code style="font-family:var(--font-mono)">0</code>–<code style="font-family:var(--font-mono)">4</code> climb fast and the tail (21, 31, 51, 54) flicker on once.
              </p>
            </div>
          </div>
        </section>

        <!-- Slide 4: Walkthrough -->
        <section
          class="slide slide-walkthrough"
          data-init="scene-1-walkthrough"
          data-notes="Step the algorithm yourself: each click consumes one input element. Once the input is empty, Print walks the buckets 0→100, building lines in a single reused StringBuilder."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 1 · walkthrough</span>
            <h1>Step it, then print it</h1>
          </header>

          <p class="lead">
            Drive the algorithm by hand. Each <em>Step</em> consumes one input
            element. When the input is empty, <em>Print</em> walks the buckets
            from 0 to 100 — emitting one line per non-zero bucket through a
            single reused buffer.
          </p>

          <div class="viz">
            <h2>Pass 1 — count</h2>

            <div class="bucket-stage">
              <div class="fly-layer" id="scene-1-walk-fly-layer">
                <div class="chip-row" id="scene-1-walk-chips"></div>
              </div>
              <div class="bucket-grid" id="scene-1-walk-buckets" aria-hidden="true"></div>
              <div class="bucket-axis" aria-hidden="true">
                <span>0</span><span>10</span><span>20</span><span>30</span>
                <span>40</span><span>50</span><span>60</span><span>70</span>
                <span>80</span><span>90</span><span>100</span>
              </div>
            </div>

            <div class="viz-actions">
              <button class="btn btn--data" data-action="step">Step</button>
              <button class="btn" data-action="run-all">Run all</button>
              <button class="btn btn--primary" data-action="print" disabled>Print</button>
              <span class="spacer"></span>
              <button class="btn btn--ghost" data-action="reset">Reset</button>
            </div>

            <p class="viz-caption">
              <strong>Step</strong> increments one bucket. <strong>Run all</strong> flushes
              the queue. <strong>Print</strong> appears once counting is done.
            </p>
          </div>

          <div class="split">
            <div class="viz">
              <h2>Pass 2 — emit (one reused buffer)</h2>
              <div class="sb-buffer" id="scene-1-walk-sb">
                <span class="sb-buffer-label">StringBuilder · current line</span>
                <span class="sb-capacity" id="scene-1-walk-sb-cap">capacity: 16</span>
                <div class="sb-buffer-slots" id="scene-1-walk-sb-slots"></div>
              </div>
              <p class="viz-caption">
                One buffer. Wipe it between lines, never throw it away.
              </p>
            </div>

            <div class="viz">
              <h2>Console</h2>
              <pre class="output-block" id="scene-1-walk-output"><span class="placeholder">Lines will print here…</span></pre>
              <div class="complexity" role="note">
                <span class="pill time">Time: O(n + k)</span>
                <span class="pill space">Space: O(k)</span>
              </div>
            </div>
          </div>
        </section>

        <!-- Slide 5: Why a single reused StringBuilder -->
        <section
          class="slide slide-followup"
          data-init="scene-1-stringbuilder"
          data-notes="Allocating a new StringBuilder per line means many short-lived heap allocations and GC pressure. setLength(0) keeps the underlying char[] capacity and only resets the length counter. Free reuse."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 1 · why setLength(0)</span>
            <h1>One buffer, wiped between lines</h1>
          </header>

          <p class="lead">
            The algorithm is fast. The output stage shouldn't undo that. A
            fresh <code style="font-family:var(--font-mono)">StringBuilder</code>
            per line allocates a new char array each time — fine for one line,
            wasteful when you're emitting thousands.
          </p>

          <div class="split split-wide-right">
            <div class="stack">
              <div class="code"><span class="c-ty">StringBuilder</span> line = <span class="c-key">new</span> <span class="c-ty">StringBuilder</span>(<span class="c-num">16</span>);
<span class="c-com">// reused across every output line</span>
<span class="c-key">for</span> (<span class="c-key">int</span> v = <span class="c-num">0</span>; v &lt;= <span class="c-num">100</span>; v++) {
  <span class="c-key">int</span> c = counts[v];
  <span class="c-key">if</span> (c == <span class="c-num">0</span>) <span class="c-key">continue</span>;
  line.setLength(<span class="c-num">0</span>);              <span class="c-com">// length = 0, char[] kept</span>
  <span class="c-key">for</span> (<span class="c-key">int</span> i = <span class="c-num">0</span>; i &lt; c; i++) {
    <span class="c-key">if</span> (i &gt; <span class="c-num">0</span>) line.append(<span class="c-str">','</span>);
    line.append(v);
  }
  out.println(line);             <span class="c-com">// one buffer, many lines</span>
}</div>

              <div class="callout callout--insight">
                <strong>The trick.</strong>
                <code style="font-family:var(--font-mono)">setLength(0)</code>
                does not free the underlying array. Length resets, capacity
                stays. The next line writes into the same memory.
              </div>

              <div class="complexity" role="note">
                <span class="pill space">Allocations: 1 buffer total</span>
              </div>
            </div>

            <div class="viz">
              <h2>Watch the buffer</h2>
              <div class="sb-buffer" id="scene-1-sb-buffer">
                <span class="sb-buffer-label">char[] · length / capacity</span>
                <span class="sb-capacity" id="scene-1-sb-cap">len 0 / cap 16</span>
                <div class="sb-buffer-slots" id="scene-1-sb-slots"></div>
              </div>

              <div class="viz-actions">
                <button class="btn btn--primary" data-action="append">Append next line</button>
                <button class="btn" data-action="clear">setLength(0)</button>
                <span class="spacer"></span>
                <button class="btn btn--ghost" data-action="reset">Reset</button>
              </div>

              <pre class="output-block" id="scene-1-sb-output"><span class="placeholder">Each appended line lands here.</span></pre>

              <p class="viz-caption">
                Setting the length to zero clears the content — the capacity
                indicator never changes. That's the allocation we keep.
              </p>
            </div>
          </div>
        </section>

      </article>
    </template>

    <!-- ----- Scene 2: First non-repeating character ----- -->
    <template id="scene-2">
      <article class="scene" data-scene-title="First non-repeating character">

        <!-- Slide 1: Problem -->
        <section
          class="slide slide-problem"
          data-init="scene-2-problem"
          data-notes="Find the first character whose count is exactly one. 'First' means first by position in the input — not first alphabetically. 'c' wins because it appears before 'd', both of which have count 1."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 2 · the problem</span>
            <h1>First non-repeating character</h1>
          </header>

          <p class="lead">
            Given a string of up to ten million ASCII characters, return the
            first character that appears exactly once. Return a sentinel if no
            such character exists.
          </p>

          <div class="split split-wide-left">
            <div class="viz">
              <h2>Tiny example — "aabbcdeeff"</h2>
              <div class="chip-row" id="scene-2-input-chips"></div>
              <p class="viz-caption">
                Each tile is one character. The answer is the first tile whose
                count across the whole string is exactly 1.
              </p>
            </div>

            <div class="viz">
              <h2>Expected output</h2>
              <pre class="output-block">'c'</pre>
              <p class="viz-caption">
                <code style="font-family:var(--font-mono)">'c'</code> wins —
                its count is 1 and it appears before
                <code style="font-family:var(--font-mono)">'d'</code> (also
                count 1).
              </p>
            </div>
          </div>

          <div class="callout">
            <strong>Two facts to hold onto.</strong>
            Input length <code style="font-family:var(--font-mono)">n</code>
            can be huge — up to 10⁷. The alphabet is fixed:
            <code style="font-family:var(--font-mono)">k = 128</code>
            ASCII codepoints. Those two facts are the whole story again.
          </div>
        </section>

        <!-- Slide 2: Naive -->
        <section
          class="slide slide-naive"
          data-init="scene-2-naive"
          data-notes="Naive nested scan. For each i, sweep all other indices looking for a duplicate. O(n²). For n = 10⁷ that's 10¹⁴ ops — infeasible."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 2 · the naive try</span>
            <h1>Scan each character against the rest</h1>
          </header>

          <p class="lead">
            For every character, sweep the rest of the string looking for a
            duplicate. The first character whose sweep finds nothing wins.
            Correct. Also quadratic.
          </p>

          <div class="split split-wide-right">
            <div class="stack">
              <div class="code"><span class="c-com">// pseudocode</span>
<span class="c-key">for</span> i = <span class="c-num">0</span> .. n-<span class="c-num">1</span>:
  is_unique = <span class="c-key">true</span>
  <span class="c-key">for</span> j = <span class="c-num">0</span> .. n-<span class="c-num">1</span>:
    <span class="c-key">if</span> j != i <span class="c-op">and</span> s[j] == s[i]:
      is_unique = <span class="c-key">false</span>
      <span class="c-key">break</span>
  <span class="c-key">if</span> is_unique: <span class="c-key">return</span> s[i]
<span class="c-key">return</span> sentinel</div>

              <div class="complexity" role="note">
                <span class="pill bad">Time: O(n²)</span>
                <span class="pill space">Space: O(1)</span>
              </div>

              <div class="callout callout--naive">
                <strong>Why this is wasteful.</strong>
                It re-scans regions you've already seen. Every character is
                examined many times.
              </div>
            </div>

            <div class="viz">
              <h2>Watch the nested scan</h2>
              <div class="chip-row" id="scene-2-naive-chips"></div>
              <div class="viz-actions">
                <button class="btn btn--primary" data-action="run-scan">Run nested scan</button>
                <span class="spacer"></span>
                <button class="btn btn--ghost" data-action="reset">Reset</button>
              </div>
              <p class="viz-caption">
                The coral chip is <code style="font-family:var(--font-mono)">i</code>;
                the amber chip is <code style="font-family:var(--font-mono)">j</code>
                sweeping the whole string for each <code style="font-family:var(--font-mono)">i</code>.
              </p>
            </div>
          </div>
        </section>

        <!-- Slide 3: Insight -->
        <section
          class="slide slide-insight"
          data-init="scene-2-insight"
          data-notes="Two passes with int[128]. Pass 1 fills counts in O(n). Pass 2 walks the string and returns the first char whose count slot reads 1. Two clean passes beat one tangled pass."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 2 · the insight</span>
            <h1>Two passes beat one clever pass</h1>
          </header>

          <div class="split split-wide-left">
            <div class="stack">
              <p class="lead">
                Stop trying to do it in one walk. Two clean walks each do half
                the work: count first, then find.
              </p>

              <div class="callout callout--insight">
                <strong>One sentence.</strong>
                When a one-pass solution gets tangled because it has to track
                two things at once, two clean passes are simpler — and faster.
              </div>

              <div class="code"><span class="c-key">int</span>[] counts = <span class="c-key">new</span> <span class="c-key">int</span>[<span class="c-num">128</span>];

<span class="c-com">// pass 1 — O(n) fill counts</span>
<span class="c-key">for</span> (<span class="c-key">char</span> c : s.toCharArray())
  counts[c]++;

<span class="c-com">// pass 2 — O(n) find first with count == 1</span>
<span class="c-key">for</span> (<span class="c-key">char</span> c : s.toCharArray())
  <span class="c-key">if</span> (counts[c] == <span class="c-num">1</span>) <span class="c-key">return</span> c;

<span class="c-key">return</span> <span class="c-num">-1</span>;</div>

              <div class="complexity" role="note">
                <span class="pill time">Time: O(n)</span>
                <span class="pill space">Space: O(k)</span>
                <span style="color:var(--gray-600); font-size: 14px;">k = 128</span>
              </div>
            </div>

            <div class="viz">
              <h2>Counts after pass 1 — 128 slots, indexed by codepoint</h2>
              <div class="bucket-grid" id="scene-2-insight-counts" style="--cols: 128;" aria-hidden="true"></div>
              <div class="bucket-axis" aria-hidden="true">
                <span>0</span><span>32</span><span>64</span><span>97 (a)</span><span>127</span>
              </div>
              <p class="viz-caption">
                One slot per ASCII codepoint. After pass 1, only the six
                touched slots are non-zero. The rest stay flat.
              </p>
            </div>
          </div>
        </section>

        <!-- Slide 4: Walkthrough -->
        <section
          class="slide slide-walkthrough"
          data-init="scene-2-walkthrough"
          data-notes="Step through pass 1 then pass 2. The first chip whose slot shows 1 lights up green. Note how pass 2 only reads from counts — it never modifies them."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 2 · walkthrough</span>
            <h1>Count, then find</h1>
          </header>

          <p class="lead">
            Pass 1 fills the counts. Pass 2 walks left to right, asking
            <em>"is this slot exactly 1?"</em> The first <em>yes</em> wins.
          </p>

          <div class="viz">
            <h2>Two passes, one counting array</h2>
            <div class="chip-row" id="scene-2-walk-chips"></div>
            <div class="bucket-grid" id="scene-2-walk-counts" style="--cols: 128;" aria-hidden="true"></div>
            <div class="bucket-axis" aria-hidden="true">
              <span>0</span><span>32</span><span>64</span><span>97 (a)</span><span>127</span>
            </div>

            <div class="viz-actions">
              <button class="btn btn--data"    data-action="step-1">Pass 1: step</button>
              <button class="btn"              data-action="run-1">Pass 1: run</button>
              <button class="btn btn--insight" data-action="step-2" disabled>Pass 2: step</button>
              <button class="btn"              data-action="run-2"  disabled>Pass 2: run</button>
              <span class="spacer"></span>
              <button class="btn btn--ghost"   data-action="reset">Reset</button>
            </div>

            <p class="viz-caption">
              <strong>Step</strong> advances one character. <strong>Run</strong>
              flushes the rest of the pass. Pass 2 unlocks once pass 1 is done.
            </p>
          </div>

          <div class="callout" id="scene-2-walk-result">
            Answer will appear here.
          </div>

          <div class="complexity" role="note">
            <span class="pill time">Time: O(n)</span>
            <span class="pill space">Space: O(k)</span>
            <span style="color:var(--gray-600); font-size: 14px;">two passes, k = 128</span>
          </div>
        </section>

      </article>
    </template>

    <!-- ----- Scene 3: Find the missing number ----- -->
    <template id="scene-3">
      <article class="scene" data-scene-title="Find the missing number">

        <!-- Slide 1: Problem -->
        <section
          class="slide slide-problem"
          data-init="scene-3-problem"
          data-notes="999,999 unique integers in [1, 1_000_000]. Exactly one missing. Find it with O(1) extra memory. The tiny example uses range 1..5; missing = 4."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 3 · the problem</span>
            <h1>Find the missing number</h1>
          </header>

          <p class="lead">
            You're given 999,999 unique integers, each in the range 1 to
            1,000,000. Exactly one number from that range is missing. Find it.
            Constraint: <code style="font-family:var(--font-mono)">O(1)</code>
            extra memory.
          </p>

          <div class="split split-wide-left">
            <div class="viz">
              <h2>Tiny example — range 1..5</h2>
              <div style="display:flex; flex-direction:column; gap: 14px;">
                <div>
                  <span class="sum-label" style="display:block; margin-bottom: 6px;">input array</span>
                  <div class="chip-row" id="scene-3-input-chips"></div>
                </div>
                <div>
                  <span class="sum-label" style="display:block; margin-bottom: 6px;">full range 1..5</span>
                  <div class="chip-row" id="scene-3-full-range"></div>
                </div>
              </div>
              <p class="viz-caption">
                Input on top, full range below. The dashed chip is the missing
                value.
              </p>
            </div>

            <div class="viz">
              <h2>Expected output</h2>
              <pre class="output-block">4</pre>
              <p class="viz-caption">
                One integer. No hash set, no auxiliary array — just a constant
                amount of extra memory.
              </p>
            </div>
          </div>

          <div class="callout">
            <strong>The hidden gift.</strong>
            "Consecutive integers from 1 to N" is algebraic structure. Naive
            solutions treat this as a search problem; the optimal one treats
            it as arithmetic.
          </div>
        </section>

        <!-- Slide 2: Naive -->
        <section
          class="slide slide-naive"
          data-init="scene-3-naive"
          data-notes="Sort + walk works in O(n log n) but ignores the arithmetic. Hash set is O(n) space — disallowed by the constraint."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 3 · the naive try</span>
            <h1>Sort it, or hash it</h1>
          </header>

          <p class="lead">
            Two obvious approaches. One is correct but slow. The other is fast
            but cheats on memory.
          </p>

          <div class="split">
            <div class="stack">
              <h2>Option A — sort and walk</h2>
              <div class="code"><span class="c-com">// O(n log n) time, O(1) extra</span>
<span class="c-key">sort</span>(arr)
<span class="c-key">for</span> i = <span class="c-num">0</span> .. n-<span class="c-num">2</span>:
  <span class="c-key">if</span> arr[i+<span class="c-num">1</span>] != arr[i] + <span class="c-num">1</span>:
    <span class="c-key">return</span> arr[i] + <span class="c-num">1</span></div>
              <div class="complexity" role="note">
                <span class="pill bad">Time: O(n log n)</span>
                <span class="pill space">Space: O(1)</span>
              </div>
            </div>

            <div class="stack">
              <h2>Option B — hash set</h2>
              <div class="code"><span class="c-com">// O(n) time, O(n) extra — violates!</span>
seen = <span class="c-ty">HashSet</span>(arr)
<span class="c-key">for</span> v = <span class="c-num">1</span> .. N:
  <span class="c-key">if</span> v <span class="c-key">not in</span> seen: <span class="c-key">return</span> v</div>
              <div class="complexity" role="note">
                <span class="pill time">Time: O(n)</span>
                <span class="pill bad">Space: O(n) — disallowed</span>
              </div>
            </div>
          </div>

          <div class="viz">
            <h2>Watch the sort + walk on the tiny example</h2>
            <div class="chip-row" id="scene-3-naive-chips"></div>
            <div class="viz-actions">
              <button class="btn btn--primary" data-action="run">Run sort + walk</button>
              <span class="spacer"></span>
              <button class="btn btn--ghost" data-action="reset">Reset</button>
            </div>
            <p class="viz-caption">
              Sort puts the chips in order. A walking cursor opens a "gap"
              whenever
              <code style="font-family:var(--font-mono)">arr[i+1] != arr[i] + 1</code>.
            </p>
          </div>

          <div class="callout callout--naive">
            <strong>Why both feel wasteful.</strong>
            They treat this as a search problem. Neither uses the fact that
            the full range 1..N has a closed-form sum.
          </div>
        </section>

        <!-- Slide 3: Insight -->
        <section
          class="slide slide-insight"
          data-init="scene-3-insight"
          data-notes="Sum 1..N has a closed form: N(N+1)/2. Subtract actual array sum. The difference IS the missing number. One pass, zero data structures."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 3 · the insight</span>
            <h1>Math beats iteration</h1>
          </header>

          <div class="split split-wide-right">
            <div class="stack">
              <p class="lead">
                Forget the array as a data structure. Treat 1..N as a
                closed-form sum, the input as another, and subtract.
              </p>

              <div class="callout callout--insight">
                <strong>One sentence.</strong>
                Sum of integers 1 to N is
                <code style="font-family:var(--font-mono)">N(N+1)/2</code>.
                Subtract the actual array sum — the difference is the missing
                number.
              </div>

              <div class="code"><span class="c-key">long</span> expected = (<span class="c-key">long</span>)N * (N + <span class="c-num">1</span>) / <span class="c-num">2</span>;
<span class="c-key">long</span> actual = <span class="c-num">0</span>;
<span class="c-key">for</span> (<span class="c-key">int</span> v : arr) actual += v;   <span class="c-com">// O(n) — one pass</span>
<span class="c-key">return</span> (<span class="c-key">int</span>)(expected - actual);</div>

              <div class="complexity" role="note">
                <span class="pill time">Time: O(n)</span>
                <span class="pill space">Space: O(1)</span>
              </div>
            </div>

            <div class="viz">
              <h2>Two sums, one subtraction</h2>
              <div class="sum-cards">
                <div class="sum-card sum-card--expected">
                  <span class="sum-label">expected</span>
                  <span class="big-number">15</span>
                  <span class="sum-explain">= 5 × 6 / 2</span>
                </div>
                <div class="sum-card sum-card--actual">
                  <span class="sum-label">actual</span>
                  <span class="big-number">11</span>
                  <span class="sum-explain">= 3 + 1 + 5 + 2</span>
                </div>
                <div class="sum-card sum-card--answer">
                  <span class="sum-label">missing</span>
                  <span class="big-number answer">4</span>
                  <span class="sum-explain">expected − actual</span>
                </div>
              </div>
              <p class="viz-caption">
                Three numbers, one subtraction. The third is the answer.
              </p>
            </div>
          </div>
        </section>

        <!-- Slide 4: Walkthrough -->
        <section
          class="slide slide-walkthrough"
          data-init="scene-3-walkthrough"
          data-notes="Tick both counters together: 1..N on the left, array elements on the right. When both rows are empty, the difference is the answer."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 3 · walkthrough</span>
            <h1>Tick both sums, then subtract</h1>
          </header>

          <p class="lead">
            The expected counter walks 1 to N adding each value. The actual
            counter walks the array adding each element. When both finish, the
            difference appears.
          </p>

          <div class="viz">
            <h2>Two sums in lockstep</h2>

            <div class="dual-sum">
              <div class="dual-sum__row">
                <div class="dual-sum__cell dual-sum__cell--expected">
                  <span class="dual-sum__label">expected: 1..N</span>
                  <div class="dual-sum__chips" id="scene-3-walk-expected-chips"></div>
                </div>
                <div class="dual-sum__cell dual-sum__cell--actual">
                  <span class="dual-sum__label">actual: the array</span>
                  <div class="dual-sum__chips" id="scene-3-walk-actual-chips"></div>
                </div>
              </div>

              <div class="sum-cards">
                <div class="sum-card sum-card--expected">
                  <span class="sum-label">expected sum</span>
                  <span class="big-number" id="scene-3-walk-expected-sum">0</span>
                </div>
                <div class="sum-card sum-card--actual">
                  <span class="sum-label">actual sum</span>
                  <span class="big-number" id="scene-3-walk-actual-sum">0</span>
                </div>
                <div class="sum-card sum-card--answer sum-card--hidden" id="scene-3-walk-answer-card">
                  <span class="sum-label">missing</span>
                  <span class="big-number answer" id="scene-3-walk-answer">?</span>
                  <span class="sum-explain">expected − actual</span>
                </div>
              </div>
            </div>

            <div class="viz-actions">
              <button class="btn btn--data" data-action="step">Step</button>
              <button class="btn" data-action="run">Run</button>
              <span class="spacer"></span>
              <button class="btn btn--ghost" data-action="reset">Reset</button>
            </div>

            <p class="viz-caption">
              Each step consumes one chip from each row and adds it to the
              running sum. When both rows are empty, the answer appears.
            </p>
          </div>

          <div class="complexity" role="note">
            <span class="pill time">Time: O(n)</span>
            <span class="pill space">Space: O(1)</span>
          </div>
        </section>

        <!-- Slide 5: Follow-up — two missing numbers -->
        <section
          class="slide slide-followup"
          data-init="scene-3-followup"
          data-notes="Two missing: use two equations (sum and sum-of-squares) for a and b, or XOR partitioning. Don't fully implement — leave it as a discussion prompt."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 3 · follow-up</span>
            <h1>What if two numbers are missing?</h1>
          </header>

          <p class="lead">
            Same shape. One arithmetic identity isn't enough. Take two.
          </p>

          <div class="split">
            <div class="stack">
              <div class="callout callout--insight">
                <strong>Approach 1 — two equations, two unknowns.</strong>
                <code style="font-family:var(--font-mono)">expected_sum − actual_sum = a + b</code>.
                <code style="font-family:var(--font-mono)">expected_Σv² − actual_Σv² = a² + b²</code>.
                Two equations, two unknowns. Solve with the quadratic formula.
              </div>

              <div class="code"><span class="c-key">long</span> S1 = expectedSum     - actualSum;     <span class="c-com">// = a + b</span>
<span class="c-key">long</span> S2 = expectedSqSum   - actualSqSum;   <span class="c-com">// = a² + b²</span>
<span class="c-com">// (a+b)² = a² + 2ab + b²  ⇒  2ab = S1² − S2</span>
<span class="c-key">long</span> sum  = S1;
<span class="c-key">long</span> prod = (S1*S1 - S2) / <span class="c-num">2</span>;
<span class="c-com">// a, b = roots of  x² − sum·x + prod = 0</span></div>
            </div>

            <div class="stack">
              <div class="callout callout--data">
                <strong>Approach 2 — XOR partitioning.</strong>
                XOR all array elements with 1..N. The result is
                <code style="font-family:var(--font-mono)">a ⊕ b</code>.
                Pick any bit set in that XOR — it tells you a bit where
                <em>a</em> and <em>b</em> differ. Split by that bit, XOR each
                half, get each missing number.
              </div>

              <div class="code"><span class="c-key">int</span> x = <span class="c-num">0</span>;
<span class="c-key">for</span> v <span class="c-key">in</span> arr:  x ^= v;
<span class="c-key">for</span> v <span class="c-key">in</span> <span class="c-num">1</span>..N: x ^= v;
<span class="c-com">// x is now (a XOR b). Pick lowest set bit.</span>
<span class="c-key">int</span> bit = x &amp; -x;
<span class="c-com">// Split inputs by that bit, XOR each half.</span></div>
            </div>
          </div>

          <div class="callout">
            <strong>The takeaway.</strong>
            When the input has algebraic structure (consecutive ints, XOR
            identities, sums of squares), data structures step out of the way.
            Math takes over.
          </div>
        </section>

      </article>
    </template>

    <!-- ----- Scene 4: Most frequent in a stream ----- -->
    <template id="scene-4">
      <article class="scene" data-scene-title="Most frequent in a stream">

        <!-- Slide 1: Problem -->
        <section
          class="slide slide-problem"
          data-init="scene-4-problem"
          data-notes="Live event stream, ~50 event types. At any moment a query asks 'most common so far?' and must answer in O(1). Demo stream: A,B,A,C,B,A,C,C,C. The last C makes C overtake A (4 vs 3)."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 4 · the problem</span>
            <h1>Most frequent in a stream</h1>
          </header>

          <p class="lead">
            Events arrive one at a time, each of about 50 known types. At any
            moment, a query asks "what's the most common event so far?" — and
            must return in <code style="font-family:var(--font-mono)">O(1)</code>.
          </p>

          <div class="viz">
            <h2>Tiny example — 9 events, 3 types</h2>

            <div style="display:flex; flex-direction:column; gap: 14px;">
              <div>
                <span class="sum-label" style="display:block; margin-bottom: 6px;">events arriving (left to right)</span>
                <div class="chip-row" id="scene-4-input-stream"></div>
              </div>

              <div>
                <span class="sum-label" style="display:block; margin-bottom: 6px;">most frequent after each event</span>
                <div class="chip-row" id="scene-4-most-trace"></div>
              </div>
            </div>

            <p class="viz-caption">
              The last <code style="font-family:var(--font-mono)">C</code>
