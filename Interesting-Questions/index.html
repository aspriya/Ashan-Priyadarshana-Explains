              flips the answer: <code style="font-family:var(--font-mono)">C</code>
              overtakes <code style="font-family:var(--font-mono)">A</code>
              (4 vs 3). Every other step keeps the previous leader.
            </p>
          </div>

          <div class="callout">
            <strong>The hot path.</strong>
            Reads can be far more frequent than writes. Whatever work the
            query does, the algorithm does on every read — so pay the cost
            on insertion instead.
          </div>
        </section>

        <!-- Slide 2: Naive -->
        <section
          class="slide slide-naive"
          data-init="scene-4-naive"
          data-notes="Naive: keep counts, scan all entries on each query. O(k) per query where k = distinct types. Fails the O(1) query requirement."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 4 · the naive try</span>
            <h1>Scan the map on every query</h1>
          </header>

          <p class="lead">
            Keep a counts map. On every query, iterate the map and return the
            entry with the highest count. Each query costs
            <code style="font-family:var(--font-mono)">O(k)</code> — failing
            the requirement.
          </p>

          <div class="split split-wide-right">
            <div class="stack">
              <div class="code"><span class="c-ty">Map</span>&lt;<span class="c-ty">Event</span>, <span class="c-ty">Integer</span>&gt; counts = <span class="c-key">new</span> <span class="c-ty">HashMap</span>&lt;&gt;();

<span class="c-key">void</span> <span class="c-fn">onEvent</span>(<span class="c-ty">Event</span> e) {
  counts.merge(e, <span class="c-num">1</span>, <span class="c-ty">Integer</span>::sum);
}

<span class="c-ty">Event</span> <span class="c-fn">mostFrequent</span>() {
  <span class="c-ty">Event</span> best = <span class="c-key">null</span>; <span class="c-key">int</span> bestN = -<span class="c-num">1</span>;
  <span class="c-key">for</span> (<span class="c-key">var</span> e : counts.entrySet()) {     <span class="c-com">// O(k) scan</span>
    <span class="c-key">if</span> (e.getValue() &gt; bestN) {
      bestN = e.getValue(); best = e.getKey();
    }
  }
  <span class="c-key">return</span> best;
}</div>

              <div class="complexity" role="note">
                <span class="pill time">Insert: O(1)</span>
                <span class="pill bad">Query: O(k)</span>
                <span class="pill space">Space: O(k)</span>
              </div>

              <div class="callout callout--naive">
                <strong>Why this is wasteful.</strong>
                Queries repeat the same scan, finding the same winner most of
                the time. The work is the same whether anything changed or not.
              </div>
            </div>

            <div class="viz">
              <h2>Watch one query scan the map</h2>
              <div class="bar-chart" id="scene-4-naive-bars"></div>
              <div class="viz-actions">
                <button class="btn btn--primary" data-action="run-scan">Run a query</button>
                <span class="spacer"></span>
                <button class="btn btn--ghost" data-action="reset">Reset</button>
              </div>
              <p class="viz-caption">
                A cursor visits every bar, holding the current leader. The
                last visit determines the result. Three bars → three steps.
                Fifty bars → fifty steps.
              </p>
            </div>
          </div>
        </section>

        <!-- Slide 3: Insight -->
        <section
          class="slide slide-insight"
          data-init="scene-4-insight"
          data-notes="Shift the work to insertion time. Maintain counts AND a mostFrequent variable. On insert, compare the new count against counts[mostFrequent]; update if larger. Query becomes a single variable read."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 4 · the insight</span>
            <h1>Pay at insertion, read for free</h1>
          </header>

          <div class="split split-wide-left">
            <div class="stack">
              <p class="lead">
                Move the work off the hot path. Maintain a single
                <code style="font-family:var(--font-mono)">mostFrequent</code>
                variable next to the counts map and update it whenever a new
                count overtakes the current leader.
              </p>

              <div class="callout callout--insight">
                <strong>One sentence.</strong>
                Identify which operation is on the hot path, and pay the cost
                on the cold one.
              </div>

              <div class="code"><span class="c-ty">Map</span>&lt;<span class="c-ty">Event</span>, <span class="c-ty">Integer</span>&gt; counts = <span class="c-key">new</span> <span class="c-ty">HashMap</span>&lt;&gt;();
<span class="c-ty">Event</span> mostFrequent = <span class="c-key">null</span>;
<span class="c-key">int</span>   mostCount    = <span class="c-num">0</span>;

<span class="c-key">void</span> <span class="c-fn">onEvent</span>(<span class="c-ty">Event</span> e) {
  <span class="c-key">int</span> c = counts.merge(e, <span class="c-num">1</span>, <span class="c-ty">Integer</span>::sum);
  <span class="c-key">if</span> (c &gt; mostCount) {              <span class="c-com">// O(1) update</span>
    mostCount = c; mostFrequent = e;
  }
}

<span class="c-ty">Event</span> <span class="c-fn">mostFrequent</span>() {
  <span class="c-key">return</span> mostFrequent;             <span class="c-com">// O(1) read</span>
}</div>

              <div class="complexity" role="note">
                <span class="pill time">Insert: O(1)</span>
                <span class="pill time">Query: O(1)</span>
                <span class="pill space">Space: O(k)</span>
              </div>
            </div>

            <div class="viz">
              <h2>State after all 9 events</h2>
              <div class="split" style="grid-template-columns: 1.4fr 1fr; gap: 18px;">
                <div class="bar-chart" id="scene-4-insight-bars"></div>
                <div class="most-frequent-card" id="scene-4-insight-most">
                  <span class="sum-label">most frequent</span>
                  <span class="big-number">C</span>
                  <span class="sum-explain">count = 4</span>
                </div>
              </div>
              <p class="viz-caption">
                The leader pill is purple. The card on the right is what the
                query returns — a single variable read.
              </p>
            </div>
          </div>
        </section>

        <!-- Slide 4: Walkthrough -->
        <section
          class="slide slide-walkthrough"
          data-init="scene-4-walkthrough"
          data-notes="Step events one at a time. Watch counts update and the mostFrequent label flash exactly when the leader changes. For this stream, it flashes only once — on the final C."
        >
          <header class="slide-header">
            <span class="scene-tag">Scene 4 · walkthrough</span>
            <h1>Ingest one event, query for free</h1>
          </header>

          <p class="lead">
            <strong>Step</strong> consumes the next event. Counts update on
            insertion. The big card on the right is the query result — note
            how rarely it actually changes.
          </p>

          <div class="viz">
            <h2>Live stream</h2>
            <div class="chip-row" id="scene-4-walk-stream"></div>

            <div class="split" style="grid-template-columns: 1.4fr 1fr; gap: 18px;">
              <div class="bar-chart" id="scene-4-walk-bars"></div>
              <div class="most-frequent-card" id="scene-4-walk-most">
                <span class="sum-label">most frequent</span>
                <span class="big-number" id="scene-4-walk-most-letter">—</span>
                <span class="sum-explain" id="scene-4-walk-most-explain">no events yet</span>
              </div>
            </div>

            <div class="viz-actions">
              <button class="btn btn--data" data-action="step">Step</button>
              <button class="btn" data-action="run">Run all</button>
              <span class="spacer"></span>
              <button class="btn btn--ghost" data-action="reset">Reset</button>
            </div>

            <p class="viz-caption">
              The card flashes amber only when the leader changes. Eight of
              nine steps don't trigger a flash — that's the whole point.
            </p>
          </div>

          <div class="complexity" role="note">
            <span class="pill time">Insert: O(1)</span>
            <span class="pill time">Query: O(1)</span>
            <span class="pill space">Space: O(k)</span>
          </div>
        </section>

      </article>
    </template>

    <!--
      SCENE TEMPLATE (copy-pasteable starter for new scenes — Phase 2+).
      Drop a block like this anywhere in <body>. The engine discovers it via
      document.querySelectorAll('template[id^="scene-"]').

      <template id="scene-2">
        <article class="scene" data-scene-title="Your scene title">
          <section class="slide slide-problem"     data-init="scene-2-problem"     data-notes="One-line hint.">…</section>
          <section class="slide slide-naive"       data-init="scene-2-naive"       data-notes="One-line hint.">…</section>
          <section class="slide slide-insight"     data-init="scene-2-insight"     data-notes="One-line hint.">…</section>
          <section class="slide slide-walkthrough" data-init="scene-2-walkthrough" data-notes="One-line hint.">…</section>
        </article>
      </template>
    -->

    <!-- ===================================================================
         SCRIPT — navigation engine + per-slide init hooks.
         =================================================================== -->
    <script>
      (() => {
        'use strict';

        /* ---------------------------------------------------------------
           Tiny DOM helpers.
           --------------------------------------------------------------- */
        const $  = (sel, root = document) => root.querySelector(sel);
        const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];

        /* ---------------------------------------------------------------
           Scene discovery — no hardcoded list.
           --------------------------------------------------------------- */
        const sceneTemplates = $$('template[id^="scene-"]').sort((a, b) => {
          const na = parseInt(a.id.replace('scene-', ''), 10);
          const nb = parseInt(b.id.replace('scene-', ''), 10);
          return na - nb;
        });

        const scenes = sceneTemplates.map((tpl, i) => {
          // Build once just to read metadata (slide count, title).
          const probe = tpl.content.cloneNode(true).querySelector('.scene');
          const slides = probe ? $$('.slide', probe) : [];
          return {
            idx: i + 1,
            id: tpl.id,
            title: probe?.dataset.sceneTitle || `Scene ${i + 1}`,
            slideCount: slides.length,
            template: tpl,
          };
        });

        if (scenes.length === 0) {
          $('#stage').innerHTML =
            '<div style="margin:64px auto;font-family:var(--font-body);color:var(--gray-600)">No scenes found. Add a &lt;template id="scene-1"&gt; block to get started.</div>';
          return;
        }

        /* ---------------------------------------------------------------
           Flat slide index (used for prev/next).
           --------------------------------------------------------------- */
        const flat = [];
        scenes.forEach(s => {
          for (let m = 1; m <= s.slideCount; m++) flat.push({ scene: s.idx, slide: m });
        });

        /* ---------------------------------------------------------------
           Current position + active-timer bookkeeping.
           --------------------------------------------------------------- */
        let current = { scene: 1, slide: 1 };
        const timers = { timeouts: [], intervals: [] };

        const setT = (fn, ms) => {
          const id = setTimeout(fn, ms);
          timers.timeouts.push(id);
          return id;
        };
        const setI = (fn, ms) => {
          const id = setInterval(fn, ms);
          timers.intervals.push(id);
          return id;
        };
        const clearTimers = () => {
          timers.timeouts.forEach(clearTimeout);
          timers.intervals.forEach(clearInterval);
          timers.timeouts = [];
          timers.intervals = [];
        };

        /* ---------------------------------------------------------------
           Render the current slide into the stage.
           --------------------------------------------------------------- */
        const stage      = $('#stage');
        const notesPanel = $('#notes');
        const notesText  = $('.notes-content', notesPanel);
        const overview   = $('#overview');
        const navJump    = $('#nav-jump');

        function buildSlide(sceneIdx, slideIdx) {
          const tpl = scenes[sceneIdx - 1].template;
          const article = tpl.content.cloneNode(true).querySelector('.scene');
          const slides = $$('.slide', article);
          return slides[slideIdx - 1] || null;
        }

        function clampPosition() {
          current.scene = Math.max(1, Math.min(scenes.length, current.scene));
          const slideCount = scenes[current.scene - 1].slideCount;
          current.slide = Math.max(1, Math.min(slideCount, current.slide));
        }

        function render({ updateHash = true } = {}) {
          clearTimers();
          clampPosition();
          const slide = buildSlide(current.scene, current.slide);
          stage.innerHTML = '';
          if (!slide) return;

          stage.appendChild(slide);
          stage.scrollTop = 0;

          // Run init hook for the slide.
          const initKey = slide.dataset.init;
          if (initKey && slideInit[initKey]) {
            try {
              slideInit[initKey](slide);
            } catch (err) {
              console.error('slide init failed for', initKey, err);
            }
          }

          updateProgress();
          updateNotes(slide);
          updateNavJump();
          if (updateHash) writeHash();
        }

        function updateProgress() {
          $('#progress-scene').textContent = `${current.scene} / ${scenes.length}`;
          $('#progress-slide').textContent = `Slide ${current.slide} of ${scenes[current.scene - 1].slideCount}`;
          $('#progress-title').textContent = scenes[current.scene - 1].title;
          const idx = flat.findIndex(s => s.scene === current.scene && s.slide === current.slide);
          const pct = ((idx + 1) / flat.length) * 100;
          $('#progress-fill').style.width = pct + '%';
          $('#prev-btn').disabled = (idx <= 0);
          $('#next-btn').disabled = (idx >= flat.length - 1);
        }

        function updateNotes(slide) {
          const txt = (slide.dataset.notes || '').trim();
          notesText.textContent = txt;
        }

        function updateNavJump() {
          if (!navJump.dataset.populated) {
            navJump.innerHTML = '';
            scenes.forEach(s => {
              const opt = document.createElement('option');
              opt.value = String(s.idx);
              opt.textContent = `${s.idx}. ${s.title}`;
              navJump.appendChild(opt);
            });
            navJump.dataset.populated = '1';
          }
          navJump.value = String(current.scene);
        }

        /* ---------------------------------------------------------------
           URL hash sync. Format: #s<scene>/m<slide>
           --------------------------------------------------------------- */
        function writeHash() {
          const want = `#s${current.scene}/m${current.slide}`;
          if (location.hash !== want) {
            history.replaceState(null, '', want);
          }
        }

        function readHash() {
          const m = /^#s(\d+)\/m(\d+)$/.exec(location.hash);
          if (m) {
            current.scene = parseInt(m[1], 10);
            current.slide = parseInt(m[2], 10);
            clampPosition();
            return true;
          }
          return false;
        }

        /* ---------------------------------------------------------------
           Movement helpers.
           --------------------------------------------------------------- */
        function move(delta) {
          const idx = flat.findIndex(s => s.scene === current.scene && s.slide === current.slide);
          const next = Math.max(0, Math.min(flat.length - 1, idx + delta));
          current = { ...flat[next] };
          render();
        }
        function goTo(scene, slide = 1) {
          current = { scene, slide };
          render();
        }
        function first() { current = { scene: 1, slide: 1 }; render(); }
        function last()  { current = { ...flat[flat.length - 1] }; render(); }

        /* ---------------------------------------------------------------
           Keyboard.
           --------------------------------------------------------------- */
        function isTypingTarget(t) {
          return t && t.matches && t.matches('input, textarea, select, [contenteditable="true"]');
        }

        document.addEventListener('keydown', (e) => {
          if (isTypingTarget(e.target)) return;
          // Modifiers off — pure navigation keys only.
          if (e.metaKey || e.ctrlKey || e.altKey) return;

          const overviewOpen = overview.open;

          switch (e.key) {
            case 'ArrowRight':
            case 'PageDown':
              if (overviewOpen) return;
              e.preventDefault();
              move(1);
              break;
            case 'ArrowLeft':
            case 'PageUp':
              if (overviewOpen) return;
              e.preventDefault();
              move(-1);
              break;
            case 'Home':
              if (overviewOpen) return;
              e.preventDefault();
              first();
              break;
            case 'End':
              if (overviewOpen) return;
              e.preventDefault();
              last();
              break;
            case 'Escape':
              e.preventDefault();
              if (overviewOpen) overview.close();
              else overview.showModal();
              break;
            case 'n':
            case 'N':
              if (overviewOpen) return;
              e.preventDefault();
              toggleNotes();
              break;
          }
        });

        /* ---------------------------------------------------------------
           Click handlers (prev/next/overview/notes).
           --------------------------------------------------------------- */
        $('#prev-btn').addEventListener('click', () => move(-1));
        $('#next-btn').addEventListener('click', () => move(1));
        $('#overview-btn').addEventListener('click', () => {
          if (overview.open) overview.close();
          else overview.showModal();
        });
        $('#overview-close').addEventListener('click', () => overview.close());
        $('#notes-btn').addEventListener('click', toggleNotes);
        $('#notes-close').addEventListener('click', () => notesPanel.classList.remove('open'));

        navJump.addEventListener('change', () => {
          const n = parseInt(navJump.value, 10);
          if (Number.isFinite(n)) goTo(n, 1);
        });

        function toggleNotes() {
          notesPanel.classList.toggle('open');
          notesPanel.setAttribute(
            'aria-hidden',
            notesPanel.classList.contains('open') ? 'false' : 'true'
          );
        }

        /* ---------------------------------------------------------------
           Overview grid (built once).
           --------------------------------------------------------------- */
        const overviewGrid = $('#overview-grid');
        scenes.forEach(s => {
          const tile = document.createElement('button');
          tile.className = 'scene-tile';
          tile.type = 'button';
          tile.innerHTML = `
            <span class="tile-num">scene ${s.idx}</span>
            <span class="tile-title">${s.title}</span>
            <span class="tile-meta">${s.slideCount} slide${s.slideCount === 1 ? '' : 's'}</span>
          `;
          tile.addEventListener('click', () => {
            goTo(s.idx, 1);
            overview.close();
          });
          overviewGrid.appendChild(tile);
        });

        /* ---------------------------------------------------------------
           Hash listener (back/forward navigation).
           --------------------------------------------------------------- */
        window.addEventListener('hashchange', () => {
          if (readHash()) render({ updateHash: false });
        });

        /* ===============================================================
           Per-slide init hooks for Scene 1.
           Each hook receives the freshly cloned slide element and wires
           up interactivity for that slide only.
           =============================================================== */
        const SCENE_1_INPUT = [1, 3, 4, 2, 1, 0, 0, 4, 0, 1, 2, 3, 4, 31, 54, 21, 51];

        function bucketBand(v) {
          if (v < 10)  return '0-9';
          if (v < 20)  return '10-19';
          if (v < 30)  return '20-29';
          if (v < 40)  return '30-39';
          if (v < 50)  return '40-49';
          return '50-59';
        }

        function renderChips(host, values) {
          host.innerHTML = '';
          values.forEach((v, i) => {
            const c = document.createElement('span');
            c.className = 'chip';
            c.dataset.v = v;
            c.dataset.i = i;
            c.dataset.bucket = bucketBand(v);
            c.textContent = v;
            host.appendChild(c);
          });
          return [...host.children];
        }

        function buildBucketGrid(host, count = 101) {
          host.innerHTML = '';
          for (let v = 0; v < count; v++) {
            const b = document.createElement('div');
            b.className = 'bucket';
            b.dataset.v = v;
            b.dataset.count = '0';
            const fill = document.createElement('div');
            fill.className = 'bucket-fill';
            b.appendChild(fill);
            const c = document.createElement('div');
            c.className = 'bucket-count';
            b.appendChild(c);
            host.appendChild(b);
          }
          return [...host.children];
        }

        function renderCharChips(host, chars) {
          host.innerHTML = '';
          chars.forEach((ch, i) => {
            const c = document.createElement('span');
            c.className = 'chip';
            c.dataset.ch = ch;
            c.dataset.code = ch.charCodeAt(0);
            c.dataset.i = i;
            c.textContent = ch;
            host.appendChild(c);
          });
          return [...host.children];
        }

        function setBucketCount(cell, newCount) {
          cell.dataset.count = String(newCount);
          $('.bucket-count', cell).textContent = newCount > 0 ? String(newCount) : '';
          $('.bucket-fill', cell).style.height = Math.min(100, newCount * 24) + '%';
          cell.classList.toggle('bucket-active', newCount > 0);
        }

        /* ---- Scene 1, Slide 1 — Problem (static) ---- */
        function initSceneOneProblem(slide) {
          const host = $('#scene-1-input-chips', slide);
          renderChips(host, SCENE_1_INPUT);
        }

        /* ---- Scene 1, Slide 2 — Naive sort + walk ---- */
        function initSceneOneNaive(slide) {
          const host    = $('#scene-1-naive-chips', slide);
          const output  = $('#scene-1-naive-output', slide);
          const runBtn  = $('[data-action="run-sort"]',  slide);
          const walkBtn = $('[data-action="walk-emit"]', slide);
          const resetBtn= $('[data-action="reset"]',     slide);

          const chips = renderChips(host, SCENE_1_INPUT);

          // Pre-compute stable sorted order: sortedOrder[origIdx] = newIdx
          const tagged = SCENE_1_INPUT.map((v, i) => ({ v, i }));
          tagged.sort((a, b) => a.v - b.v || a.i - b.i);
          const sortedOrder = new Array(SCENE_1_INPUT.length);
          tagged.forEach((item, newIdx) => (sortedOrder[item.i] = newIdx));

          let sorted = false;

          function pixelsPerChip() {
            if (chips.length < 2) return 0;
            const a = chips[0].getBoundingClientRect();
            const b = chips[1].getBoundingClientRect();
            return b.left - a.left;
          }

          runBtn.addEventListener('click', () => {
            if (sorted) return;
            const step = pixelsPerChip();
            chips.forEach((chip, i) => {
              const newIdx = sortedOrder[i];
              chip.style.transform = `translateX(${(newIdx - i) * step}px)`;
            });
            sorted = true;
            runBtn.disabled = true;
            walkBtn.disabled = false;
          });

          walkBtn.addEventListener('click', () => {
            walkBtn.disabled = true;
            output.innerHTML = '';
            let i = 0;
            let line = [];
            let prev = null;

            const sortedTagged = tagged; // already sorted
            const stepDelay = 220;

            function tick() {
              if (i >= sortedTagged.length) {
                if (line.length) output.textContent += (output.textContent ? '\n' : '') + line.join(',');
                chips.forEach(c => c.classList.remove('chip-cursor'));
                return;
              }
              const it = sortedTagged[i];
              if (prev !== null && it.v !== prev) {
                output.textContent += (output.textContent ? '\n' : '') + line.join(',');
                line = [];
              }
              line.push(it.v);
              prev = it.v;
              chips.forEach(c => c.classList.remove('chip-cursor'));
              chips[it.i].classList.add('chip-cursor');
              i++;
              setT(tick, stepDelay);
            }
            tick();
          });

          resetBtn.addEventListener('click', () => {
            sorted = false;
            chips.forEach(c => {
              c.style.transform = '';
              c.classList.remove('chip-cursor');
            });
            output.innerHTML = '<span class="placeholder">Output will fill here…</span>';
            runBtn.disabled = false;
            walkBtn.disabled = true;
          });
        }

        /* ---- Scene 1, Slide 3 — Insight: fly to buckets ---- */
        function initSceneOneInsight(slide) {
          const chipsHost = $('#scene-1-insight-chips', slide);
          const buckHost  = $('#scene-1-insight-buckets', slide);
          const runBtn    = $('[data-action="run-pass"]', slide);
          const stepBtn   = $('[data-action="step-one"]', slide);
          const resetBtn  = $('[data-action="reset"]',    slide);

          const chips   = renderChips(chipsHost, SCENE_1_INPUT);
          const buckets = buildBucketGrid(buckHost);
          let idx = 0;
          let busy = false;

          function consumeOne() {
            if (idx >= chips.length || busy) return false;
            busy = true;
            const chip = chips[idx];
            const v = parseInt(chip.dataset.v, 10);
            const bucket = buckets[v];

            const cr = chip.getBoundingClientRect();
            const br = bucket.getBoundingClientRect();
            const dx = (br.left + br.width / 2) - (cr.left + cr.width / 2);
            const dy = (br.top  + br.height / 2) - (cr.top  + cr.height / 2);

            chip.style.transform = `translate(${dx}px, ${dy}px) scale(0.35)`;
            chip.style.opacity = '0';
            chip.classList.add('chip-consumed');

            setT(() => {
              const c = parseInt(bucket.dataset.count, 10) + 1;
              bucket.dataset.count = String(c);
              $('.bucket-count', bucket).textContent = String(c);
              const fill = $('.bucket-fill', bucket);
              fill.style.height = Math.min(100, c * 24) + '%';
              bucket.classList.add('bucket-active');
              bucket.classList.add('bucket-flash');
              setT(() => bucket.classList.remove('bucket-flash'), 240);
              busy = false;
            }, 360);

            idx++;
            return true;
          }

          stepBtn.addEventListener('click', () => {
            consumeOne();
          });

          runBtn.addEventListener('click', () => {
            if (idx >= chips.length) return;
            runBtn.disabled = true;
            stepBtn.disabled = true;
            const tick = () => {
              if (idx >= chips.length) {
                return;
              }
              consumeOne();
              setT(tick, 220);
            };
            tick();
          });

          resetBtn.addEventListener('click', () => {
            idx = 0;
            busy = false;
            runBtn.disabled  = false;
            stepBtn.disabled = false;
            chips.forEach(c => {
              c.style.transform = '';
              c.style.opacity = '';
              c.classList.remove('chip-consumed');
            });
            buckets.forEach(b => {
              b.dataset.count = '0';
              $('.bucket-count', b).textContent = '';
              $('.bucket-fill', b).style.height = '0%';
              b.classList.remove('bucket-active', 'bucket-flash');
            });
          });
        }

        /* ---- Scene 1, Slide 4 — Walkthrough (count + print) ---- */
        function initSceneOneWalkthrough(slide) {
          const chipsHost = $('#scene-1-walk-chips', slide);
          const buckHost  = $('#scene-1-walk-buckets', slide);
          const stepBtn   = $('[data-action="step"]',   slide);
          const runAllBtn = $('[data-action="run-all"]',slide);
          const printBtn  = $('[data-action="print"]',  slide);
          const resetBtn  = $('[data-action="reset"]',  slide);
          const slotsHost = $('#scene-1-walk-sb-slots', slide);
          const capLabel  = $('#scene-1-walk-sb-cap',   slide);
          const sbBuffer  = $('#scene-1-walk-sb',       slide);
          const output    = $('#scene-1-walk-output',   slide);

          const chips   = renderChips(chipsHost, SCENE_1_INPUT);
          const buckets = buildBucketGrid(buckHost);
          let idx = 0;
          let busy = false;
          let phase = 'count';  // 'count' | 'print' | 'done'

          // Buffer setup (16 slots; capacity stays constant)
          const CAPACITY = 16;
          slotsHost.innerHTML = '';
          const slots = [];
          for (let i = 0; i < CAPACITY; i++) {
            const s = document.createElement('div');
            s.className = 'sb-slot';
            slotsHost.appendChild(s);
            slots.push(s);
          }
          function bufferWrite(text) {
            for (let i = 0; i < CAPACITY; i++) {
              if (i < text.length) {
                slots[i].textContent = text[i];
                slots[i].classList.add('filled');
              } else {
                slots[i].textContent = '';
                slots[i].classList.remove('filled');
              }
            }
            capLabel.textContent = `len ${text.length} / cap ${CAPACITY}`;
            sbBuffer.classList.add('flash');
            setT(() => sbBuffer.classList.remove('flash'), 240);
          }
          function bufferClear() {
            slots.forEach(s => { s.textContent = ''; s.classList.remove('filled'); });
            capLabel.textContent = `len 0 / cap ${CAPACITY}`;
            sbBuffer.classList.add('cleared');
            setT(() => sbBuffer.classList.remove('cleared'), 320);
          }

          function checkCountDone() {
            if (idx >= chips.length) {
              printBtn.disabled = false;
              stepBtn.disabled  = true;
              runAllBtn.disabled= true;
              phase = 'count-done';
            }
          }

          function stepOne() {
            if (idx >= chips.length || busy) return false;
            busy = true;
            const chip = chips[idx];
            const v = parseInt(chip.dataset.v, 10);
            const bucket = buckets[v];

            const cr = chip.getBoundingClientRect();
            const br = bucket.getBoundingClientRect();
            const dx = (br.left + br.width / 2) - (cr.left + cr.width / 2);
            const dy = (br.top  + br.height / 2) - (cr.top  + cr.height / 2);

            chip.style.transform = `translate(${dx}px, ${dy}px) scale(0.35)`;
            chip.style.opacity = '0';
            chip.classList.add('chip-consumed');

            setT(() => {
              const c = parseInt(bucket.dataset.count, 10) + 1;
              bucket.dataset.count = String(c);
              $('.bucket-count', bucket).textContent = String(c);
              const fill = $('.bucket-fill', bucket);
              fill.style.height = Math.min(100, c * 24) + '%';
              bucket.classList.add('bucket-active');
              bucket.classList.add('bucket-flash');
              setT(() => bucket.classList.remove('bucket-flash'), 240);
              busy = false;
              idx++;
              checkCountDone();
            }, 320);
            return true;
          }

          stepBtn.addEventListener('click', stepOne);
          runAllBtn.addEventListener('click', () => {
            if (idx >= chips.length) return;
            stepBtn.disabled = true;
            runAllBtn.disabled = true;
            const tick = () => {
              if (idx >= chips.length) return;
              stepOne();
              setT(tick, 220);
            };
            tick();
          });

          printBtn.addEventListener('click', () => {
            if (phase === 'print' || phase === 'done') return;
            phase = 'print';
            printBtn.disabled = true;
            output.innerHTML = '';
            buckets.forEach(b => b.classList.remove('bucket-cursor'));

            let v = 0;
            function walk() {
              // Move cursor to current v
              buckets.forEach(b => b.classList.remove('bucket-cursor'));
              if (v > 100) {
                phase = 'done';
                return;
              }
              const bucket = buckets[v];
              bucket.classList.add('bucket-cursor');
              const c = parseInt(bucket.dataset.count, 10);

              if (c > 0) {
                // Build line with reused buffer
                let line = String(v);
                for (let i = 1; i < c; i++) line += ',' + v;
                bufferWrite(line.slice(0, CAPACITY));
                output.textContent += (output.textContent ? '\n' : '') + line;
                v++;
                // wait, then wipe and continue
                setT(() => {
                  bufferClear();
                  setT(walk, 220);
                }, 480);
              } else {
                v++;
                setT(walk, 16); // fast skip when empty
              }
            }
            walk();
          });

          resetBtn.addEventListener('click', () => {
            idx = 0;
            busy = false;
            phase = 'count';
            stepBtn.disabled = false;
            runAllBtn.disabled = false;
            printBtn.disabled = true;
            chips.forEach(c => {
              c.style.transform = '';
              c.style.opacity = '';
              c.classList.remove('chip-consumed');
            });
            buckets.forEach(b => {
              b.dataset.count = '0';
              $('.bucket-count', b).textContent = '';
              $('.bucket-fill', b).style.height = '0%';
              b.classList.remove('bucket-active', 'bucket-flash', 'bucket-cursor');
            });
            output.innerHTML = '<span class="placeholder">Lines will print here…</span>';
            bufferClear();
          });
        }

        /* ---- Scene 1, Slide 5 — StringBuilder buffer reuse ---- */
        function initSceneOneStringBuilder(slide) {
          const slotsHost = $('#scene-1-sb-slots',  slide);
          const capLabel  = $('#scene-1-sb-cap',    slide);
          const sbBuffer  = $('#scene-1-sb-buffer', slide);
          const appendBtn = $('[data-action="append"]', slide);
          const clearBtn  = $('[data-action="clear"]',  slide);
          const resetBtn  = $('[data-action="reset"]',  slide);
          const output    = $('#scene-1-sb-output', slide);

          const LINES = ['0,0,0','1,1,1','2,2','3,3','4,4,4','21','31','51','54,54'];
          const CAPACITY = 16;

          slotsHost.innerHTML = '';
          const slots = [];
          for (let i = 0; i < CAPACITY; i++) {
            const s = document.createElement('div');
            s.className = 'sb-slot';
            slotsHost.appendChild(s);
            slots.push(s);
          }

          let lineIdx = 0;
          let bufferLength = 0;

          function paint(text) {
            for (let i = 0; i < CAPACITY; i++) {
              if (i < text.length) {
                slots[i].textContent = text[i];
                slots[i].classList.add('filled');
              } else {
                slots[i].textContent = '';
                slots[i].classList.remove('filled');
              }
            }
            bufferLength = text.length;
            capLabel.textContent = `len ${bufferLength} / cap ${CAPACITY}`;
          }

          function flash() {
            sbBuffer.classList.add('flash');
            setT(() => sbBuffer.classList.remove('flash'), 240);
          }

          appendBtn.addEventListener('click', () => {
            if (lineIdx >= LINES.length) {
              appendBtn.disabled = true;
              return;
            }
            const line = LINES[lineIdx];
            paint(line.slice(0, CAPACITY));
            flash();
            if (output.querySelector('.placeholder')) output.innerHTML = '';
            output.textContent += (output.textContent ? '\n' : '') + line;
            lineIdx++;
            if (lineIdx >= LINES.length) appendBtn.disabled = true;
          });

          clearBtn.addEventListener('click', () => {
            paint('');
            sbBuffer.classList.add('cleared');
            setT(() => sbBuffer.classList.remove('cleared'), 320);
          });

          resetBtn.addEventListener('click', () => {
            lineIdx = 0;
            paint('');
            output.innerHTML = '<span class="placeholder">Each appended line lands here.</span>';
            appendBtn.disabled = false;
          });

          // start empty
          paint('');
        }

        /* ===============================================================
           Per-slide init hooks for Scene 2 — First non-repeating character.
           =============================================================== */
        const SCENE_2_STR = 'aabbcdeeff';

        /* Scene 2, Slide 1 — Problem (static) */
        function initSceneTwoProblem(slide) {
          const host = $('#scene-2-input-chips', slide);
          const chips = renderCharChips(host, [...SCENE_2_STR]);
          // Pre-highlight the answer so the final state is visible immediately.
          chips[4].classList.add('chip-found');
        }

        /* Scene 2, Slide 2 — Naive nested scan */
        function initSceneTwoNaive(slide) {
          const host     = $('#scene-2-naive-chips', slide);
          const runBtn   = $('[data-action="run-scan"]', slide);
          const resetBtn = $('[data-action="reset"]', slide);
          const chips = renderCharChips(host, [...SCENE_2_STR]);

          let busy = false;

          function clearScanCursors() {
            chips.forEach(c => c.classList.remove('chip-cursor', 'chip-cursor--anchor'));
          }

          runBtn.addEventListener('click', () => {
            if (busy) return;
            busy = true;
            runBtn.disabled = true;
            chips.forEach(c => c.classList.remove('chip-cursor', 'chip-cursor--anchor', 'chip-found'));

            let i = 0;

            function tryI() {
              if (i >= SCENE_2_STR.length) {
                busy = false;
                runBtn.disabled = false;
                return;
              }
              clearScanCursors();
              chips[i].classList.add('chip-cursor--anchor');
              let j = 0;
              let foundDup = false;

              function nextJ() {
                if (j === i) j++;
                if (j >= SCENE_2_STR.length) {
                  if (!foundDup) {
                    clearScanCursors();
                    chips[i].classList.add('chip-found');
                    busy = false;
                    return;
                  }
                  i++;
                  setT(tryI, 200);
                  return;
                }
                chips.forEach((c, idx) => {
                  if (idx !== i) c.classList.remove('chip-cursor');
                });
                chips[j].classList.add('chip-cursor');
                if (SCENE_2_STR[j] === SCENE_2_STR[i]) {
                  foundDup = true;
                  setT(() => { i++; tryI(); }, 280);
                  return;
                }
                j++;
                setT(nextJ, 80);
              }
              nextJ();
            }
            tryI();
          });

          resetBtn.addEventListener('click', () => {
            busy = false;
            runBtn.disabled = false;
            chips.forEach(c => c.classList.remove('chip-cursor', 'chip-cursor--anchor', 'chip-found'));
          });
        }

        /* Scene 2, Slide 3 — Insight: post-pass-1 snapshot (static) */
        function initSceneTwoInsight(slide) {
          const countsHost = $('#scene-2-insight-counts', slide);
          const slots = buildBucketGrid(countsHost, 128);
          const counts = new Array(128).fill(0);
          for (const ch of SCENE_2_STR) counts[ch.charCodeAt(0)]++;
          counts.forEach((c, code) => {
            if (c > 0) setBucketCount(slots[code], c);
          });
        }

        /* Scene 2, Slide 4 — Walkthrough: two passes, interactive */
        function initSceneTwoWalkthrough(slide) {
          const chipsHost  = $('#scene-2-walk-chips', slide);
          const countsHost = $('#scene-2-walk-counts', slide);
          const step1Btn   = $('[data-action="step-1"]', slide);
          const run1Btn    = $('[data-action="run-1"]',  slide);
          const step2Btn   = $('[data-action="step-2"]', slide);
          const run2Btn    = $('[data-action="run-2"]',  slide);
          const resetBtn   = $('[data-action="reset"]',  slide);
          const resultBox  = $('#scene-2-walk-result',   slide);

          const chips = renderCharChips(chipsHost, [...SCENE_2_STR]);
          const slots = buildBucketGrid(countsHost, 128);

          let i = 0;           // pass 1 cursor (position in string)
          let j = 0;           // pass 2 cursor (position in string)
          let phase = 'pass1'; // 'pass1' | 'pass2' | 'done'
          let busy = false;

          function clearAllCursors() {
            chips.forEach(c => c.classList.remove('chip-cursor', 'chip-cursor--anchor'));
            slots.forEach(s => s.classList.remove('bucket-cursor'));
          }

          function step1() {
            if (phase !== 'pass1' || busy) return;
            if (i >= SCENE_2_STR.length) {
              phase = 'pass2';
              clearAllCursors();
              step1Btn.disabled = true;
              run1Btn.disabled  = true;
              step2Btn.disabled = false;
              run2Btn.disabled  = false;
              resultBox.innerHTML = '<strong>Pass 1 complete.</strong> Now walk the string again, returning the first count == 1.';
              return;
            }
            busy = true;
            clearAllCursors();
            chips[i].classList.add('chip-cursor--anchor');
            const code = parseInt(chips[i].dataset.code, 10);
            const cell = slots[code];
            const c = parseInt(cell.dataset.count, 10) + 1;
            setBucketCount(cell, c);
            cell.classList.add('bucket-flash');
            setT(() => cell.classList.remove('bucket-flash'), 240);
            i++;
            setT(() => { busy = false; }, 180);
          }

          function step2() {
            if (phase !== 'pass2' || busy) return;
            if (j >= SCENE_2_STR.length) {
              phase = 'done';
              clearAllCursors();
              step2Btn.disabled = true;
              run2Btn.disabled  = true;
              resultBox.innerHTML = '<strong>No non-repeating character.</strong>';
              return;
            }
            busy = true;
            clearAllCursors();
            chips[j].classList.add('chip-cursor');
            const code = parseInt(chips[j].dataset.code, 10);
            const cell = slots[code];
            cell.classList.add('bucket-cursor');
            setT(() => cell.classList.remove('bucket-cursor'), 360);
            if (parseInt(cell.dataset.count, 10) === 1) {
              chips[j].classList.remove('chip-cursor');
              chips[j].classList.add('chip-found');
              resultBox.innerHTML = `<strong>Answer:</strong> <code style="font-family:var(--font-mono)">'${SCENE_2_STR[j]}'</code> at index ${j}.`;
              phase = 'done';
              step2Btn.disabled = true;
              run2Btn.disabled  = true;
              busy = false;
              return;
            }
            j++;
            setT(() => { busy = false; }, 220);
          }

          step1Btn.addEventListener('click', step1);
          step2Btn.addEventListener('click', step2);

          run1Btn.addEventListener('click', () => {
            if (phase !== 'pass1') return;
            step1Btn.disabled = true;
            run1Btn.disabled  = true;
            const tick = () => {
              if (phase !== 'pass1') return;
              step1();
              setT(tick, 200);
            };
            tick();
          });

          run2Btn.addEventListener('click', () => {
            if (phase !== 'pass2') return;
            step2Btn.disabled = true;
            run2Btn.disabled  = true;
            const tick = () => {
              if (phase !== 'pass2') return;
              step2();
              setT(tick, 240);
            };
            tick();
          });

          resetBtn.addEventListener('click', () => {
            i = 0; j = 0;
            phase = 'pass1';
            busy = false;
            chips.forEach(c => c.classList.remove('chip-cursor', 'chip-cursor--anchor', 'chip-found'));
            slots.forEach((s, code) => setBucketCount(s, 0));
            step1Btn.disabled = false;
            run1Btn.disabled  = false;
            step2Btn.disabled = true;
            run2Btn.disabled  = true;
            resultBox.textContent = 'Answer will appear here.';
          });
        }

        /* ===============================================================
           Per-slide init hooks for Scene 3 — Find the missing number.
           =============================================================== */
        const SCENE_3_INPUT = [3, 1, 5, 2];   // example array, missing 4
        const SCENE_3_N     = 5;              // range upper bound

        function renderIntChips(host, values, classes = []) {
          host.innerHTML = '';
          values.forEach((v, i) => {
            const c = document.createElement('span');
            c.className = 'chip ' + classes.join(' ');
            c.dataset.v = v;
            c.dataset.i = i;
            c.textContent = v;
            host.appendChild(c);
          });
          return [...host.children];
        }

        /* Scene 3, Slide 1 — Problem (static) */
        function initSceneThreeProblem(slide) {
          renderIntChips($('#scene-3-input-chips', slide), SCENE_3_INPUT);
          const rangeHost = $('#scene-3-full-range', slide);
          rangeHost.innerHTML = '';
          for (let v = 1; v <= SCENE_3_N; v++) {
            const c = document.createElement('span');
            c.className = 'chip';
            if (v === 4) {
              c.classList.add('chip-missing');
              c.textContent = '?';
            } else {
              c.textContent = v;
            }
            rangeHost.appendChild(c);
          }
        }

        /* Scene 3, Slide 2 — Naive sort + walk for the missing gap */
        function initSceneThreeNaive(slide) {
          const host     = $('#scene-3-naive-chips', slide);
          const runBtn   = $('[data-action="run"]', slide);
          const resetBtn = $('[data-action="reset"]', slide);
          const chips = renderIntChips(host, SCENE_3_INPUT);

          // Stable sorted order
          const tagged = SCENE_3_INPUT.map((v, i) => ({ v, i }));
          tagged.sort((a, b) => a.v - b.v || a.i - b.i);
          const sortedOrder = new Array(SCENE_3_INPUT.length);
          tagged.forEach((item, newIdx) => (sortedOrder[item.i] = newIdx));

          let phase = 'idle';

          function pixelsPerChip() {
            if (chips.length < 2) return 0;
            const a = chips[0].getBoundingClientRect();
            const b = chips[1].getBoundingClientRect();
            return b.left - a.left;
          }

          runBtn.addEventListener('click', () => {
            if (phase !== 'idle') return;
            phase = 'sorting';
            runBtn.disabled = true;
            const step = pixelsPerChip();
            chips.forEach((chip, i) => {
              chip.style.transform = `translateX(${(sortedOrder[i] - i) * step}px)`;
            });
            setT(() => {
              // Walk for the gap
              phase = 'walking';
              let k = 0;
              function walk() {
                if (k >= tagged.length - 1) {
                  phase = 'done';
                  return;
                }
                const a = tagged[k].v;
                const b = tagged[k + 1].v;
                chips.forEach(c => c.classList.remove('chip-cursor', 'chip-cursor--anchor'));
                chips[tagged[k].i].classList.add('chip-cursor--anchor');
                chips[tagged[k + 1].i].classList.add('chip-cursor');
                if (b !== a + 1) {
                  // Gap — insert a ghost chip showing the missing value
                  setT(() => {
                    const ghost = document.createElement('span');
                    ghost.className = 'chip chip-ghost';
                    ghost.textContent = a + 1;
                    // Position the ghost between sorted positions k and k+1
                    // by appending it to the row and translating it into place.
                    host.appendChild(ghost);
                    const newSlot = sortedOrder[tagged[k].i] + 0.5;
                    const lastIdx = chips.length;
                    ghost.style.transform = `translateX(${(newSlot - lastIdx) * step}px)`;
                    phase = 'done';
                  }, 320);
                  return;
                }
                k++;
                setT(walk, 380);
              }
              walk();
            }, 700);
          });

          resetBtn.addEventListener('click', () => {
            phase = 'idle';
            runBtn.disabled = false;
            // Strip any ghost chips and restore the originals
            host.querySelectorAll('.chip-ghost').forEach(g => g.remove());
            chips.forEach(c => {
              c.style.transform = '';
              c.classList.remove('chip-cursor', 'chip-cursor--anchor');
            });
          });
        }

        /* Scene 3, Slide 3 — Insight (static; the final state is the answer) */
        function initSceneThreeInsight(/* slide */) {
          // No interactivity: AGENTS.md prefers final state on load.
        }

        /* Scene 3, Slide 4 — Walkthrough: lockstep sums + difference */
        function initSceneThreeWalkthrough(slide) {
          const expectedChipsHost = $('#scene-3-walk-expected-chips', slide);
          const actualChipsHost   = $('#scene-3-walk-actual-chips',   slide);
          const expectedSumEl     = $('#scene-3-walk-expected-sum',   slide);
          const actualSumEl       = $('#scene-3-walk-actual-sum',     slide);
          const answerCard        = $('#scene-3-walk-answer-card',    slide);
          const answerEl          = $('#scene-3-walk-answer',         slide);
          const stepBtn           = $('[data-action="step"]', slide);
          const runBtn            = $('[data-action="run"]',  slide);
          const resetBtn          = $('[data-action="reset"]', slide);

          const expectedValues = Array.from({ length: SCENE_3_N }, (_, i) => i + 1);
          const actualValues   = [...SCENE_3_INPUT];
          const expectedChips = renderIntChips(expectedChipsHost, expectedValues);
          const actualChips   = renderIntChips(actualChipsHost,   actualValues);

          // Color the parent cards
          expectedChips.forEach(c => c.classList.add('chip'));
          actualChips.forEach(c => c.classList.add('chip'));

          let k = 0;
          let expectedSum = 0;
          let actualSum = 0;
          let busy = false;

          function tickCard(card) {
            card.classList.add('tick');
            setT(() => card.classList.remove('tick'), 320);
          }

          function step() {
            if (busy) return;
            if (k >= Math.max(expectedValues.length, actualValues.length)) {
              // Finalise
              answerCard.classList.remove('sum-card--hidden');
              answerEl.textContent = String(expectedSum - actualSum);
              tickCard(answerCard);
              stepBtn.disabled = true;
              runBtn.disabled = true;
              return;
            }
            busy = true;
            if (k < expectedValues.length) {
              expectedSum += expectedValues[k];
              expectedSumEl.textContent = String(expectedSum);
              expectedChips[k].classList.add('chip-cursor');
              setT(() => expectedChips[k].classList.replace('chip-cursor', 'chip-faded'), 220);
              tickCard(expectedSumEl.parentElement);
            }
            if (k < actualValues.length) {
              actualSum += actualValues[k];
              actualSumEl.textContent = String(actualSum);
              actualChips[k].classList.add('chip-cursor');
              setT(() => actualChips[k].classList.replace('chip-cursor', 'chip-faded'), 220);
              tickCard(actualSumEl.parentElement);
            }
            k++;
            setT(() => { busy = false; }, 240);
          }

          stepBtn.addEventListener('click', step);
          runBtn.addEventListener('click', () => {
            stepBtn.disabled = true;
            runBtn.disabled = true;
            const tick = () => {
              if (k >= Math.max(expectedValues.length, actualValues.length)) {
                step(); // finalize
                return;
              }
              step();
              setT(tick, 260);
            };
            tick();
          });

          resetBtn.addEventListener('click', () => {
            k = 0;
            expectedSum = 0;
            actualSum = 0;
            busy = false;
            stepBtn.disabled = false;
            runBtn.disabled = false;
            expectedSumEl.textContent = '0';
            actualSumEl.textContent = '0';
            answerEl.textContent = '?';
            answerCard.classList.add('sum-card--hidden');
            expectedChips.forEach(c => c.classList.remove('chip-cursor', 'chip-faded'));
            actualChips.forEach(c => c.classList.remove('chip-cursor', 'chip-faded'));
          });
        }

        /* Scene 3, Slide 5 — Follow-up (static discussion) */
        function initSceneThreeFollowup(/* slide */) { /* no interactivity */ }

        /* ===============================================================
           Per-slide init hooks for Scene 4 — Most frequent in a stream.
           =============================================================== */
        const SCENE_4_STREAM = ['A', 'B', 'A', 'C', 'B', 'A', 'C', 'C', 'C'];
        const SCENE_4_TYPES  = ['A', 'B', 'C'];

        function renderEventChips(host, events) {
          host.innerHTML = '';
          events.forEach((ev, i) => {
            const c = document.createElement('span');
            c.className = 'chip chip--event';
            c.dataset.ev = ev;
            c.dataset.i = i;
            c.textContent = ev;
            host.appendChild(c);
          });
          return [...host.children];
        }

        function buildBarChart(host, types, initial = {}) {
          host.innerHTML = '';
          const rows = {};
          types.forEach(t => {
            const row = document.createElement('div');
            row.className = 'bar-row';
            row.dataset.ev = t;
            row.innerHTML = `
              <span class="bar-label">${t}</span>
              <div class="bar-track"><div class="bar-fill"></div></div>
              <span class="bar-count">${initial[t] || 0}</span>
            `;
            host.appendChild(row);
            rows[t] = row;
          });
          return rows;
        }

        function setBar(rows, type, count, maxCount) {
          const row = rows[type];
          if (!row) return;
          const fill = row.querySelector('.bar-fill');
          const cnt  = row.querySelector('.bar-count');
          fill.style.width = (maxCount > 0 ? (count / maxCount) * 100 : 0) + '%';
          cnt.textContent = String(count);
        }

        function markLeader(rows, leaderType) {
          for (const t in rows) {
            rows[t].classList.toggle('is-leader', t === leaderType);
          }
        }

        /* Trace through the stream and produce the per-step state. */
        function traceStream(stream) {
          const counts = {};
          let leader = null;
          let leaderCount = 0;
          const trace = [];
          for (const ev of stream) {
            counts[ev] = (counts[ev] || 0) + 1;
            const flashed = counts[ev] > leaderCount;
            if (flashed) {
              leader = ev;
              leaderCount = counts[ev];
            }
            trace.push({ ev, counts: { ...counts }, leader, leaderCount, flashed });
          }
          return trace;
        }

        /* Scene 4, Slide 1 — Problem (static) */
        function initSceneFourProblem(slide) {
          renderEventChips($('#scene-4-input-stream', slide), SCENE_4_STREAM);
          const traceHost = $('#scene-4-most-trace', slide);
          const trace = traceStream(SCENE_4_STREAM);
          traceHost.innerHTML = '';
          trace.forEach((step, i) => {
            const c = document.createElement('span');
            c.className = 'chip chip--event';
            c.dataset.ev = step.leader;
            c.textContent = step.leader;
            if (step.flashed && i > 0) c.classList.add('chip-cursor');
            traceHost.appendChild(c);
          });
        }

        /* Scene 4, Slide 2 — Naive: animate one O(k) query scan */
        function initSceneFourNaive(slide) {
          const barsHost = $('#scene-4-naive-bars', slide);
          const runBtn   = $('[data-action="run-scan"]', slide);
          const resetBtn = $('[data-action="reset"]', slide);

          // Counts after all 9 events
          const finalCounts = { A: 3, B: 2, C: 4 };
          const max = Math.max(...Object.values(finalCounts));
          const rows = buildBarChart(barsHost, SCENE_4_TYPES, finalCounts);
          SCENE_4_TYPES.forEach(t => setBar(rows, t, finalCounts[t], max));

          let busy = false;

          runBtn.addEventListener('click', () => {
            if (busy) return;
            busy = true;
            runBtn.disabled = true;
            // Reset highlights
            SCENE_4_TYPES.forEach(t => rows[t].classList.remove('is-scanned', 'is-leader'));
            let i = 0;
            let bestType = null;
            let bestCount = -1;
            function tick() {
              if (i > 0) rows[SCENE_4_TYPES[i - 1]].classList.remove('is-scanned');
              if (i >= SCENE_4_TYPES.length) {
                if (bestType) rows[bestType].classList.add('is-leader');
                busy = false;
                return;
              }
              const t = SCENE_4_TYPES[i];
              rows[t].classList.add('is-scanned');
              if (finalCounts[t] > bestCount) {
                bestCount = finalCounts[t];
                bestType = t;
              }
              i++;
              setT(tick, 600);
            }
            tick();
          });

          resetBtn.addEventListener('click', () => {
            busy = false;
            runBtn.disabled = false;
            SCENE_4_TYPES.forEach(t => rows[t].classList.remove('is-scanned', 'is-leader'));
          });
        }

        /* Scene 4, Slide 3 — Insight: static final-state snapshot */
        function initSceneFourInsight(slide) {
          const barsHost = $('#scene-4-insight-bars', slide);
          const finalCounts = { A: 3, B: 2, C: 4 };
          const max = Math.max(...Object.values(finalCounts));
          const rows = buildBarChart(barsHost, SCENE_4_TYPES, finalCounts);
          SCENE_4_TYPES.forEach(t => setBar(rows, t, finalCounts[t], max));
          rows.C.classList.add('is-leader');
        }

        /* Scene 4, Slide 4 — Walkthrough: live stream */
        function initSceneFourWalkthrough(slide) {
          const streamHost = $('#scene-4-walk-stream', slide);
          const barsHost   = $('#scene-4-walk-bars', slide);
          const mostCard   = $('#scene-4-walk-most', slide);
          const mostLetter = $('#scene-4-walk-most-letter', slide);
          const mostExplain= $('#scene-4-walk-most-explain', slide);
          const stepBtn    = $('[data-action="step"]', slide);
          const runBtn     = $('[data-action="run"]',  slide);
          const resetBtn   = $('[data-action="reset"]', slide);

          const chips = renderEventChips(streamHost, SCENE_4_STREAM);
          const rows  = buildBarChart(barsHost, SCENE_4_TYPES);

          let idx = 0;
          let counts = { A: 0, B: 0, C: 0 };
          let leader = null;
          let leaderCount = 0;
          let busy = false;

          function reset() {
            idx = 0;
            counts = { A: 0, B: 0, C: 0 };
            leader = null;
            leaderCount = 0;
            busy = false;
            chips.forEach(c => c.classList.remove('chip-cursor', 'chip-faded'));
            SCENE_4_TYPES.forEach(t => {
              setBar(rows, t, 0, 1);
              rows[t].classList.remove('is-leader');
            });
            mostLetter.textContent = '—';
            mostExplain.textContent = 'no events yet';
            stepBtn.disabled = false;
            runBtn.disabled  = false;
          }
          reset();

          function step() {
            if (idx >= SCENE_4_STREAM.length || busy) return;
            busy = true;
            const ev = SCENE_4_STREAM[idx];
            const chip = chips[idx];
            chips.forEach(c => c.classList.remove('chip-cursor'));
            chip.classList.add('chip-cursor');
            counts[ev]++;
            const max = Math.max(...Object.values(counts), 1);
            SCENE_4_TYPES.forEach(t => setBar(rows, t, counts[t], max));

            const flashed = counts[ev] > leaderCount;
            if (flashed) {
              leader = ev;
              leaderCount = counts[ev];
              markLeader(rows, leader);
              mostLetter.textContent = leader;
              mostExplain.textContent = `count = ${leaderCount}`;
              mostCard.classList.add('flash');
              setT(() => mostCard.classList.remove('flash'), 460);
            } else {
              markLeader(rows, leader);
            }

            setT(() => {
              chip.classList.remove('chip-cursor');
              chip.classList.add('chip-faded');
              busy = false;
            }, 320);

            idx++;
            if (idx >= SCENE_4_STREAM.length) {
              stepBtn.disabled = true;
              runBtn.disabled  = true;
            }
          }

          stepBtn.addEventListener('click', step);
          runBtn.addEventListener('click', () => {
            stepBtn.disabled = true;
            runBtn.disabled  = true;
            const tick = () => {
              if (idx >= SCENE_4_STREAM.length) return;
              step();
              setT(tick, 480);
            };
            tick();
          });
          resetBtn.addEventListener('click', reset);
        }

        /* ---------------------------------------------------------------
           Slide init registry. Each key matches a slide's data-init.
           --------------------------------------------------------------- */
        const slideInit = {
          'scene-1-problem':       initSceneOneProblem,
          'scene-1-naive':         initSceneOneNaive,
          'scene-1-insight':       initSceneOneInsight,
          'scene-1-walkthrough':   initSceneOneWalkthrough,
          'scene-1-stringbuilder': initSceneOneStringBuilder,
          'scene-2-problem':       initSceneTwoProblem,
          'scene-2-naive':         initSceneTwoNaive,
          'scene-2-insight':       initSceneTwoInsight,
          'scene-2-walkthrough':   initSceneTwoWalkthrough,
          'scene-3-problem':       initSceneThreeProblem,
          'scene-3-naive':         initSceneThreeNaive,
          'scene-3-insight':       initSceneThreeInsight,
          'scene-3-walkthrough':   initSceneThreeWalkthrough,
          'scene-3-followup':      initSceneThreeFollowup,
          'scene-4-problem':       initSceneFourProblem,
          'scene-4-naive':         initSceneFourNaive,
          'scene-4-insight':       initSceneFourInsight,
          'scene-4-walkthrough':   initSceneFourWalkthrough,
        };

        /* ---------------------------------------------------------------
           Bootstrap.
           --------------------------------------------------------------- */
        readHash();
        render();
      })();
    </script>
  </body>
</html>
