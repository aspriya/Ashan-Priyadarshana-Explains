<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 5 - The Final Choice</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--navy:#0D1B2A;--navy2:#1A2B3C;--navy3:#243447;--teal:#00D4AA;--teal2:#00A882;--blue:#4C9BE8;--purple:#8B5CF6;--amber:#F59E0B;--red:#EF4444;--orange:#F97316;--green:#10B981;--white:#F0F4F8;--muted:#64748B;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--navy);color:var(--white);overflow:hidden;height:100vh;width:100vw}
h1,h2,h3{font-family:'Fraunces',serif}
code,.mono{font-family:'JetBrains Mono',monospace}
.slide{position:absolute;inset:0;padding:80px 60px 90px;opacity:0;transform:translateX(60px);transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.4,0,.2,1);pointer-events:none;display:flex;flex-direction:column;overflow-y:auto}
.slide.active{opacity:1;transform:translateX(0);pointer-events:auto;z-index:10}
.slide.prev{opacity:0;transform:translateX(-60px)}
#progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--blue));z-index:1000;transition:width .4s}
#nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(13,27,42,.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:16px;z-index:1000;padding:0 20px}
#nav .dots{display:flex;gap:6px;align-items:center}
#nav .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);cursor:pointer;transition:all .3s}
#nav .dot.active{background:var(--teal);width:12px;height:12px}
.nav-btn{padding:8px 20px;border:1px solid var(--border);background:var(--card);color:var(--white);border-radius:8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:14px;transition:all .3s}
.nav-btn:hover{background:var(--teal);color:var(--navy);border-color:var(--teal)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
#slide-label{font-size:13px;color:var(--muted);min-width:120px;text-align:center}
.section-badge{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:8px;font-weight:600}
.slide-title{font-size:clamp(24px,3.5vw,42px);font-weight:700;margin-bottom:12px;line-height:1.2}
.slide-subtitle{font-size:clamp(14px,1.5vw,18px);color:var(--muted);margin-bottom:16px;max-width:700px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;margin:2px}
.pill-teal{background:rgba(0,212,170,.15);color:var(--teal)}
.pill-blue{background:rgba(76,155,232,.15);color:var(--blue)}
.pill-purple{background:rgba(139,92,246,.15);color:var(--purple)}
.pill-amber{background:rgba(245,158,11,.15);color:var(--amber)}
.pill-green{background:rgba(16,185,129,.15);color:var(--green)}
.pill-orange{background:rgba(249,115,22,.15);color:var(--orange)}
.pill-red{background:rgba(239,68,68,.15);color:var(--red)}
.insight{background:linear-gradient(135deg,rgba(0,212,170,.08),rgba(76,155,232,.08));border:1px solid rgba(0,212,170,.2);border-radius:12px;padding:14px 18px;margin-top:10px;font-size:13px;line-height:1.6}
.insight::before{content:'KEY INSIGHT';display:block;font-size:10px;letter-spacing:2px;color:var(--teal);margin-bottom:6px;font-weight:700}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;transition:all .3s}
.btn-teal{background:var(--teal);color:var(--navy)}
.btn-teal:hover{background:var(--teal2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--white)}
.btn-outline:hover{border-color:var(--teal);color:var(--teal)}
.btn-outline.active{background:var(--teal);color:var(--navy);border-color:var(--teal)}
.code-block{background:#0a0f1a;border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;overflow-x:auto;white-space:pre-wrap}
.tab-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:8px 8px 0 0;background:var(--card);border:1px solid var(--border);border-bottom:none;cursor:pointer;font-size:12px;color:var(--muted);transition:all .3s}
.tab.active{background:var(--navy2);color:var(--teal);border-color:var(--teal)}
.flip-card{perspective:1000px;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;padding:14px;display:flex;flex-direction:column;overflow:auto}
.flip-front{background:var(--card);border:1px solid var(--border)}
.flip-back{background:linear-gradient(135deg,rgba(0,212,170,.1),rgba(76,155,232,.1));border:1px solid rgba(0,212,170,.3);transform:rotateY(180deg)}
.expand-card{border:1px solid var(--border);border-radius:12px;padding:14px;background:var(--card);cursor:pointer;transition:all .3s}
.expand-card:hover{border-color:var(--teal)}
.expand-card .ec{max-height:0;overflow:hidden;transition:max-height .4s}
.expand-card.expanded .ec{max-height:500px}
.grid-2x3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid-2x2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scenario-card{padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;transition:all .3s;font-size:13px}
.scenario-card:hover{border-color:var(--teal)}
.scenario-card.hl{border-color:var(--teal);background:rgba(0,212,170,.08)}
canvas{max-width:100%}
.sl{display:flex;align-items:center;gap:10px}
.sl input[type=range]{flex:1;accent-color:var(--teal)}
.sv{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--teal);min-width:45px}
textarea{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:13px;resize:vertical;width:100%}
textarea:focus{outline:none;border-color:var(--teal)}
.hl-line{background:rgba(0,212,170,.1);display:block;padding:0 4px;border-left:3px solid var(--teal);cursor:pointer;transition:background .2s}
.hl-line:hover{background:rgba(0,212,170,.2)}
@media(max-width:768px){
.slide{padding:56px 14px 76px}
.two-col,.grid-2x3{grid-template-columns:1fr}
.grid-2x2{grid-template-columns:1fr}
.nav-btn{padding:6px 12px;font-size:12px}
#nav .dots{display:none}
.slide-title{font-size:22px}
}
</style>
</head>
<body>
<div id="progress"></div>
<div id="slides-container"></div>
<div id="nav">
<button class="nav-btn" id="prev-btn" onclick="go(-1)">&#9664; Prev</button>
<div class="dots" id="dots"></div>
<span id="slide-label"></span>
<button class="nav-btn" id="next-btn" onclick="go(1)">Next &#9654;</button>
</div>
<script>

var cur=0,total=21,inited={},charts={};
function go(d){var n=cur+d;if(n>=0&&n<total)showSlide(n)}
function showSlide(n){
var p=document.querySelector('.slide.active');
if(p){p.classList.remove('active');if(n>cur)p.classList.add('prev');setTimeout(function(){p.classList.remove('prev')},500)}
cur=n;var s=document.querySelectorAll('.slide')[n];s.classList.add('active');
document.getElementById('progress').style.width=((n/(total-1))*100)+'%';
document.getElementById('slide-label').textContent='Slide '+(n+1)+' / '+total;
document.getElementById('prev-btn').disabled=n===0;
document.getElementById('next-btn').disabled=n===total-1;
var dots=document.querySelectorAll('.dot');
for(var i=0;i<dots.length;i++)dots[i].classList.toggle('active',i===n);
if(!inited[n]){inited[n]=true;onSlideEnter(n)}else{onSlideRevisit(n)}
}
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1)});
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id]}}

function buildSlides(){
var c=document.getElementById('slides-container');
var h='';

h+='<div class="slide" id="s0">';
h+='<canvas id="title-canvas" style="position:absolute;inset:0;z-index:0"></canvas>';
h+='<div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center">';
h+='<div style="font-size:12px;letter-spacing:3px;color:var(--teal);margin-bottom:16px;font-weight:600">WEEK 05</div>';
h+='<h1 style="font-size:clamp(40px,6vw,72px);font-weight:800;margin-bottom:16px;background:linear-gradient(135deg,var(--white),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent">The Final Choice</h1>';
h+='<p style="color:var(--muted);font-size:clamp(14px,1.5vw,18px);max-width:700px;margin-bottom:32px">From understanding how transformers work to using them in production \u2014 in two hours.</p>';
h+='<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:600px">';
h+='<span class="pill pill-teal">Encoder / Decoder</span><span class="pill pill-blue">Transformer Flow</span><span class="pill pill-purple">Temperature</span><span class="pill pill-amber">Top-P</span><span class="pill pill-green">Beam Search</span><span class="pill pill-orange">Prompting</span><span class="pill pill-teal">API</span><span class="pill pill-blue">Best Practices</span>';
h+='</div></div></div>';

h+='<div class="slide" id="s1">';
h+='<div class="section-badge">PART 01 \u2014 THE COMPLETE PICTURE</div>';
h+='<h2 class="slide-title">The Transformer End-to-End</h2>';
h+='<p class="slide-subtitle">You learned the components. Now watch them work together.</p>';
h+='<div style="flex:1;display:flex;flex-direction:column;gap:12px;min-height:0">';
h+='<div style="display:flex;align-items:center;gap:8px"><button class="btn btn-teal" onclick="pipeStep(-1)">\u2190 Back</button><span id="pipe-counter" class="mono" style="color:var(--teal)">1 / 8</span><button class="btn btn-teal" onclick="pipeStep(1)">Next Step \u2192</button></div>';
h+='<div style="flex:1;position:relative;border-radius:12px;background:var(--card);border:1px solid var(--border);min-height:200px"><canvas id="pipeline-canvas"></canvas></div>';
h+='<div id="pipe-explain" class="card" style="font-size:13px;line-height:1.5"></div>';
h+='</div></div>';

h+='<div class="slide" id="s2">';
h+='<div class="section-badge">PART 02 \u2014 ARCHITECTURES</div>';
h+='<h2 class="slide-title">Encoder-Only: Understanding Text</h2>';
h+='<div class="two-col" style="flex:1;min-height:0">';
h+='<div style="overflow-y:auto">';
h+='<div class="card" style="margin-bottom:10px"><h3 style="font-size:15px;margin-bottom:10px;color:var(--teal)">Bidirectional Attention</h3><canvas id="enc-attn-canvas" width="180" height="180" style="max-width:180px"></canvas><div style="font-size:12px;color:var(--muted);margin-top:6px">Every token sees every other token (\u2194)</div></div>';
h+='<div class="card" style="margin-bottom:10px"><div style="font-size:12px;line-height:1.8"><div><span class="pill pill-teal">Attention</span> Bidirectional</div><div><span class="pill pill-blue">Training</span> Masked Language Model</div><div><span class="pill pill-purple">Output</span> Contextual embeddings</div><div><span class="pill pill-red">Limit</span> Cannot generate text</div></div></div>';
h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px"><span class="pill pill-teal">BERT</span><span class="pill pill-teal">RoBERTa</span><span class="pill pill-teal">DistilBERT</span><span class="pill pill-teal">ELECTRA</span></div>';
h+='</div>';
h+='<div style="display:flex;flex-direction:column;gap:10px">';
h+='<div class="card"><h3 style="font-size:13px;margin-bottom:6px">Masked Prediction Demo</h3><p style="font-size:11px;color:var(--muted);margin-bottom:10px">Click a word to mask it:</p><div id="mask-sentence" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px"></div><div style="height:180px"><canvas id="mask-chart"></canvas></div></div>';
h+='<div class="insight">BERT reads the whole sentence at once, in both directions. It understands context deeply \u2014 but cannot generate new text token-by-token.</div>';
h+='</div></div></div>';

h+='<div class="slide" id="s3">';
h+='<div class="section-badge">PART 02</div>';
h+='<h2 class="slide-title">Decoder-Only: Generating Text</h2>';
h+='<div class="two-col" style="flex:1;min-height:0">';
h+='<div style="overflow-y:auto">';
h+='<div class="card" style="margin-bottom:10px"><h3 style="font-size:15px;margin-bottom:10px;color:var(--blue)">Causal Attention Mask</h3><canvas id="causal-canvas" width="180" height="180" style="max-width:180px"></canvas><div style="font-size:12px;color:var(--muted);margin-top:6px">Token i sees only tokens 0\u2026i</div></div>';
h+='<div class="card" style="margin-bottom:10px"><div style="font-size:12px;line-height:1.8"><div><span class="pill pill-blue">Attention</span> Causal (left-to-right)</div><div><span class="pill pill-blue">Training</span> Next Token Prediction</div><div><span class="pill pill-blue">Output</span> Token probabilities</div><div><span class="pill pill-green">Strength</span> Autoregressive generation</div></div></div>';
h+='<div style="display:flex;flex-wrap:wrap;gap:4px"><span class="pill pill-blue">GPT-4</span><span class="pill pill-blue">Claude</span><span class="pill pill-blue">Gemini</span><span class="pill pill-blue">LLaMA</span><span class="pill pill-blue">Mistral</span></div>';
h+='</div>';
h+='<div style="display:flex;flex-direction:column;gap:10px">';
h+='<div class="card" style="flex:1"><h3 style="font-size:13px;margin-bottom:8px">Autoregressive Generation</h3>';
h+='<div style="display:flex;gap:6px;margin-bottom:10px"><button class="btn btn-teal" onclick="startGen()">\u25B6 Generate</button><button class="btn btn-outline" onclick="stopGen()">\u25A0 Stop</button><select id="gen-speed" style="background:var(--navy2);color:var(--white);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px"><option value="300">Slow</option><option value="150" selected>Medium</option><option value="50">Fast</option></select></div>';
h+='<div id="gen-output" class="code-block" style="min-height:50px;font-size:13px">The old lighthouse keeper </div>';
h+='<div id="gen-counter" style="font-size:11px;color:var(--muted);margin-top:6px">Tokens: 0</div></div>';
h+='<div class="insight">GPT commits left-to-right, one token at a time. Every decoding strategy in Part 03 is about making this commitment wisely.</div>';
h+='</div></div></div>';

h+='<div class="slide" id="s4">';
h+='<div class="section-badge">PART 02</div>';
h+='<h2 class="slide-title">Encoder-Decoder: Understand AND Generate</h2>';
h+='<div style="flex:1;display:flex;flex-direction:column;gap:10px;min-height:0">';
h+='<div style="display:flex;align-items:center;gap:8px"><button class="btn btn-teal" onclick="transStep(-1)">\u2190</button><span id="trans-counter" class="mono" style="color:var(--purple)">1 / 6</span><button class="btn btn-teal" onclick="transStep(1)">\u2192</button></div>';
h+='<div class="two-col" style="flex:1">';
h+='<div class="card" style="display:flex;flex-direction:column"><h3 style="font-size:14px;margin-bottom:10px;color:var(--purple)">English \u2192 French Translation</h3><div id="trans-viz" style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:8px;font-size:13px"></div></div>';
h+='<div style="display:flex;flex-direction:column;gap:10px"><div class="card" style="flex:1"><h3 style="font-size:13px;margin-bottom:8px">Cross-Attention Heatmap</h3><canvas id="cross-attn-canvas" height="180"></canvas></div>';
h+='<div class="card"><div style="font-size:11px;line-height:1.7"><span class="pill pill-purple">Encoder</span> Bidirectional over input<br><span class="pill pill-purple">Decoder</span> Causal + cross-attention<br><span class="pill pill-purple">Models</span> T5 \u00B7 BART \u00B7 Whisper \u00B7 FLAN-T5</div></div></div>';
h+='</div>';
h+='<div class="insight">When you need to deeply understand one thing and generate something structurally different \u2014 this architecture shines.</div>';
h+='</div></div>';

h+='<div class="slide" id="s5">';
h+='<div class="section-badge">PART 02</div>';
h+='<h2 class="slide-title">Architecture Comparison</h2>';
h+='<div style="flex:1;display:flex;flex-direction:column;gap:12px;overflow-y:auto">';
h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="border-bottom:2px solid var(--border)"><th style="padding:8px;text-align:left;color:var(--muted)"></th><th style="padding:8px;color:var(--teal)">Encoder-Only</th><th style="padding:8px;color:var(--blue)">Decoder-Only</th><th style="padding:8px;color:var(--purple)">Enc-Dec</th></tr></thead>';
h+='<tbody><tr style="border-bottom:1px solid var(--border)"><td style="padding:8px;color:var(--muted)">Attention</td><td style="padding:8px">Bidirectional \u2194</td><td style="padding:8px">Causal \u2192</td><td style="padding:8px">Bi+Causal+Cross</td></tr>';
h+='<tr style="border-bottom:1px solid var(--border)"><td style="padding:8px;color:var(--muted)">Generate?</td><td style="padding:8px;color:var(--red)">\u2717 No</td><td style="padding:8px;color:var(--green)">\u2713 Yes</td><td style="padding:8px;color:var(--green)">\u2713 Yes</td></tr>';
h+='<tr style="border-bottom:1px solid var(--border)"><td style="padding:8px;color:var(--muted)">Training</td><td style="padding:8px">MLM</td><td style="padding:8px">Next Token</td><td style="padding:8px">Seq2Seq</td></tr>';
h+='<tr style="border-bottom:1px solid var(--border)"><td style="padding:8px;color:var(--muted)">Best For</td><td style="padding:8px">Understanding</td><td style="padding:8px">Generation</td><td style="padding:8px">Transformation</td></tr>';
h+='<tr><td style="padding:8px;color:var(--muted)">Examples</td><td style="padding:8px">BERT, RoBERTa</td><td style="padding:8px">GPT-4, Claude</td><td style="padding:8px">T5, BART</td></tr></tbody></table></div>';
h+='<h3 style="font-size:15px">Pick a Scenario:</h3>';
h+='<div class="grid-2x3" id="scenario-grid"></div>';
h+='<div id="scenario-explain" class="card" style="display:none;border-color:var(--teal)"></div>';
h+='<div class="insight">The modern trend: decoder-only dominates. GPT-4, Claude, Gemini, LLaMA \u2014 all decoder-only. But encoder-only still rules embedding tasks.</div>';
h+='</div></div>';

h+='<div class="slide" id="s6">';
h+='<div class="section-badge">PART 03 \u2014 DECODING STRATEGIES</div>';
h+='<h2 class="slide-title">The Output Distribution</h2>';
h+='<p class="slide-subtitle">Before HOW to choose, understand WHAT we choose from.</p>';
h+='<div style="flex:1;display:flex;flex-direction:column;gap:10px;min-height:0">';
h+='<div style="display:flex;gap:6px;flex-wrap:wrap" id="dist-ctx-btns"></div>';
h+='<div class="card" style="flex:1;min-height:180px"><canvas id="dist-chart"></canvas></div>';
h+='<div style="display:flex;gap:10px;flex-wrap:wrap"><div class="card" style="flex:1;min-width:200px"><div style="font-size:11px;color:var(--muted)">Current context</div><div id="dist-context" class="mono" style="font-size:13px;margin-top:4px"></div></div><div class="card" style="flex:1;min-width:200px"><div style="font-size:11px;color:var(--muted)">Note</div><div style="font-size:12px;margin-top:4px">GPT-4: ~100,256 tokens. Chart shows top 15.</div></div></div>';
h+='<div class="insight">The model NEVER outputs a single word. It outputs a probability distribution over 50k\u2013100k tokens. The decoding strategy decides what to do. That is the \u201CFinal Choice.\u201D</div>';
h+='</div></div>';

h+='<div class="slide" id="s7">';
h+='<div class="section-badge">PART 03</div>';
h+='<h2 class="slide-title">Temperature: Controlling Creativity</h2>';
h+='<div style="flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto">';
h+='<div class="card"><div style="text-align:center;margin-bottom:8px;font-size:14px" class="mono">p<sub>i</sub> = softmax(logit<sub>i</sub> / T)</div>';
h+='<div class="sl"><span style="font-size:12px;color:var(--red)">0.01</span><input type="range" id="temp-slider" min="1" max="250" value="90" oninput="updateTemp()"><span style="font-size:12px;color:var(--amber)">2.5</span><span class="sv" id="temp-val">0.90</span></div>';

var pipeStages=[
{name:'Raw Text Input',desc:'\u201CThe cat sat\u201D enters the pipeline. The model receives a string of characters.',color:'#F59E0B'},
{name:'Tokenizer',desc:'Text splits into tokens: The \u00B7 cat \u00B7 sat. Token IDs: [464, 3797, 4332]. The model never sees words \u2014 only numbers.',color:'#00D4AA'},

{name:'Stack N Layers',desc:'This block repeats N times (GPT-3: 96 layers). Lower layers see syntax, upper layers see semantics.',color:'#10B981'},
{name:'Output',desc:'Encoder: contextual representations for classification/search. Decoder: softmax produces token probability distribution.',color:'#00D4AA'}
];
function pipeStep(d){pipeStage=Math.max(0,Math.min(7,pipeStage+d));drawPipeline()}
function drawPipeline(){
document.getElementById('pipe-counter').textContent=(pipeStage+1)+' / 8';
document.getElementById('pipe-explain').innerHTML='<b style="color:'+pipeStages[pipeStage].color+'">'+pipeStages[pipeStage].name+'</b><br>'+pipeStages[pipeStage].desc;
var cv=document.getElementById('pipeline-canvas');if(!cv)return;
var ct=cv.getContext('2d');
cv.width=cv.parentElement.offsetWidth;cv.height=cv.parentElement.offsetHeight;
ct.clearRect(0,0,cv.width,cv.height);
var w=cv.width/8-10,h=60,y=cv.height/2-30;
for(var i=0;i<8;i++){
var x=i*(cv.width/8)+5;
ct.fillStyle=i<=pipeStage?pipeStages[i].color:'rgba(255,255,255,0.05)';
ct.strokeStyle=i===pipeStage?'#fff':'rgba(255,255,255,0.1)';
ct.lineWidth=i===pipeStage?2:1;
ct.beginPath();ct.roundRect(x,y,w,h,8);ct.fill();ct.stroke();
ct.fillStyle=i<=pipeStage?'#0D1B2A':'rgba(255,255,255,0.3)';
ct.font='bold 10px Space Grotesk';ct.textAlign='center';
ct.fillText((i+1)+'. '+pipeStages[i].name.split(' ').slice(0,2).join(' '),x+w/2,y+h/2+4);

}
if(pipeStage>0){
var px=pipeStage*(cv.width/8)+5+w/2;
ct.fillStyle=pipeStages[pipeStage].color;ct.beginPath();ct.arc(px,y-15,6,0,Math.PI*2);ct.fill();
}
}

function showAPINote(idx){
document.getElementById('api-explain').innerHTML='<div style="font-size:12px;line-height:1.6">'+apiLines[idx].note+'</div>';

function escHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function updateCost(){
var inp=parseInt(document.getElementById('cost-in').value);
var out=parseInt(document.getElementById('cost-out').value);
document.getElementById('cost-in-val').textContent=inp;
document.getElementById('cost-out-val').textContent=out;
var haiku=(inp*0.25+out*1.25)/1000000;
var sonnet=(inp*3+out*15)/1000000;
var opus=(inp*15+out*75)/1000000;
document.getElementById('cost-result').innerHTML='<div style="display:flex;gap:12px"><div><span class="pill pill-green">Haiku</span> $'+haiku.toFixed(4)+'</div><div><span class="pill pill-blue">Sonnet</span> $'+sonnet.toFixed(4)+'</div><div><span class="pill pill-purple">Opus</span> $'+opus.toFixed(4)+'</div></div>';
}

// S14 Token counter
function countTokens(){
var text=document.getElementById('token-input').value;
var chars=text.length;
var tokens=Math.ceil(chars/4);
var haiku=(tokens*0.25/1000000).toFixed(6);
var sonnet=(tokens*3/1000000).toFixed(6);
var remaining=4096-tokens;
document.getElementById('token-stats').innerHTML='Characters: <b>'+chars+'</b><br>Approx tokens: <b>'+tokens+'</b><br>Est. cost (input): Haiku $'+haiku+' / Sonnet $'+sonnet+'<br>Budget remaining (4096): <b style="color:'+(remaining<0?'var(--red)':'var(--teal)')+'">'+remaining+'</b>';
}

// S17 Prompt Builder
var wbExamples=[];
var templates=[
{system:'You are a document summarizer. Extract key points concisely. Use bullet points. Never add information not in the source.',instruction:'Summarize the following document in 5 bullet points:',constraints:['Be concise','No preamble','Cite uncertainty'],examples:[{input:'[Long research paper about transformers]',output:'\u2022 Introduces self-attention mechanism\n\u2022 Eliminates recurrence entirely\n\u2022 Achieves SOTA on translation'}]},

{system:'You are a research assistant specializing in AI/ML. Always cite sources. Distinguish established facts from speculation.',instruction:'Research and summarize the current state of:',constraints:['Be concise','Cite uncertainty','Use specific format'],examples:[]}
];
var defaultConstraints=['Be concise','No preamble','Cite uncertainty','Use specific format','Break into steps'];
function initWorkbench(){
wbExamples=[];
var cel=document.getElementById('wb-constraints');cel.innerHTML='';
for(var i=0;i<defaultConstraints.length;i++){
cel.innerHTML+='<label style="display:block;margin-bottom:4px;cursor:pointer"><input type="checkbox" onchange="buildPrompt()" value="'+defaultConstraints[i]+'" style="accent-color:var(--teal)"> '+defaultConstraints[i]+'</label>';
}
document.getElementById('wb-examples').innerHTML='';
buildPrompt();
}
function loadTemplate(idx){
var t=templates[idx];
document.getElementById('wb-system').value=t.system;
document.getElementById('wb-instruction').value=t.instruction;
wbExamples=t.examples.slice();
renderExamples();
var checks=document.querySelectorAll('#wb-constraints input[type=checkbox]');
for(var i=0;i<checks.length;i++){
checks[i].checked=t.constraints.indexOf(checks[i].value)>=0;
}
buildPrompt();
}
function addExample(){
wbExamples.push({input:'',output:''});renderExamples();
}
function renderExamples(){
var el=document.getElementById('wb-examples');el.innerHTML='';
for(var i=0;i<wbExamples.length;i++){
el.innerHTML+='<div style="margin-bottom:6px;font-size:11px"><div>Example '+(i+1)+':</div><input type="text" placeholder="Input" value="'+escHTML(wbExamples[i].input)+'" onchange="wbExamples['+i+'].input=this.value;buildPrompt()" style="width:100%;background:var(--navy);border:1px solid var(--border);border-radius:4px;padding:4px;color:var(--white);font-size:11px;margin-bottom:2px"><input type="text" placeholder="Expected output" value="'+escHTML(wbExamples[i].output)+'" onchange="wbExamples['+i+'].output=this.value;buildPrompt()" style="width:100%;background:var(--navy);border:1px solid var(--border);border-radius:4px;padding:4px;color:var(--white);font-size:11px"></div>';
}
}
function buildPrompt(){
var sys=document.getElementById('wb-system').value;
var inst=document.getElementById('wb-instruction').value;
var checks=document.querySelectorAll('#wb-constraints input:checked');
var cons=[];for(var i=0;i<checks.length;i++)cons.push(checks[i].value);
var prompt='';
if(sys)prompt+='[SYSTEM]\n'+sys+'\n\n';
if(wbExamples.length>0){
prompt+='[EXAMPLES]\n';
for(var i=0;i<wbExamples.length;i++){
if(wbExamples[i].input)prompt+='Input: '+wbExamples[i].input+'\n';
if(wbExamples[i].output)prompt+='Output: '+wbExamples[i].output+'\n';
}
prompt+='\n';
}
if(inst)prompt+='[INSTRUCTION]\n'+inst+'\n';
if(cons.length)prompt+='\n[CONSTRAINTS]\n'+cons.join('\n')+'\n';
document.getElementById('wb-output').textContent=prompt;
var tokens=Math.ceil(prompt.length/4);
document.getElementById('wb-tokens').textContent='~'+tokens+' tokens';
}
function copyPrompt(){
var text=document.getElementById('wb-output').textContent;
navigator.clipboard.writeText(text).then(function(){
document.getElementById('wb-tokens').textContent='Copied!';
setTimeout(buildPrompt,1500);
});
}

{name:'RAG (Retrieval-Augmented Generation)',color:'var(--teal)',problem:'LLMs have a knowledge cutoff. They can\'t access your private documents.',solution:'Before calling the LLM, retrieve relevant documents and inject into context.',flow:'User Query \u2192 Embedding Model \u2192 Vector DB Search \u2192 Top-K Docs \u2192 Inject into Prompt \u2192 LLM Response',insight:'RAG separates knowledge (your database) from reasoning (the LLM). Update the database, not the model.',code:'docs = vector_db.search(embed(query), k=5)\nprompt = f"Context: {docs}\\nQuestion: {query}"\nresponse = llm.generate(prompt)'},
{name:'Function Calling / Tool Use',color:'var(--blue)',problem:'LLMs can\'t take actions \u2014 they only generate text.',solution:'Define tools the model can call. Model generates structured JSON, your code executes it.',flow:'User \u2192 LLM \u2192 Tool Call JSON \u2192 Your Code Executes \u2192 Result \u2192 LLM \u2192 Final Response',insight:'Tool use transforms a chatbot into an agent. This is the foundation of Week 6.',code:'tools = [{"name":"get_weather","params":{"city":"string"}}]\n# LLM outputs: {"tool":"get_weather","args":{"city":"Colombo"}}\nresult = get_weather("Colombo")  # 28\u00B0C'},

];

for(var i=0;i<panels.length;i++){

}
}

// Draw encoder bidirectional attention
function drawEncAttn(){
var cv=document.getElementById('enc-attn-canvas');if(!cv)return;
var ctx=cv.getContext('2d');var sz=cv.width;var n=4;var cell=sz/n;
var tokens=['The','cat','sat','on'];
ctx.clearRect(0,0,sz,sz);
for(var i=0;i<n;i++)for(var j=0;j<n;j++){
ctx.fillStyle='rgba(0,212,170,0.4)';
ctx.fillRect(j*cell+1,i*cell+1,cell-2,cell-2);
}
ctx.fillStyle='#F0F4F8';ctx.font='10px JetBrains Mono';ctx.textAlign='center';
for(var i=0;i<n;i++)ctx.fillText(tokens[i],i*cell+cell/2,sz+14);
}
