<style>
:root{--navy:#0D1B2A;--navy2:#1A2B3C;--navy3:#243447;--teal:#00D4AA;--teal2:#00A882;--blue:#4C9BE8;--purple:#8B5CF6;--amber:#F59E0B;--red:#EF4444;--orange:#F97316;--green:#10B981;--white:#F0F4F8;--muted:#94A6BA;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--navy);color:var(--white);overflow:hidden;height:100vh;width:100vw}
h1,h2,h3{font-family:'Fraunces',serif}
code,.mono{font-family:'JetBrains Mono',monospace}
.slide{position:absolute;inset:0;padding:80px 60px 90px;opacity:0;transform:translateX(60px);transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.4,0,.2,1);pointer-events:none;display:flex;flex-direction:column;overflow-y:auto}
.slide.active{opacity:1;transform:translateX(0);pointer-events:auto;z-index:10}
.slide.prev{opacity:0;transform:translateX(-60px)}
#progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--blue));z-index:1000;transition:width .4s}
#nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(13,27,42,.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:16px;z-index:1000;padding:0 20px}
#nav .dots{display:flex;gap:6px;align-items:center}
#nav .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);cursor:pointer;transition:all .3s}
#nav .dot.active{background:var(--teal);width:12px;height:12px}
.nav-btn{padding:8px 20px;border:1px solid var(--border);background:var(--card);color:var(--white);border-radius:8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:14px;transition:all .3s}
.nav-btn:hover{background:var(--teal);color:var(--navy);border-color:var(--teal)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
#slide-label{font-size:13px;color:var(--muted);min-width:120px;text-align:center}
.section-badge{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:8px;font-weight:600}
.slide-title{font-size:clamp(24px,3.5vw,42px);font-weight:700;margin-bottom:12px;line-height:1.2}
.slide-subtitle{font-size:clamp(14px,1.5vw,18px);color:var(--muted);margin-bottom:16px;max-width:700px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;min-height:0}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;margin:2px}
.pill-teal{background:rgba(0,212,170,.15);color:var(--teal)}
.pill-blue{background:rgba(76,155,232,.15);color:var(--blue)}
.pill-purple{background:rgba(139,92,246,.15);color:var(--purple)}
.pill-amber{background:rgba(245,158,11,.15);color:var(--amber)}
.pill-green{background:rgba(16,185,129,.15);color:var(--green)}
.pill-orange{background:rgba(249,115,22,.15);color:var(--orange)}
.pill-red{background:rgba(239,68,68,.15);color:var(--red)}
.insight{background:linear-gradient(135deg,rgba(0,212,170,.08),rgba(76,155,232,.08));border:1px solid rgba(0,212,170,.2);border-radius:12px;padding:14px 18px;margin-top:10px;font-size:13px;line-height:1.6}
.insight::before{content:'KEY INSIGHT';display:block;font-size:10px;letter-spacing:2px;color:var(--teal);margin-bottom:6px;font-weight:700}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;transition:all .3s}
.btn-teal{background:var(--teal);color:var(--navy)}
.btn-teal:hover{background:var(--teal2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--white)}
.btn-outline:hover{border-color:var(--teal);color:var(--teal)}
.btn-outline.active{background:var(--teal);color:var(--navy);border-color:var(--teal)}
.code-block{background:#0a0f1a;border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;overflow-x:auto;white-space:pre-wrap}
.tab-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:10px 18px;border-radius:8px 8px 0 0;background:var(--card);border:1px solid var(--border);border-bottom:none;cursor:pointer;font-size:14.5px;font-weight:600;color:var(--muted);transition:all .3s}
.tab.active{background:var(--navy2);color:var(--teal);border-color:var(--teal)}
.flip-card{perspective:1000px;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;padding:14px;display:flex;flex-direction:column;overflow:auto}
.flip-front{background:var(--card);border:1px solid var(--border)}
.flip-back{background:linear-gradient(135deg,rgba(0,212,170,.1),rgba(76,155,232,.1));border:1px solid rgba(0,212,170,.3);transform:rotateY(180deg)}
.expand-card{border:1px solid var(--border);border-radius:12px;padding:18px;background:var(--card);cursor:pointer;transition:all .3s}
.expand-card:hover{border-color:var(--teal)}
.expand-card .ec{max-height:0;overflow:hidden;transition:max-height .4s}
.expand-card.expanded .ec{max-height:1200px}
.grid-2x3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid-2x2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scenario-card{padding:14px 16px;border:1px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;transition:all .3s;font-size:14.5px;line-height:1.5}
.scenario-card:hover{border-color:var(--teal)}
.scenario-card.hl{border-color:var(--teal);background:rgba(0,212,170,.08)}
canvas{max-width:100%}
.sl{display:flex;align-items:center;gap:10px}
.sl input[type=range]{flex:1;accent-color:var(--teal)}
.sv{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--teal);min-width:45px}
textarea{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:13px;resize:vertical;width:100%}
textarea:focus{outline:none;border-color:var(--teal)}
.hl-line{background:rgba(0,212,170,.1);display:block;padding:0 4px;border-left:3px solid var(--teal);cursor:pointer;transition:background .2s}
.hl-line:hover{background:rgba(0,212,170,.2)}
@media(max-width:768px){
.slide{padding:56px 14px 76px}
.two-col,.grid-2x3{grid-template-columns:1fr}
.grid-2x2{grid-template-columns:1fr}
.nav-btn{padding:6px 12px;font-size:12px}
#nav .dots{display:none}
.slide-title{font-size:22px}
}
</style>

<script>

var cur=0,total=24,inited={},charts={};
function go(d){var n=cur+d;if(n>=0&&n<total)showSlide(n)}
function showSlide(n){
var p=document.querySelector('.slide.active');
if(p){p.classList.remove('active');if(n>cur)p.classList.add('prev');setTimeout(function(){p.classList.remove('prev')},500)}
cur=n;var s=document.querySelectorAll('.slide')[n];s.classList.add('active');
document.getElementById('progress').style.width=((n/(total-1))*100)+'%';
document.getElementById('slide-label').textContent='Slide '+(n+1)+' / '+total;
document.getElementById('prev-btn').disabled=n===0;
document.getElementById('next-btn').disabled=n===total-1;
var dots=document.querySelectorAll('.dot');
for(var i=0;i<dots.length;i++)dots[i].classList.toggle('active',i===n);
if(!inited[n]){inited[n]=true;onSlideEnter(n)}else{onSlideRevisit(n)}
}
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1)});
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id]}}

function buildSlides(){
var c=document.getElementById('slides-container');
var h='';

h+='<div class="slide" id="s0">';
h+='<canvas id="title-canvas" style="position:absolute;inset:0;z-index:0"></canvas>';
h+='<div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center">';
h+='<div style="font-size:13px;letter-spacing:4px;color:var(--teal);margin-bottom:18px;font-weight:700;text-shadow:0 0 30px rgba(0,212,170,0.5)">WEEK 05  \u00B7  DECODING &amp; PROMPTING</div>';
h+='<h1 style="font-size:clamp(44px,6.5vw,80px);font-weight:800;margin-bottom:20px;color:#FFFFFF;background:linear-gradient(135deg,#FFFFFF 0%,#A6F4E2 60%,#00D4AA 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 60px rgba(0,212,170,0.25);letter-spacing:-0.5px">The Final Choice</h1>';
h+='<p style="color:#E5ECF4;font-size:clamp(15px,1.6vw,20px);max-width:760px;margin-bottom:28px;line-height:1.55">From understanding how transformers work to using them in production \u2014 <b style="color:#FFFFFF">decoding strategies, prompting patterns, and the practical engineering</b> that turns models into products. In two hours.</p>';
h+='<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:680px;margin-bottom:40px">';
h+='<span class="pill pill-teal">Encoder / Decoder</span><span class="pill pill-blue">Transformer Flow</span><span class="pill pill-purple">Temperature</span><span class="pill pill-amber">Top-P</span><span class="pill pill-green">Beam Search</span><span class="pill pill-orange">Prompting</span><span class="pill pill-teal">API</span><span class="pill pill-blue">Best Practices</span>';
h+='</div>';
h+='<div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.12);min-width:320px">';
h+='<div style="font-size:11px;letter-spacing:3px;color:var(--teal);text-transform:uppercase;font-weight:700">Presented by</div>';
h+='<div style="font-size:22px;color:#FFFFFF;font-weight:700;font-family:Fraunces,serif">K.A. Ashan Priyadarshana</div>';
h+='</div>';
h+='</div></div>';

h+='<div class="slide" id="s1">';
h+='<div class="section-badge">PART 01 \u2014 THE COMPLETE PICTURE</div>';
h+='<h2 class="slide-title">The Transformer End-to-End</h2>';
h+='<p class="slide-subtitle">You learned the components. Now watch them work together.</p>';
h+='<div style="flex:1;display:flex;flex-direction:column;gap:12px;min-height:0">';
h+='<div style="display:flex;align-items:center;gap:8px"><button class="btn btn-teal" onclick="pipeStep(-1)">\u2190 Back</button><span id="pipe-counter" class="mono" style="color:var(--teal)">1 / 8</span><button class="btn btn-teal" onclick="pipeStep(1)">Next Step \u2192</button></div>';
h+='<div style="flex:1;position:relative;border-radius:12px;background:var(--card);border:1px solid var(--border);min-height:200px"><canvas id="pipeline-canvas"></canvas></div>';
h+='<div id="pipe-explain" class="card" style="font-size:13px;line-height:1.5"></div>';
h+='</div></div>';

h+='<div class="slide" id="s2">';
h+='<div class="section-badge">PART 02 \u2014 ARCHITECTURES</div>';
h+='<h2 class="slide-title">Encoder-Only: Understanding Text</h2>';
h+='<p class="slide-subtitle">Models like BERT only <b>read</b> text \u2014 they don\u2019t generate it. They turn a sentence into rich, context-aware vectors used for classification, search, and similarity.</p>';
h+='<div class="two-col" style="flex:1;min-height:0">';
h+='<div style="overflow-y:auto;display:flex;flex-direction:column;gap:10px">';
h+='<div class="card"><h3 style="font-size:17px;margin-bottom:10px;color:var(--teal);font-weight:700">1. Bidirectional Attention</h3>';
h+='<p style="font-size:14.5px;color:#D6DEE8;margin-bottom:14px;line-height:1.65">The grid below is an <b>attention matrix</b>. Each <b>row</b> is a token asking \u201Cwho should I look at?\u201D Each <b>column</b> is a token being looked at. A filled cell means \u201Cthis row-token attends to this column-token.\u201D In encoders, <b>every cell is filled</b> \u2014 every token sees every other token (left and right). That is what \u201Cbidirectional\u201D means.</p>';
h+='<div style="display:flex;justify-content:center"><canvas id="enc-attn-canvas" width="240" height="240" style="max-width:240px"></canvas></div>';
h+='<div style="font-size:12.5px;color:#B7C3D2;margin-top:10px;text-align:center">Rows = <b>from</b> \u00B7 Columns = <b>to</b> \u00B7 Filled = attention allowed</div></div>';
h+='<div class="card"><div style="font-size:12px;line-height:1.8"><div><span class="pill pill-teal">Attention</span> Bidirectional</div><div><span class="pill pill-blue">Training</span> Masked Language Model</div><div><span class="pill pill-purple">Output</span> Contextual embeddings</div><div><span class="pill pill-red">Limit</span> Cannot generate text</div></div>';
h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px"><span class="pill pill-teal">BERT</span><span class="pill pill-teal">RoBERTa</span><span class="pill pill-teal">DistilBERT</span><span class="pill pill-teal">ELECTRA</span></div></div>';
h+='</div>';
h+='<div style="display:flex;flex-direction:column;gap:10px;overflow-y:auto">';
h+='<div class="card"><h3 style="font-size:17px;margin-bottom:10px;color:var(--teal);font-weight:700">2. Masked Prediction Demo</h3>';
h+='<p style="font-size:14.5px;color:#D6DEE8;margin-bottom:14px;line-height:1.65">This is exactly how BERT was <b>trained</b>: hide one word, then ask the model to guess it from the surrounding context. Click any word in the sentence to replace it with <span class="mono" style="color:var(--teal)">[MASK]</span>. The chart shows BERT\u2019s <b>top-5 guesses</b> and the probability it assigns to each.</p>';
h+='<div id="mask-sentence" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px"></div>';
h+='<div style="height:170px"><canvas id="mask-chart"></canvas></div>';
h+='<div style="font-size:13.5px;color:#D6DEE8;margin-top:12px;line-height:1.7"><b style="color:var(--teal)">How to read it:</b> bars are probabilities (0\u20131). Mask <span class="mono">cat</span> \u2192 BERT proposes other animals (<span class="mono">dog, bird, rat, fox</span>) because the surrounding context (\u201CThe ___ sat on the mat\u201D) fits any small animal. Mask a different word and the candidates change accordingly \u2014 verbs for <span class="mono">sat</span>, prepositions for <span class="mono">on</span>, articles for <span class="mono">The</span>.</div></div>';
h+='<div class="insight">BERT reads the whole sentence at once, in both directions. It understands context deeply \u2014 but cannot generate new text token-by-token.</div>';
h+='</div></div></div>';

h+='<div class="slide" id="s3">';
h+='<div class="section-badge">PART 02</div>';
h+='<h2 class="slide-title">Decoder-Only: Generating Text</h2>';
h+='<p class="slide-subtitle">Models like GPT and Claude <b>write</b> text \u2014 one token at a time, left-to-right. Each new token is sampled from a probability distribution that depends only on what came <i>before</i> it.</p>';
h+='<div class="two-col" style="flex:1;min-height:0">';
h+='<div style="overflow-y:auto">';
h+='<div class="card" style="margin-bottom:10px"><h3 style="font-size:17px;margin-bottom:10px;color:var(--blue);font-weight:700">1. Causal Attention Mask</h3>';
h+='<p style="font-size:14.5px;color:#D6DEE8;margin-bottom:14px;line-height:1.65">Same attention matrix as before, but now <b>half the cells are blocked</b>. Each row (a token) can only attend to <b>itself and the tokens to its left</b> \u2014 never the future. This forces the model to predict each next token using only past context, exactly mirroring how it generates at runtime.</p>';
h+='<div style="display:flex;justify-content:center"><canvas id="causal-canvas" width="220" height="220" style="max-width:220px"></canvas></div>';
h+='<div style="font-size:12.5px;color:#B7C3D2;margin-top:10px;text-align:center">Filled = allowed \u00B7 Empty = masked (future) \u00B7 Triangular shape = \u201Cno peeking ahead\u201D</div></div>';
h+='<div class="card" style="margin-bottom:10px"><div style="font-size:12px;line-height:1.8"><div><span class="pill pill-blue">Attention</span> Causal (left-to-right)</div><div><span class="pill pill-blue">Training</span> Next Token Prediction</div><div><span class="pill pill-blue">Output</span> Token probabilities</div><div><span class="pill pill-green">Strength</span> Autoregressive generation</div></div></div>';
h+='<div style="display:flex;flex-wrap:wrap;gap:4px"><span class="pill pill-blue">GPT-4</span><span class="pill pill-blue">Claude</span><span class="pill pill-blue">Gemini</span><span class="pill pill-blue">LLaMA</span><span class="pill pill-blue">Mistral</span></div>';
h+='</div>';
h+='<div style="display:flex;flex-direction:column;gap:10px">';
h+='<div class="card" style="flex:1;display:flex;flex-direction:column"><h3 style="font-size:17px;margin-bottom:10px;color:var(--blue);font-weight:700">2. Autoregressive Generation</h3>';
h+='<p style="font-size:14.5px;color:#D6DEE8;margin-bottom:12px;line-height:1.65">Click <b>Generate</b> to watch the model write token-by-token. After each token appears, the entire prompt-so-far is fed back in to predict the next one. This is the <b>autoregressive loop</b>: predict \u2192 append \u2192 repeat.</p>';
h+='<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center"><button class="btn btn-teal" onclick="startGen()">\u25B6 Generate</button><button class="btn btn-outline" onclick="stopGen()">\u25A0 Stop</button><select id="gen-speed" style="background:var(--navy2);color:var(--white);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px"><option value="300">Slow</option><option value="150" selected>Medium</option><option value="50">Fast</option></select></div>';
h+='<div id="gen-output" class="code-block" style="min-height:80px;font-size:13.5px;line-height:1.7">The old lighthouse keeper </div>';
h+='<div style="font-size:12.5px;color:#B7C3D2;margin-top:10px;line-height:1.6"><b style="color:var(--teal)">How to read it:</b> the green seed text is the prompt. Each new word that appears is one forward pass through all 96 layers of the model. The model never sees the future \u2014 it only ever extends the past. That is why the same prompt can produce different continuations.</div>';
h+='<div id="gen-counter" style="font-size:12px;color:#94A6BA;margin-top:8px">Tokens: 0</div></div>';
h+='<div class="insight">GPT commits left-to-right, one token at a time. Every decoding strategy in Part 03 is about making this commitment wisely.</div>';
h+='</div></div></div>';

h+='<div class="slide" id="s4">';
h+='<div class="section-badge">PART 02</div>';
h+='<h2 class="slide-title">Encoder-Decoder: Understand AND Generate</h2>';
h+='<p class="slide-subtitle">Models like T5 and BART use <b>two stacks</b>: an encoder that fully reads the input, and a decoder that generates the output one token at a time \u2014 while peeking back at the encoder via <b>cross-attention</b>. Best for tasks where input and output have <i>different shapes</i> (translation, summarization, speech\u2192text).</p>';
h+='<div style="flex:1;display:flex;flex-direction:column;gap:12px;min-height:0">';
h+='<div style="display:flex;align-items:center;gap:10px"><button class="btn btn-teal" onclick="transStep(-1)">\u2190</button><span id="trans-counter" class="mono" style="color:var(--purple);font-size:14px">1 / 6</span><button class="btn btn-teal" onclick="transStep(1)">\u2192</button><span style="font-size:13px;color:#B7C3D2;margin-left:8px">Step through to see how the decoder builds \u201CLe chat \u00E9tait assis sur le ...\u201D one token at a time.</span></div>';
h+='<div class="two-col" style="flex:1">';
h+='<div class="card" style="display:flex;flex-direction:column"><h3 style="font-size:17px;margin-bottom:10px;color:var(--purple);font-weight:700">1. English \u2192 French Translation</h3>';
h+='<p style="font-size:14.5px;color:#D6DEE8;margin-bottom:14px;line-height:1.65">The <span style="color:var(--teal)">encoder</span> reads the entire English sentence at once and produces a context-rich representation. The <span style="color:var(--blue)">decoder</span> then emits French tokens one-by-one, using both <i>what it has written so far</i> (causal self-attention) and <i>the encoder\u2019s view of the source</i> (cross-attention).</p>';
h+='<div id="trans-viz" style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:10px;font-size:14px"></div></div>';
h+='<div style="display:flex;flex-direction:column;gap:12px">';
h+='<div class="card" style="flex:1;display:flex;flex-direction:column"><h3 style="font-size:17px;margin-bottom:10px;color:var(--purple);font-weight:700">2. Cross-Attention Heatmap</h3>';
h+='<p style="font-size:14.5px;color:#D6DEE8;margin-bottom:12px;line-height:1.65">Each row is a French token being generated; each column is an English source token. A bright cell means \u201Cwhen producing this French word, the decoder paid most attention to that English word.\u201D The diagonal-ish pattern reveals the <b>learned alignment</b>.</p>';
h+='<div style="flex:1;min-height:160px"><canvas id="cross-attn-canvas"></canvas></div>';
h+='<div style="font-size:12.5px;color:#B7C3D2;margin-top:8px;text-align:center">Rows = French output \u00B7 Columns = English input \u00B7 Brighter = stronger alignment</div></div>';
h+='<div class="card"><div style="font-size:13.5px;line-height:1.9"><span class="pill pill-purple">Encoder</span> Bidirectional over input<br><span class="pill pill-purple">Decoder</span> Causal + cross-attention<br><span class="pill pill-purple">Models</span> T5 \u00B7 BART \u00B7 Whisper \u00B7 FLAN-T5</div></div></div>';
h+='</div>';
h+='<div class="insight">When you need to deeply understand one thing and generate something structurally different \u2014 this architecture shines.</div>';
h+='</div></div>';

h+='<tr style="border-bottom:1px solid var(--border)"><td style="padding:14px 16px;font-size:14px;color:#94A6BA">Best For</td><td style="padding:14px 16px;font-size:15px">Understanding</td><td style="padding:14px 16px;font-size:15px">Generation</td><td style="padding:14px 16px;font-size:15px">Transformation</td></tr>';

h+='<div class="slide" id="s6">';
h+='<div class="section-badge">PART 03 \u2014 DECODING STRATEGIES</div>';
h+='<h2 class="slide-title">The Output Distribution</h2>';
h+='<p class="slide-subtitle">Before HOW to choose, understand WHAT we choose from. Pick a context below to see what the model thinks the <i>next token</i> could be.</p>';
h+='<div style="background:rgba(76,155,232,0.08);border:1px solid rgba(76,155,232,0.3);border-radius:10px;padding:12px 16px;font-size:14px;color:#D6DEE8;line-height:1.6;margin-bottom:6px"><b style="color:var(--blue)">Scope:</b> Everything in Part 03 (decoding strategies) applies <b>only to generative architectures</b> \u2014 <span style="color:var(--blue)">decoder-only</span> (GPT, Claude) and <span style="color:var(--purple)">encoder-decoder</span> (T5, BART). Encoder-only models like BERT do not emit a next-token distribution at runtime \u2014 their output is contextual embeddings, so they have nothing to \u201Cdecode.\u201D</div>';
h+='<div style="flex:1;display:flex;flex-direction:column;gap:12px;min-height:0">';
h+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><span style="font-size:14px;color:#B7C3D2;margin-right:4px">Try a context:</span><div style="display:flex;gap:8px;flex-wrap:wrap" id="dist-ctx-btns"></div></div>';
h+='<div class="card" style="flex:1;min-height:200px;padding:14px"><canvas id="dist-chart"></canvas></div>';
h+='<div style="display:flex;gap:12px;flex-wrap:wrap">';
h+='<div class="card" style="flex:1;min-width:240px;padding:14px 16px"><div style="font-size:13px;color:#94A6BA;letter-spacing:0.5px;text-transform:uppercase;font-weight:600">Current context</div><div id="dist-context" class="mono" style="font-size:16px;margin-top:6px;color:#F0F4F8"></div></div>';
h+='<div class="card" style="flex:1;min-width:240px;padding:14px 16px"><div style="font-size:13px;color:#94A6BA;letter-spacing:0.5px;text-transform:uppercase;font-weight:600">Note</div><div style="font-size:14px;margin-top:6px;line-height:1.55;color:#D6DEE8">GPT-4 has ~100,256 tokens in its vocabulary. The chart shows only the <b>top 15</b> by probability \u2014 the long tail of tens of thousands of unlikely tokens is not drawn.</div></div>';
h+='</div>';
h+='<div class="insight">The model NEVER outputs a single word. It outputs a probability distribution over 50k\u2013100k tokens. The decoding strategy decides what to do. That is the \u201CFinal Choice.\u201D</div>';
h+='</div></div>';

h+='<div class="slide" id="s6b">';
h+='<div class="section-badge">PART 03 \u2014 DECODING STRATEGIES</div>';
h+='<h2 class="slide-title">From Vectors to Probabilities: The Softmax Layer</h2>';
h+='<p class="slide-subtitle">Before we can pick a token, we need a probability for <i>every</i> token. This slide shows the very last two layers of every generative LLM \u2014 where vectors become a probability distribution over the vocabulary.</p>';
h+='<div style="flex:1;display:flex;flex-direction:column;gap:14px;overflow-y:auto">';
h+='<div style="display:grid;grid-template-columns:1fr 32px 1fr 32px 1fr;gap:8px;align-items:stretch">';
h+='<div class="card" style="padding:16px;border-color:rgba(76,155,232,0.4)"><div style="font-size:12px;color:#94A6BA;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:6px">Step 1</div><h3 style="font-size:17px;color:var(--blue);margin-bottom:8px;font-weight:700">Final Hidden Vector</h3><div class="mono" style="font-size:15px;color:#F0F4F8;margin-bottom:10px">h \u2208 \u211D<sup>d</sup></div><div style="font-size:14px;color:#D6DEE8;line-height:1.6">After all N transformer layers, each token position has a vector of size <b>d</b> (e.g. d = 4,096 for LLaMA-2-7B; 12,288 for GPT-3 175B). It encodes <i>everything</i> the model knows about that position so far.</div></div>';
h+='<div style="display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--teal);font-weight:bold">\u2192</div>';
h+='<div class="card" style="padding:16px;border-color:rgba(245,158,11,0.4)"><div style="font-size:12px;color:#94A6BA;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:6px">Step 2</div><h3 style="font-size:17px;color:var(--amber);margin-bottom:8px;font-weight:700">Linear \u2192 Logits</h3><div class="mono" style="font-size:15px;color:#F0F4F8;margin-bottom:10px">logits = h \u00B7 W \u2208 \u211D<sup>|V|</sup></div><div style="font-size:14px;color:#D6DEE8;line-height:1.6">A single linear layer multiplies <b>h</b> by a matrix <b>W</b> of shape (<b>d \u00D7 |V|</b>), where |V| \u2248 50k\u2013100k tokens. Output: one raw score (a \u201C<b>logit</b>\u201D) per vocabulary token. Logits can be negative or positive \u2014 they are <b>not</b> probabilities yet.</div></div>';
h+='<div style="display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--teal);font-weight:bold">\u2192</div>';
h+='<div class="card" style="padding:16px;border-color:rgba(0,212,170,0.4)"><div style="font-size:12px;color:#94A6BA;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:6px">Step 3</div><h3 style="font-size:17px;color:var(--teal);margin-bottom:8px;font-weight:700">Softmax \u2192 Probabilities</h3><div class="mono" style="font-size:15px;color:#F0F4F8;margin-bottom:10px">p<sub>i</sub> = e<sup>logit<sub>i</sub></sup> / \u03A3<sub>j</sub> e<sup>logit<sub>j</sub></sup></div><div style="font-size:14px;color:#D6DEE8;line-height:1.6">Softmax <b>exponentiates</b> every logit (so all values become positive) then <b>normalizes</b> them to sum to <b>1</b>. The result is a valid probability distribution over the entire vocabulary.</div></div>';
h+='</div>';
h+='<div class="card" style="padding:16px"><h3 style="font-size:17px;font-weight:700;margin-bottom:8px">Concrete Example: a tiny 5-token vocabulary</h3><p style="font-size:14px;color:#D6DEE8;margin-bottom:12px;line-height:1.6">Imagine a model whose vocabulary has only 5 tokens. After Step 2, it outputs these <b>logits</b>. Watch how softmax turns them into probabilities:</p>';
h+='<table style="width:100%;border-collapse:collapse;font-size:14.5px"><thead><tr style="border-bottom:2px solid var(--border);color:#94A6BA;font-size:12px;text-transform:uppercase;letter-spacing:0.5px"><th style="padding:10px 12px;text-align:left;font-weight:600">Token</th><th style="padding:10px 12px;text-align:right;font-weight:600">Logit</th><th style="padding:10px 12px;text-align:right;font-weight:600">e<sup>logit</sup></th><th style="padding:10px 12px;text-align:right;font-weight:600">Probability</th><th style="padding:10px 12px;text-align:left;font-weight:600">Visual</th></tr></thead><tbody class="mono">';
h+='<tr style="border-bottom:1px solid var(--border)"><td style="padding:10px 12px;color:var(--teal);font-weight:700">cat</td><td style="padding:10px 12px;text-align:right">3.0</td><td style="padding:10px 12px;text-align:right">20.09</td><td style="padding:10px 12px;text-align:right;color:var(--teal);font-weight:700">0.659</td><td style="padding:10px 12px"><div style="background:var(--teal);height:14px;width:65.9%;border-radius:3px"></div></td></tr>';
h+='<tr style="border-bottom:1px solid var(--border)"><td style="padding:10px 12px">dog</td><td style="padding:10px 12px;text-align:right">2.0</td><td style="padding:10px 12px;text-align:right">7.39</td><td style="padding:10px 12px;text-align:right">0.242</td><td style="padding:10px 12px"><div style="background:rgba(76,155,232,0.7);height:14px;width:24.2%;border-radius:3px"></div></td></tr>';
h+='<tr style="border-bottom:1px solid var(--border)"><td style="padding:10px 12px">bird</td><td style="padding:10px 12px;text-align:right">1.0</td><td style="padding:10px 12px;text-align:right">2.72</td><td style="padding:10px 12px;text-align:right">0.089</td><td style="padding:10px 12px"><div style="background:rgba(76,155,232,0.5);height:14px;width:8.9%;border-radius:3px"></div></td></tr>';
h+='<tr style="border-bottom:1px solid var(--border)"><td style="padding:10px 12px">rock</td><td style="padding:10px 12px;text-align:right">-1.0</td><td style="padding:10px 12px;text-align:right">0.37</td><td style="padding:10px 12px;text-align:right">0.012</td><td style="padding:10px 12px"><div style="background:rgba(100,116,139,0.5);height:14px;width:1.2%;border-radius:3px;min-width:2px"></div></td></tr>';
h+='<tr><td style="padding:10px 12px">seven</td><td style="padding:10px 12px;text-align:right">-3.0</td><td style="padding:10px 12px;text-align:right">0.05</td><td style="padding:10px 12px;text-align:right">0.002</td><td style="padding:10px 12px"><div style="background:rgba(100,116,139,0.5);height:14px;width:0.2%;border-radius:3px;min-width:2px"></div></td></tr>';
h+='</tbody></table>';
h+='<div style="font-size:13px;color:#94A6BA;margin-top:10px">Sum of probabilities = 1.000 \u2713 \u00B7 Larger logit \u2192 larger probability, <b>exponentially</b>. A logit gap of 1.0 means \u22482.7\u00D7 more probability.</div></div>';
h+='<div class="insight">The next slide introduces <b>temperature</b>, which is a single tweak inside softmax: divide each logit by T before exponentiating. T &lt; 1 sharpens the distribution (more confident); T &gt; 1 flattens it (more diverse).</div>';
h+='</div></div>';

h+='<div class="slide" id="s7">';
h+='<div class="section-badge">PART 03</div>';
h+='<h2 class="slide-title">Temperature: Controlling Creativity</h2>';
h+='<p class="slide-subtitle">Temperature is a single number <b>T</b> that rescales the logits <i>before</i> softmax. Drag the slider to see how the next-token distribution for <span class="mono" style="color:var(--teal)">\u201CThe weather today is ___\u201D</span> changes shape.</p>';
h+='<div style="flex:1;display:flex;flex-direction:column;gap:14px;overflow-y:auto">';
h+='<div class="card" style="padding:16px"><div style="text-align:center;margin-bottom:14px;font-size:18px" class="mono">p<sub>i</sub> = softmax(logit<sub>i</sub> / T) = e<sup>logit<sub>i</sub>/T</sup> / \u03A3<sub>j</sub> e<sup>logit<sub>j</sub>/T</sup></div>';
h+='<div class="sl"><span style="font-size:14px;color:var(--red);font-weight:600">0.01</span><input type="range" id="temp-slider" min="1" max="250" value="90" oninput="updateTemp()"><span style="font-size:14px;color:var(--amber);font-weight:600">2.5</span><span class="sv" id="temp-val" style="font-size:20px;min-width:60px">0.90</span></div>';
h+='<div style="display:flex;gap:18px;margin-top:10px;font-size:13.5px;flex-wrap:wrap"><span style="color:var(--red)">\u25A0 <b>0.01\u20130.3</b> Deterministic \u2014 sharpens, top token wins almost always</span><span style="color:var(--teal)">\u25A0 <b>0.7\u20131.2</b> Balanced \u2014 natural variety</span><span style="color:var(--amber)">\u25A0 <b>1.5+</b> Creative \u2014 flattens, rare tokens get a chance</span></div></div>';
h+='<div class="card" style="flex:1;min-height:200px;padding:14px"><canvas id="temp-chart"></canvas><div style="font-size:12.5px;color:#B7C3D2;margin-top:6px;text-align:center">Top 10 candidate next tokens after \u201CThe weather today is ___\u201D \u00B7 bars rescale as you move T.</div></div>';
h+='<div class="grid-2x3">';
h+='<div class="card" style="padding:14px 16px"><div class="mono" style="color:var(--red);font-size:16px;font-weight:700">T = 0.1</div><div style="font-size:14.5px;margin-top:8px;line-height:1.5;color:#F0F4F8">\u201CThe weather today is sunny and pleasant.\u201D</div><div style="font-size:13px;color:#94A6BA;margin-top:6px">Safe, predictable</div></div>';
h+='<div class="card" style="padding:14px 16px"><div class="mono" style="color:var(--teal);font-size:16px;font-weight:700">T = 0.9</div><div style="font-size:14.5px;margin-top:8px;line-height:1.5;color:#F0F4F8">\u201CThe weather today is quite blustery with clouds.\u201D</div><div style="font-size:13px;color:#94A6BA;margin-top:6px">Natural, varied</div></div>';
h+='<div class="card" style="padding:14px 16px"><div class="mono" style="color:var(--amber);font-size:16px;font-weight:700">T = 1.8</div><div style="font-size:14.5px;margin-top:8px;line-height:1.5;color:#F0F4F8">\u201CThe weather today is a trembling negotiation between light and atmosphere.\u201D</div><div style="font-size:13px;color:#94A6BA;margin-top:6px">Creative / weird</div></div>';
h+='</div>';
h+='<div class="card" style="padding:14px 16px;font-size:14px;line-height:1.7"><b style="color:var(--teal)">Recommended settings:</b> &nbsp; Factual Q&amp;A: <span class="mono">0.1\u20130.3</span> &nbsp;\u00B7&nbsp; Code generation: <span class="mono">0.2\u20130.4</span> &nbsp;\u00B7&nbsp; Chat: <span class="mono">0.7\u20131.0</span> &nbsp;\u00B7&nbsp; Creative writing: <span class="mono">1.0\u20131.3</span></div>';
h+='</div></div>';

h+='<div class="slide" id="s8_topk">';
h+='<div class="section-badge">PART 03 \u2014 DECODING STRATEGIES</div>';
h+='<h2 class="slide-title">Top-K Sampling: Limit the Choices</h2>';
h+='<p class="slide-subtitle">After softmax, the model has probabilities over ~50k\u2013100k tokens. Even nonsense tokens have a tiny but non-zero chance. <b>Top-K</b> throws away the long tail before sampling \u2014 so junk tokens never get to roll the dice.</p>';
h+='<div class="two-col" style="flex:1;min-height:0;overflow-y:auto;gap:16px">';
h+='<div style="display:flex;flex-direction:column;gap:12px">';
h+='<div class="card" style="padding:16px"><h3 style="font-size:17px;color:var(--blue);font-weight:700;margin-bottom:8px">The problem with raw sampling</h3><p style="font-size:14.5px;color:#D6DEE8;line-height:1.6">Pure sampling rolls a weighted dice over <b>every</b> vocabulary token. Most are nonsense for the current context but still carry tiny probabilities. Once in a while you roll badly and your sentence falls apart with a junk word.</p></div>';
h+='<div class="card" style="padding:16px"><h3 style="font-size:17px;color:var(--blue);font-weight:700;margin-bottom:8px">How Top-K works</h3><ol style="font-size:14.5px;color:#D6DEE8;line-height:1.75;padding-left:24px;margin:0"><li>Sort all tokens by probability (descending).</li><li>Keep only the top <b>K</b> (e.g. K = 5).</li><li>Throw the rest away (set probability to 0).</li><li>Renormalize so the kept K sum to 1.</li><li>Sample from <i>those K only</i>.</li></ol></div>';
h+='<div class="card" style="padding:16px;border-color:rgba(0,212,170,0.35)"><h3 style="font-size:15px;color:var(--teal);font-weight:700;margin-bottom:8px">Real-world analogy</h3><p style="font-size:14px;color:#D6DEE8;line-height:1.6">Like a multiple-choice test where you cross out the obviously wrong answers first, then flip a weighted coin among the rest. The dice can never land on something absurd.</p><p style="font-size:13.5px;color:#94A6BA;margin-top:10px;line-height:1.6"><b>K = 1</b> \u2192 greedy decoding (always pick the top) &nbsp;\u00B7&nbsp; <b>K \u2192 \u221E</b> \u2192 pure sampling &nbsp;\u00B7&nbsp; <b>K = 40\u201350</b> typical default.</p></div>';
h+='</div>';
h+='<div style="display:flex;flex-direction:column;gap:12px">';
h+='<div class="card" style="padding:16px;display:flex;flex-direction:column"><h3 style="font-size:17px;color:var(--blue);font-weight:700;margin-bottom:10px">Try it: drag K to see the cut-off</h3><div class="sl"><span style="font-size:15px;color:#D6DEE8;font-weight:600">K =</span><input type="range" id="topk-slider" min="1" max="15" value="5" oninput="updateTopK()"><span class="sv" id="topk-val" style="font-size:22px;min-width:50px">5</span></div>';
h+='<div style="flex:1;min-height:220px;margin-top:14px"><canvas id="topk-chart"></canvas></div>';
h+='<div id="topk-info" style="font-size:14.5px;color:#F0F4F8;margin-top:12px;line-height:1.55;padding:10px 12px;background:rgba(76,155,232,0.08);border-left:3px solid var(--blue);border-radius:4px"></div>';
h+='<div style="font-size:12.5px;color:#B7C3D2;margin-top:8px"><span style="color:var(--blue)">\u25A0</span> Inside top-K (kept) &nbsp;\u00B7&nbsp; <span style="color:#64748B">\u25A0</span> Discarded</div></div>';
h+='<div class="card" style="padding:14px 16px;border-color:rgba(239,68,68,0.45)"><h3 style="font-size:16px;color:var(--red);font-weight:700;margin-bottom:8px">The catch: K is fixed</h3><p style="font-size:14px;color:#D6DEE8;line-height:1.6">K is the same regardless of how confident the model is \u2014 and the model\u2019s confidence varies wildly:</p><div style="font-size:13.5px;color:#D6DEE8;line-height:1.65;margin-top:10px"><b style="color:#94A6BA">Confident case:</b> &nbsp;\u201CThe capital of France is ___\u201D \u2014 \u201CParis\u201D is 95% probable. K=10 still keeps 9 weird alternatives that should not be there.</div><div style="font-size:13.5px;color:#D6DEE8;line-height:1.65;margin-top:8px"><b style="color:#94A6BA">Uncertain case:</b> &nbsp;\u201CShe felt ___\u201D \u2014 top 50 tokens are all reasonable (each 1\u20133%). K=10 chops off 40 perfectly good words.</div><div style="font-size:13.5px;color:var(--teal);margin-top:12px;line-height:1.6"><b>\u2192 We need something that adapts. Enter Top-P, on the next slide.</b></div></div>';
h+='</div></div></div>';

h+='<div class="slide" id="s8_topp">';
h+='<div class="section-badge">PART 03 \u2014 DECODING STRATEGIES</div>';
h+='<h2 class="slide-title">Top-P (Nucleus) Sampling: Adaptive Filtering</h2>';
h+='<p class="slide-subtitle">Instead of fixing the <i>number</i> of tokens, fix the <i>cumulative probability</i>. <b>Top-P</b> keeps the smallest set of top tokens whose probabilities sum to at least P. That set is called the <b>nucleus</b>.</p>';
h+='<div class="two-col" style="flex:1;min-height:0;overflow-y:auto;gap:16px">';
h+='<div style="display:flex;flex-direction:column;gap:12px">';
h+='<div class="card" style="padding:16px"><h3 style="font-size:17px;color:var(--purple);font-weight:700;margin-bottom:8px">The big idea</h3><p style="font-size:14.5px;color:#D6DEE8;line-height:1.6"><b>P = 0.9</b> means: keep just enough top tokens to cover at least <b>90%</b> of the model\u2019s belief. Discard the rest.</p><p style="font-size:14.5px;color:#D6DEE8;line-height:1.6;margin-top:8px">Crucially, the size of the nucleus changes <b>per generation step</b>, depending on how confident the model is at that moment.</p></div>';
h+='<div class="card" style="padding:16px"><h3 style="font-size:17px;color:var(--purple);font-weight:700;margin-bottom:8px">How Top-P works</h3><ol style="font-size:14.5px;color:#D6DEE8;line-height:1.75;padding-left:24px;margin:0"><li>Sort tokens by probability (descending).</li><li>Walk down the list, adding each token\u2019s probability to a running sum.</li><li>Stop the moment the running sum reaches <b>P</b>.</li><li>Everything you added so far = the <b>nucleus</b>. Discard the rest.</li><li>Renormalize the nucleus to sum to 1, then sample.</li></ol></div>';
h+='<div class="card" style="padding:16px;border-color:rgba(0,212,170,0.4)"><h3 style="font-size:15px;color:var(--teal);font-weight:700;margin-bottom:10px">Why this is brilliant: it adapts</h3><div style="font-size:14px;color:#D6DEE8;line-height:1.6"><b style="color:var(--teal)">Confident case:</b> &nbsp;\u201CThe capital of France is ___\u201D \u2014 \u201CParis\u201D alone is 95%. With P=0.9, the nucleus is just <b>1 token</b>. Zero room for nonsense.</div><div style="font-size:14px;color:#D6DEE8;line-height:1.6;margin-top:10px"><b style="color:var(--teal)">Uncertain case:</b> &nbsp;\u201CShe felt ___\u201D \u2014 dozens of words are equally plausible. With P=0.9 the nucleus may grow to <b>30+ tokens</b>. Plenty of natural variety.</div><div style="font-size:13.5px;color:#94A6BA;margin-top:10px;line-height:1.6">Same hyperparameter, smart behaviour in both cases. That is why Top-P is the modern default.</div></div>';
h+='</div>';
h+='<div style="display:flex;flex-direction:column;gap:12px">';
h+='<div class="card" style="padding:16px;display:flex;flex-direction:column"><h3 style="font-size:17px;color:var(--purple);font-weight:700;margin-bottom:10px">Try it: drag P to grow the nucleus</h3><div class="sl"><span style="font-size:15px;color:#D6DEE8;font-weight:600">P =</span><input type="range" id="topp-slider" min="50" max="100" value="90" oninput="updateTopP()"><span class="sv" id="topp-val" style="font-size:22px;color:var(--purple);min-width:60px">0.90</span></div>';
h+='<div style="flex:1;min-height:220px;margin-top:14px"><canvas id="topp-chart"></canvas></div>';
h+='<div id="topp-info" style="font-size:14.5px;color:#F0F4F8;margin-top:12px;line-height:1.55;padding:10px 12px;background:rgba(139,92,246,0.1);border-left:3px solid var(--purple);border-radius:4px"></div>';
h+='<div style="font-size:12.5px;color:#B7C3D2;margin-top:8px"><span style="color:var(--purple)">\u25A0</span> Inside the nucleus (kept) &nbsp;\u00B7&nbsp; <span style="color:#64748B">\u25A0</span> Discarded</div></div>';
h+='<div class="card" style="padding:14px 16px"><h3 style="font-size:16px;font-weight:700;margin-bottom:10px">Top-K vs Top-P at a glance</h3><table style="width:100%;border-collapse:collapse;font-size:14px"><thead><tr style="border-bottom:1px solid var(--border);color:#94A6BA;font-size:12px;text-transform:uppercase;letter-spacing:0.5px"><th style="padding:9px 8px;text-align:left;font-weight:600">Aspect</th><th style="padding:9px 8px;text-align:left;color:var(--blue);font-weight:700">Top-K</th><th style="padding:9px 8px;text-align:left;color:var(--purple);font-weight:700">Top-P</th></tr></thead><tbody><tr style="border-bottom:1px solid var(--border)"><td style="padding:9px 8px;color:#94A6BA">Filter rule</td><td style="padding:9px 8px">Fixed token count</td><td style="padding:9px 8px">Cumulative mass</td></tr><tr style="border-bottom:1px solid var(--border)"><td style="padding:9px 8px;color:#94A6BA">Adapts to confidence?</td><td style="padding:9px 8px;color:var(--red)">\u2717 No</td><td style="padding:9px 8px;color:var(--green)">\u2713 Yes</td></tr><tr><td style="padding:9px 8px;color:#94A6BA">Typical value</td><td style="padding:9px 8px"><span class="mono">K = 40</span></td><td style="padding:9px 8px"><span class="mono">P = 0.9\u20130.95</span></td></tr></tbody></table></div>';
h+='<div class="insight">In practice you stack all three: <b>Temperature</b> reshapes the logits, <b>Top-P</b> truncates the long tail, <b>Top-K</b> caps the worst-case nucleus size. Common defaults: <span class="mono">T = 0.9, P = 0.95, K = 40</span>.</div>';
h+='</div></div></div>';

h+='<div class="slide" id="s9_greedy">';
h+='<div class="section-badge">PART 03 \u2014 DECODING STRATEGIES</div>';
h+='<h2 class="slide-title">Greedy Decoding: Always Pick the Top</h2>';
h+='<p class="slide-subtitle">The simplest possible strategy: at every step, just take the <b>single most probable</b> next token (argmax). No randomness. No alternatives. Identical input always yields identical output.</p>';
h+='<div class="two-col" style="flex:1;min-height:0;overflow-y:auto;gap:16px">';
h+='<div style="display:flex;flex-direction:column;gap:12px">';
h+='<div class="card" style="padding:16px"><h3 style="font-size:17px;color:var(--amber);font-weight:700;margin-bottom:8px">How Greedy works</h3><ol style="font-size:14.5px;color:#D6DEE8;line-height:1.75;padding-left:24px;margin:0"><li>Run the model. Get a distribution over the vocabulary.</li><li>Pick the token with the <b>highest probability</b> (argmax).</li><li>Append it to the sequence.</li><li>Repeat until end-of-sequence or max length.</li></ol><p style="font-size:13.5px;color:#94A6BA;margin-top:10px;line-height:1.6">Equivalent to <b>Top-K = 1</b>, or sampling with <b>Temperature \u2192 0</b>. Pure determinism.</p></div>';
h+='<div class="card" style="padding:16px;border-color:rgba(239,68,68,0.45)"><h3 style="font-size:16px;color:var(--red);font-weight:700;margin-bottom:8px">The fundamental problem: locally good \u2260 globally good</h3><p style="font-size:14px;color:#D6DEE8;line-height:1.6">Greedy commits to the best <i>immediate</i> word, but a slightly less likely word right now might unlock a <b>much better full sentence</b> later.</p><div style="font-size:13.5px;color:#D6DEE8;line-height:1.65;margin-top:10px;padding:10px 12px;background:rgba(239,68,68,0.08);border-radius:6px"><b style="color:#94A6BA">Example:</b> at step 1 the model thinks <span class="mono" style="color:var(--amber)">\u201Cfast\u201D</span> is 42% and <span class="mono" style="color:var(--teal)">\u201Cquick\u201D</span> is 40%. Greedy picks \u201Cfast.\u201D But \u201Cthe quick brown fox jumps...\u201D had probability 0.40 \u00D7 0.95 \u00D7 0.92 \u00D7 ... = a <b>much higher</b> total than \u201Cthe fast \u2026\u201D leads to. Greedy never sees that.</div></div>';
h+='</div>';
h+='<div style="display:flex;flex-direction:column;gap:12px">';
h+='<div class="card" style="padding:16px;display:flex;flex-direction:column"><h3 style="font-size:17px;color:var(--amber);font-weight:700;margin-bottom:10px">Visual: one path, no exploration</h3><div style="background:rgba(0,0,0,0.2);border-radius:8px;padding:8px"><canvas id="greedy-canvas" style="display:block;width:100%;height:170px"></canvas></div><div style="font-size:13px;color:#B7C3D2;margin-top:10px;line-height:1.55">Five generation steps. At each step the model produces a distribution; greedy picks the single bar with the highest probability and moves on. No branching, no second-guessing.</div></div>';
h+='<div class="card" style="padding:16px"><h3 style="font-size:16px;font-weight:700;margin-bottom:10px">When to use Greedy</h3><div style="font-size:14px;color:#D6DEE8;line-height:1.7"><div><b style="color:var(--green)">\u2713</b> Real-time chat where latency matters more than optimality</div><div><b style="color:var(--green)">\u2713</b> Code completion at <span class="mono">T = 0</span> (you want the same answer every time)</div><div><b style="color:var(--green)">\u2713</b> Test fixtures and evaluation \u2014 deterministic = reproducible</div><div style="margin-top:8px"><b style="color:var(--red)">\u2717</b> Translation, summarization \u2014 needs to look ahead</div><div><b style="color:var(--red)">\u2717</b> Creative writing \u2014 always picks the most boring word</div></div></div>';
h+='<div class="insight">If the only thing you change is removing greedy\u2019s commitment problem, you get <b>beam search</b> \u2014 next slide.</div>';
h+='</div></div></div>';

h+='<div class="slide" id="s9_beam">';
h+='<div class="section-badge">PART 03 \u2014 DECODING STRATEGIES</div>';
h+='<h2 class="slide-title">Beam Search: Keep Multiple Options Alive</h2>';
h+='<p class="slide-subtitle">Instead of committing to one path, beam search keeps the <b>top B</b> partial sequences alive at every step and scores each by total log-probability. It looks ahead a little before committing.</p>';
h+='<div class="two-col" style="flex:1;min-height:0;overflow-y:auto;gap:16px">';
h+='<div style="display:flex;flex-direction:column;gap:12px">';
h+='<div class="card" style="padding:16px"><h3 style="font-size:17px;color:var(--teal);font-weight:700;margin-bottom:8px">How Beam Search works (with B = 3)</h3><ol style="font-size:14.5px;color:#D6DEE8;line-height:1.75;padding-left:24px;margin:0"><li>Start with the top <b>B</b> candidate first tokens (3 \u201Cbeams\u201D).</li><li>For each beam, ask the model for next-token probabilities.</li><li>That gives you B \u00D7 |V| possible <i>extended</i> sequences.</li><li>Score each by its <b>total log-probability</b> so far.</li><li>Keep only the top B extended sequences. Discard the rest.</li><li>Repeat until done. At the end, return the highest-scoring full sequence.</li></ol></div>';
h+='<div class="card" style="padding:16px;border-color:rgba(0,212,170,0.4)"><h3 style="font-size:15px;color:var(--teal);font-weight:700;margin-bottom:8px">The key insight</h3><p style="font-size:14px;color:#D6DEE8;line-height:1.6">A second-best word now might be the <b>seed of the best overall sentence</b>. Beam search hedges by keeping several options alive, so a slightly worse step-1 choice can win later if its continuations are strong.</p><p style="font-size:13.5px;color:#94A6BA;margin-top:10px;line-height:1.6"><b>B = 1</b> = greedy decoding. &nbsp; <b>B = 4\u20138</b> typical for translation. &nbsp; Higher B = better quality but more compute (B \u00D7 forward passes per step).</p></div>';
h+='<div class="card" style="padding:14px 16px;border-color:rgba(239,68,68,0.45)"><h3 style="font-size:15px;color:var(--red);font-weight:700;margin-bottom:8px">Why we don\u2019t use it for chat</h3><p style="font-size:14px;color:#D6DEE8;line-height:1.6">Beam search optimises for high-probability sequences \u2014 which tend to be <b>safe, bland, and repetitive</b>. \u201CI think that I think that I think \u2026\u201D is a real failure mode. Great for one-correct-answer tasks (translation, summarization). Bad for open-ended creativity, where sampling wins.</p></div>';
h+='</div>';
h+='<div style="display:flex;flex-direction:column;gap:12px">';
h+='<div class="card" style="padding:16px;display:flex;flex-direction:column"><h3 style="font-size:17px;color:var(--teal);font-weight:700;margin-bottom:10px">Visual: B parallel paths</h3><div class="sl" style="margin-bottom:10px"><span style="font-size:15px;color:#D6DEE8;font-weight:600">Beams B =</span><input type="range" id="beam-slider" min="1" max="5" value="3" oninput="updateBeam()"><span class="sv" id="beam-val" style="font-size:22px;min-width:45px">3</span></div>';
h+='<div style="background:rgba(0,0,0,0.2);border-radius:8px;padding:8px"><canvas id="beam-canvas" style="display:block;width:100%;height:200px"></canvas></div>';
h+='<div style="font-size:13px;color:#B7C3D2;margin-top:10px;line-height:1.55">Three generation steps shown. Each green node is one of the B currently-alive partial sequences. Lines show how beams extend across steps. Move the slider to see how B changes the breadth of search.</div></div>';
h+='<div class="card" style="padding:14px 16px"><h3 style="font-size:16px;font-weight:700;margin-bottom:10px">Strategy comparison</h3><table style="width:100%;border-collapse:collapse;font-size:14px"><thead><tr style="border-bottom:1px solid var(--border);color:#94A6BA;font-size:12px;text-transform:uppercase;letter-spacing:0.5px"><th style="padding:9px 8px;text-align:left;font-weight:600">Strategy</th><th style="padding:9px 8px;text-align:left;font-weight:600">Speed</th><th style="padding:9px 8px;text-align:left;font-weight:600">Quality</th><th style="padding:9px 8px;text-align:left;font-weight:600">Best for</th></tr></thead><tbody><tr style="border-bottom:1px solid var(--border)"><td style="padding:9px 8px;color:var(--amber);font-weight:700">Greedy</td><td style="padding:9px 8px">Fastest</td><td style="padding:9px 8px">Medium</td><td style="padding:9px 8px">Real-time, code, tests</td></tr><tr style="border-bottom:1px solid var(--border)"><td style="padding:9px 8px;color:var(--teal);font-weight:700">Beam (B=4\u20138)</td><td style="padding:9px 8px">Slow (B\u00D7)</td><td style="padding:9px 8px">High</td><td style="padding:9px 8px">Translation, summarization</td></tr><tr><td style="padding:9px 8px;color:var(--purple);font-weight:700">Sampling</td><td style="padding:9px 8px">Fast</td><td style="padding:9px 8px">Diverse</td><td style="padding:9px 8px">Chat, creative writing</td></tr></tbody></table></div>';
h+='</div></div></div>';


h+='<div class="slide" id="s10">';
h+='<div class="section-badge">PART 03 \u2014 DECODING STRATEGIES</div>';
h+='<h2 class="slide-title">Decoding Strategy Playground</h2>';
h+='<p class="slide-subtitle">Same model. Same prompt. <b>Four different decoding strategies.</b> Compare the outputs side-by-side to <i>feel</i> how each strategy shapes the text. Pick a prompt below to switch contexts.</p>';

h+='<div class="section-badge">PART 04 \u2014 PRACTICAL</div>';
h+='<h2 class="slide-title">Prompting Strategies</h2>';
h+='<p class="slide-subtitle">A <b>prompt</b> is the only thing the model sees \u2014 the way you shape it changes the answer dramatically. Below are the six patterns that cover ~95% of real-world use cases. Click each tab to see <i>when</i> to use it, <i>how</i> the prompt looks, and <i>what</i> can go wrong.</p>';

h+='<div class="slide" id="s14">';
h+='<div class="section-badge">PART 04 \u2014 PRACTICAL</div>';
h+='<h2 class="slide-title">Token Costs &amp; Efficiency</h2>';
h+='<p class="slide-subtitle">Every token in and every token out costs money and latency. Small prompt rewrites compound into <b>massive</b> savings at scale. Type into the counter on the left to feel the cost; the right column shows real before/after rewrites that practitioners use every day.</p>';

var pipeStage=0;
var pipeStages=[
{name:'Raw Text Input',desc:'\u201CThe cat sat\u201D enters the pipeline. The model receives a string of characters.',color:'#F59E0B'},
{name:'Tokenizer',desc:'Text splits into tokens: The \u00B7 cat \u00B7 sat. Token IDs: [464, 3797, 4332]. The model never sees words \u2014 only numbers.',color:'#00D4AA'},
{name:'Token Embeddings',desc:'Each token ID maps to a dense vector via the embedding matrix, producing a real-valued vector per token.',color:'#4C9BE8'},
{name:'Positional Encoding',desc:'A unique positional signal is added so the model knows token order. Without this, \u201Ccat sat\u201D = \u201Csat cat\u201D.',color:'#8B5CF6'},
{name:'Multi-Head Attention',desc:'Each token attends to others. Representations update to incorporate context. This is where the magic happens.',color:'#EF4444'},
{name:'Add & Norm + FFN',desc:'Residual connections add input back to output. FFN adds non-linear capacity. Enables very deep networks.',color:'#F97316'},
{name:'Stack N Layers',desc:'This block repeats N times (GPT-3: 96 layers). Lower layers see syntax, upper layers see semantics.',color:'#10B981'},
{name:'Output',desc:'Encoder: contextual representations for classification/search. Decoder: softmax produces token probability distribution.',color:'#00D4AA'}
];
function pipeStep(d){pipeStage=Math.max(0,Math.min(7,pipeStage+d));drawPipeline()}
function drawPipeline(){
document.getElementById('pipe-counter').textContent=(pipeStage+1)+' / 8';
document.getElementById('pipe-explain').innerHTML='<b style="color:'+pipeStages[pipeStage].color+'">'+pipeStages[pipeStage].name+'</b><br>'+pipeStages[pipeStage].desc;
var cv=document.getElementById('pipeline-canvas');if(!cv)return;
var ct=cv.getContext('2d');
var dpr=window.devicePixelRatio||1;
var W=cv.parentElement.offsetWidth,H=cv.parentElement.offsetHeight;
cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
ct.setTransform(dpr,0,0,dpr,0,0);
ct.clearRect(0,0,W,H);
var cols=4,rows=2,padX=30,padY=28,gapX=22,gapY=44;
var bw=(W-padX*2-gapX*(cols-1))/cols;
var bh=Math.min((H-padY*2-gapY*(rows-1))/rows,Math.max(80,H*0.34));
var totalH=bh*rows+gapY*(rows-1);
var startY=(H-totalH)/2;
function pos(i){var r=Math.floor(i/cols);var cIdx=(r%2===0)?(i%cols):(cols-1-(i%cols));return{x:padX+cIdx*(bw+gapX),y:startY+r*(bh+gapY),r:r,c:cIdx}}
function arrow(x1,y1,x2,y2,active){
ct.strokeStyle=active?'rgba(0,212,170,0.75)':'rgba(255,255,255,0.18)';
ct.lineWidth=active?2.5:1.5;
ct.beginPath();ct.moveTo(x1,y1);ct.lineTo(x2,y2);ct.stroke();
var ang=Math.atan2(y2-y1,x2-x1),ah=9;
ct.fillStyle=active?'rgba(0,212,170,0.9)':'rgba(255,255,255,0.28)';
ct.beginPath();ct.moveTo(x2,y2);
ct.lineTo(x2-ah*Math.cos(ang-0.4),y2-ah*Math.sin(ang-0.4));
ct.lineTo(x2-ah*Math.cos(ang+0.4),y2-ah*Math.sin(ang+0.4));
ct.closePath();ct.fill();
}
for(var i=0;i<7;i++){
var a=pos(i),b=pos(i+1),act=i<pipeStage;
if(a.r===b.r){
var dir=(a.r%2===0)?1:-1;
var x1=a.x+(dir>0?bw:0),x2=b.x+(dir>0?0:bw);
var ym=a.y+bh/2;
arrow(x1+(dir>0?3:-3),ym,x2+(dir>0?-7:7),ym,act);
}else{
var sideRight=(a.r%2===0);
var xv=sideRight?(a.x+bw-bw*0.12):(a.x+bw*0.12);
arrow(xv,a.y+bh+3,xv,b.y-7,act);
}
}
function shade(hex,p){var c=hex.replace('#','');var r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),bb=parseInt(c.substr(4,2),16);r=Math.max(0,Math.min(255,Math.round(r+255*p)));g=Math.max(0,Math.min(255,Math.round(g+255*p)));bb=Math.max(0,Math.min(255,Math.round(bb+255*p)));return 'rgb('+r+','+g+','+bb+')'}
var hints=['"The cat sat"','[464, 3797, 4332]','vectors ∈ ℝ^d','+ position info','context-aware','+ residual + FFN','× N layers','probabilities'];
for(var i=0;i<8;i++){
var p2=pos(i),done=i<=pipeStage,cur=i===pipeStage,col=pipeStages[i].color;
if(cur){ct.shadowColor=col;ct.shadowBlur=22}else{ct.shadowBlur=0}
if(done){var grad=ct.createLinearGradient(p2.x,p2.y,p2.x,p2.y+bh);grad.addColorStop(0,col);grad.addColorStop(1,shade(col,-0.28));ct.fillStyle=grad}
else{ct.fillStyle='rgba(255,255,255,0.04)'}
ct.strokeStyle=cur?'#fff':(done?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.10)');
ct.lineWidth=cur?2.5:1;
ct.beginPath();ct.roundRect(p2.x,p2.y,bw,bh,16);ct.fill();ct.stroke();
ct.shadowBlur=0;
var cx=p2.x+24,cy=p2.y+24;
ct.fillStyle=done?'rgba(13,27,42,0.4)':'rgba(255,255,255,0.06)';
ct.beginPath();ct.arc(cx,cy,17,0,Math.PI*2);ct.fill();
ct.fillStyle=done?'#0D1B2A':col;
ct.font='bold 15px Space Grotesk';ct.textAlign='center';ct.textBaseline='middle';
ct.fillText(String(i+1),cx,cy+1);
ct.fillStyle=done?'#0D1B2A':'#F0F4F8';
ct.font='bold 18px Fraunces';
ct.fillText(pipeStages[i].name,p2.x+bw/2,p2.y+bh/2);
ct.fillStyle=done?'rgba(13,27,42,0.72)':'rgba(255,255,255,0.5)';
ct.font='500 12px JetBrains Mono';
ct.fillText(hints[i],p2.x+bw/2,p2.y+bh-18);
}
ct.textBaseline='alphabetic';
}

function drawGreedy(){
var cv=document.getElementById('greedy-canvas');if(!cv)return;
var dpr=window.devicePixelRatio||1;
var cssW=cv.clientWidth||cv.parentElement.offsetWidth-16;
var cssH=170;
cv.width=cssW*dpr;cv.height=cssH*dpr;
cv.style.width=cssW+'px';cv.style.height=cssH+'px';
var ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
ctx.clearRect(0,0,cssW,cssH);
var words=['The','cat','sat','on','the'];
var probs=[0.42,0.35,0.28,0.55,0.60];
var n=words.length;
var pad=30;
var step=(cssW-pad*2)/(n-1);
var y=cssH/2-10;
var r=22;
for(var i=0;i<n-1;i++){
var x1=pad+i*step,x2=pad+(i+1)*step;
ctx.strokeStyle='#F59E0B';ctx.lineWidth=2.5;
ctx.beginPath();ctx.moveTo(x1+r,y);ctx.lineTo(x2-r,y);ctx.stroke();
}
for(var i=0;i<n;i++){
var x=pad+i*step;
ctx.fillStyle='#F59E0B';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#0D1B2A';ctx.font='bold 13px JetBrains Mono';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(words[i],x,y);
ctx.fillStyle='#94A6BA';ctx.font='12px JetBrains Mono';ctx.textBaseline='alphabetic';
ctx.fillText('p='+probs[i].toFixed(2),x,y+r+18);
}
ctx.fillStyle='#94A6BA';ctx.font='11px Space Grotesk';ctx.textAlign='left';
ctx.fillText('step 1',pad-12,18);
}
function updateBeam(){
var b=parseInt(document.getElementById('beam-slider').value);
document.getElementById('beam-val').textContent=b;
drawBeam(b);
}
function drawBeam(B){
var cv=document.getElementById('beam-canvas');if(!cv)return;
var dpr=window.devicePixelRatio||1;
var cssW=cv.clientWidth||cv.parentElement.offsetWidth-16;
var cssH=200;
cv.width=cssW*dpr;cv.height=cssH*dpr;
cv.style.width=cssW+'px';cv.style.height=cssH+'px';
var ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
ctx.clearRect(0,0,cssW,cssH);
var beamData=[
[{t:'The',p:0.42},{t:'A',p:0.30},{t:'One',p:0.15},{t:'My',p:0.08},{t:'That',p:0.05}],
[{t:'cat',p:0.35},{t:'dog',p:0.25},{t:'bird',p:0.20},{t:'old',p:0.12},{t:'big',p:0.08}],
[{t:'sat',p:0.40},{t:'ran',p:0.30},{t:'flew',p:0.15},{t:'was',p:0.10},{t:'is',p:0.05}]
];
var steps=3;
var pad=40;
var stepW=(cssW-pad*2)/(steps-1);
var topPad=30,botPad=20;
var r=20;
ctx.fillStyle='#94A6BA';ctx.font='12px Space Grotesk';ctx.textAlign='center';ctx.textBaseline='alphabetic';
for(var s=0;s<steps;s++){ctx.fillText('step '+(s+1),pad+s*stepW,16)}
var nodes=[];
for(var step=0;step<steps;step++){
var nb=Math.min(B,beamData[step].length);
var rowH=(cssH-topPad-botPad)/Math.max(nb,1);
var stepNodes=[];
for(var bi=0;bi<nb;bi++){
var x=pad+step*stepW;
var y=topPad+rowH*(bi+0.5);
stepNodes.push({x:x,y:y,t:beamData[step][bi].t});
}
nodes.push(stepNodes);
}
for(var step=1;step<steps;step++){
var prev=nodes[step-1],cur=nodes[step];
for(var i=0;i<prev.length;i++)for(var j=0;j<cur.length;j++){
ctx.strokeStyle=i===j?'rgba(0,212,170,0.5)':'rgba(0,212,170,0.15)';
ctx.lineWidth=i===j?2:1;
ctx.beginPath();ctx.moveTo(prev[i].x+r,prev[i].y);ctx.lineTo(cur[j].x-r,cur[j].y);ctx.stroke();
}
}
for(var step=0;step<steps;step++){
for(var bi=0;bi<nodes[step].length;bi++){
var nd=nodes[step][bi];
ctx.fillStyle='rgba(0,212,170,0.85)';
ctx.beginPath();ctx.arc(nd.x,nd.y,r,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#0D1B2A';ctx.font='bold 13px JetBrains Mono';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(nd.t,nd.x,nd.y);
}
}
}

var promptStrats=[
{name:'Zero-Shot',def:'Just ask. No examples, no preamble \u2014 you trust the model to know the task from its pre-training.',intuition:'Works because modern LLMs have seen millions of similar tasks during training. The simplest prompt that could possibly work \u2014 always start here.',prompt:'Classify the sentiment of this review:\n"The product broke after two days."\nAnswer: Positive / Negative / Neutral',response:'Negative',when:'Common, well-defined tasks (sentiment, summarization, translation, simple Q&A).',pitfall:'Fails on unusual formats, niche domains, or tasks that need a specific output structure.'},
{name:'Few-Shot',def:'Show 2\u20134 input \u2192 output examples before the real input. The model imitates the pattern.',intuition:'You\u2019re teaching the model the format and tone <i>by demonstration</i>, not by description. Surprisingly powerful: even bad descriptions plus good examples beat perfect descriptions alone.',prompt:'Review: "Amazing quality!" \u2192 Positive\nReview: "Terrible experience." \u2192 Negative\nReview: "It\u2019s okay I guess." \u2192 Neutral\nReview: "The product broke after two days." \u2192',response:'Negative',when:'When output format is unusual, when zero-shot wanders, or when you need consistent style.',pitfall:'Each demo costs tokens. The model also picks up on accidental patterns in your examples \u2014 be careful what you demonstrate.'},
{name:'Chain-of-Thought',def:'Tell the model to <b>think step by step</b> before answering. Reasoning becomes part of the output.',intuition:'LLMs predict one token at a time. Forcing them to write the intermediate steps gives them more "compute" and a scratchpad \u2014 they get math and logic problems right that they would otherwise blow.',prompt:'Q: A train travels 120km at 60km/h then 80km at 40km/h.\nWhat is the average speed?\n\nThink step by step before answering.',response:'Step 1: Time for first leg = 120/60 = 2 hours\nStep 2: Time for second leg = 80/40 = 2 hours\nStep 3: Total distance = 200km, Total time = 4h\nStep 4: Average speed = 200/4 = 50 km/h',when:'Math, logic, multi-step reasoning, anything where the answer needs to be <i>derived</i> rather than recalled.',pitfall:'Adds tokens and latency. Skip for simple lookups. Reasoning models (o1, o3) do this automatically \u2014 you do not need to ask.'},
{name:'System/Role',def:'Use the <span class="mono">system</span> message to set persona, tone, and hard rules. The user message is the actual task.',intuition:'The system prompt persists across the whole conversation. Think of it as the model\u2019s job description \u2014 set it once, and every response inherits it.',prompt:'SYSTEM:\nYou are a senior security engineer.\nCite line numbers, name vulnerability type,\nsuggest a fix. Never say "looks fine."\n\nUSER:\nReview this auth function: [code]',response:'Line 12: SQL Injection vulnerability.\nUser input concatenated into query string.\nFix: Use parameterized queries.',when:'Production apps that need a consistent persona, format, or set of constraints across many calls.',pitfall:'<b>System prompt is NOT a security boundary.</b> Users can still jailbreak it with clever inputs. Treat it as guidance, not a wall.'},
{name:'Prompt Chaining',def:'Break a hard task into a pipeline of smaller prompts. The output of one becomes the input of the next.',intuition:'A single prompt that does too much is unreliable. Chains of 3\u20135 simpler prompts \u2014 each focused on one job \u2014 are dramatically more accurate, and each step is independently testable.',prompt:'Step 1: Extract claims from document \u2192\nStep 2: Fact-check each claim \u2192\nStep 3: Format as structured report \u2192\nStep 4: Generate executive summary',response:'[Chain produces validated, structured output]',when:'Complex workflows: research, code review, multi-stage data extraction, agentic systems.',pitfall:'Errors compound across steps. Add validation between stages. Latency = sum of all calls.'},
{name:'Self-Consistency',def:'Run the same prompt N times at temperature > 0, then aggregate (vote, median, ensemble).',intuition:'When the model is right, it tends to be right consistently. When it is guessing, the answers diverge. Majority vote across runs filters out one-off mistakes \u2014 a kind of poor man\u2019s ensembling.',prompt:'Generate 3 answers at T=1.0:\n\u2192 Answer A: 42\n\u2192 Answer B: 42\n\u2192 Answer C: 38\n\nMajority vote: 42',response:'Final answer: 42 (2/3 agreement)',when:'High-stakes math, factual or reasoning tasks where being right matters more than being cheap.',pitfall:'N\u00D7 the token cost. Reserve for the small fraction of calls where accuracy is critical.'}

var currentProvider='anthropic';
function initAPI(){
var bar=document.getElementById('api-provider-bar');
if(bar){bar.innerHTML='';var keys=Object.keys(apiProviders);
for(var k=0;k<keys.length;k++){
var key=keys[k],pr=apiProviders[key];
var b=document.createElement('button');
b.className='btn btn-outline';
b.style.cssText='font-size:14.5px;padding:9px 18px;font-weight:600;'+(key===currentProvider?'background:'+pr.gradient+';border-color:transparent;color:#fff':'border-color:'+pr.color+';color:'+pr.color);
b.textContent=pr.label;
b.setAttribute('data-prov',key);
b.onclick=(function(kk){return function(){switchAPIProvider(kk)}})(key);
bar.appendChild(b);
}}
renderAPI();
updateCost();
}
function switchAPIProvider(key){
currentProvider=key;
initAPI();
}
function renderAPI(){
var pr=apiProviders[currentProvider];
var el=document.getElementById('api-code');var html='';
for(var i=0;i<pr.lines.length;i++){
if(pr.lines[i].note){
html+='<span class="hl-line" onclick="showAPINote('+i+')">'+escHTML(pr.lines[i].code)+'</span>\n';
}else{
html+=escHTML(pr.lines[i].code)+'\n';
}
}
el.innerHTML=html;
document.getElementById('api-explain').innerHTML=pr.defaultIntro;
}
function showAPINote(idx){
var pr=apiProviders[currentProvider];
var note=pr.lines[idx].note;
if(!note)return;
document.getElementById('api-explain').innerHTML='<div style="font-size:11.5px;color:'+pr.color+';text-transform:uppercase;letter-spacing:0.6px;font-weight:700;margin-bottom:8px">'+pr.label+' \u00B7 line '+(idx+1)+'</div><div style="font-size:14.5px;line-height:1.7;color:#F0F4F8">'+note+'</div>';
}
function escHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function updateCost(){
var pr=apiProviders[currentProvider];
var inp=parseInt(document.getElementById('cost-in').value);
var out=parseInt(document.getElementById('cost-out').value);
document.getElementById('cost-in-val').textContent=inp;
document.getElementById('cost-out-val').textContent=out;
var lbl=document.getElementById('cost-provider-label');
if(lbl)lbl.textContent='\u00B7 '+pr.priceNote;
var modelKeys=Object.keys(pr.prices);
var html='<div style="display:flex;gap:14px;flex-wrap:wrap">';
for(var i=0;i<modelKeys.length;i++){
var mk=modelKeys[i],mp=pr.prices[mk];
var cost=(inp*mp.in+out*mp.out)/1000000;
html+='<div style="display:flex;align-items:center;gap:8px"><span class="pill '+mp.color+'">'+mk+'</span><span class="mono" style="color:#F0F4F8;font-size:14px">$'+cost.toFixed(4)+'</span></div>';
}
html+='</div>';
document.getElementById('cost-result').innerHTML=html;
}

// S14 Token counter
function countTokens(){
var text=document.getElementById('token-input').value;
var chars=text.length;
var tokens=Math.ceil(chars/4);
var haiku=((tokens*0.80)/1000000).toFixed(6);
var sonnet=((tokens*3.00)/1000000).toFixed(6);
var opus=((tokens*15.00)/1000000).toFixed(6);
var remaining=4096-tokens;
var color=(remaining<0?'var(--red)':remaining<500?'var(--amber)':'var(--teal)');
var ratio=chars>0?(chars/Math.max(tokens,1)).toFixed(2):'\u2014';
document.getElementById('token-stats').innerHTML=
'<div style="display:grid;grid-template-columns:auto 1fr;gap:6px 18px;font-size:15px">'+
'<div style="color:#94A6BA">Characters</div><div><b style="font-size:17px">'+chars.toLocaleString()+'</b></div>'+
'<div style="color:#94A6BA">Approx tokens</div><div><b style="font-size:17px;color:var(--teal)">'+tokens.toLocaleString()+'</b> <span style="color:#94A6BA;font-size:13px">(~'+ratio+' chars/token)</span></div>'+
'<div style="color:#94A6BA">Est. input cost</div><div style="font-size:14px"><span class="pill pill-green">Haiku</span> <span class="mono">$'+haiku+'</span> &nbsp; <span class="pill pill-blue">Sonnet</span> <span class="mono">$'+sonnet+'</span> &nbsp; <span class="pill pill-purple">Opus</span> <span class="mono">$'+opus+'</span></div>'+
'<div style="color:#94A6BA">Budget remaining</div><div><b style="font-size:17px;color:'+color+'">'+remaining.toLocaleString()+'</b> <span style="color:#94A6BA;font-size:13px">/ 4096 ctx</span></div>'+
'</div>'+
'<div style="font-size:13px;color:#94A6BA;margin-top:14px;line-height:1.6;padding:10px 12px;background:rgba(255,255,255,0.03);border-left:3px solid var(--teal);border-radius:4px"><b>Rule of thumb:</b> 1 token \u2248 4 chars in English \u2248 0.75 words. A typical prompt + history can easily reach 1,000\u20135,000 input tokens \u2014 multiply by your traffic to get the bill.</div>';
}

{bad:'Unstructured mixed prompt with context, task, examples, and constraints all jumbled together',good:'<context>\u2026 background docs \u2026</context>\n<task>\u2026 what to do \u2026</task>\n<constraints>\u2026 rules \u2026</constraints>\n<examples>\u2026 demos \u2026</examples>',why:'XML-style tags create unambiguous sections the model parses cleanly. Anthropic explicitly trains Claude to recognise them; OpenAI and Gemini handle them just as well. It also makes <i>your</i> prompts easier to template and diff.',principle:'Structure your prompt like code'},
{bad:'\u201CWhat is the capital of Atlantis?\u201D \u2014 with no uncertainty handling',good:'Add an explicit out: \u201CIf you are not confident, say \u2018I don\u2019t know\u2019 instead of guessing. Do not invent facts.\u201D',why:'Models default to giving an answer because that\u2019s what training data rewarded. Without an explicit permission to say \u201CI don\u2019t know,\u201D they fabricate confidently. One sentence cuts hallucinations dramatically.',principle:'Give the model permission to refuse'},
{bad:'One long run-on instruction paragraph that asks for several things at once',good:'Break it into numbered steps:\n1. Extract the key claims.\n2. Rank them by importance.\n3. Format the top 3 as bullets.',why:'Numbered steps act like a checklist. The model is far more likely to do every item, in order, when each step is explicit. This also lets you debug \u2014 if step 2 fails, you know exactly where.',principle:'Numbered steps = better compliance'},
{bad:'Few-shot examples that only show happy-path inputs',good:'Include 1\u20132 edge cases in your examples: empty input, malformed input, ambiguous input, multi-language input.',why:'The model imitates the distribution of your demos. If you only show clean inputs, it assumes that\u2019s all it will ever see and panics on edge cases. Show it how to handle weirdness explicitly.',principle:'Demonstrate the failure modes you want handled'}
];

'<div style="font-size:13.5px;line-height:1.6;color:#D6DEE8;margin-bottom:10px"><b style="color:var(--amber)">Why it works: </b>'+flipData[i].why+'</div>'+
'<div style="margin-top:auto;padding-top:8px;font-size:12px;color:var(--amber);text-transform:uppercase;letter-spacing:0.6px;font-weight:700">\u2192 '+flipData[i].principle+'</div>'+
'</div>'+
'</div></div>';
