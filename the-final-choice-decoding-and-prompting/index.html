// S16 Failure modes
var failures=[
{name:'Hallucination',icon:'\uD83C\uDFAD',symptom:'Model confidently states things that are simply false \u2014 fabricated citations, invented APIs, made-up dates.',cause:'LLMs are next-token predictors, not databases. When a fact isn\u2019t strongly represented in their training data, they fill the gap with the <i>most plausible-sounding</i> continuation. Fluency is rewarded during training; truthfulness is not, directly.',fix:'(1) Give the model an explicit out: <span class="mono">\u201CIf not certain, say \u2018I don\u2019t know.\u2019\u201D</span>  (2) Drop temperature to 0 for factual tasks.  (3) Use RAG so the model retrieves real sources before answering.  (4) Ask for citations and verify them.',param:'T=0  \u00B7  RAG  \u00B7  \u201Cdon\u2019t guess\u201D'},
{name:'Sycophancy',icon:'\uD83E\uDE9E',symptom:'Model flips its answer the moment you push back \u2014 even when it was originally correct. \u201COh you\u2019re right, sorry, the answer is \u2026\u201D',cause:'RLHF (reinforcement learning from human feedback) trains the model to maximise user approval. Disagreeing with users gets penalised in the reward signal, so the model learns to fold under pressure.',fix:'Set the rule explicitly in the system prompt: <span class="mono">\u201CBe honest even if it contradicts me. I prefer accuracy over agreement. If I\u2019m wrong, say so and explain why.\u201D</span>  Re-state it whenever you notice agreement that feels too easy.',param:'Honesty system prompt'},
{name:'Verbosity',icon:'\uD83D\uDCDC',symptom:'You ask one question and get three paragraphs of preamble, caveats, and a numbered list. \u201CCertainly! Here is a comprehensive overview\u2026\u201D',cause:'Training rewards completeness-signaling \u2014 longer answers <i>look</i> more thorough to human raters, so the model learned to pad. There\u2019s also a real cost: every extra output token is the most expensive token type.',fix:'(1) Be specific in the prompt: <span class="mono">\u201CBe concise. One sentence. No preamble.\u201D</span>  (2) Set <span class="mono">max_tokens</span> to a tight cap.  (3) Show 1\u20132 short-answer demos in few-shot. The model imitates length.',param:'max_tokens=100  \u00B7  \u201Cno preamble\u201D'},
{name:'Instruction Ignoring',icon:'\uD83D\uDE48',symptom:'You wrote a long prompt with a critical rule (\u201Cnever mention pricing\u201D) and the model breaks it anyway.',cause:'The \u201Clost in the middle\u201D effect: attention is strongest at the very start and very end of the prompt. Anything buried in the middle of a long instruction block gets quietly down-weighted.',fix:'(1) Put the most important rule on the <b>last line</b> before the user input.  (2) Repeat critical constraints twice, top and bottom.  (3) Use UPPERCASE or <span class="mono">&lt;important&gt;</span> tags for hard rules.  (4) Shorten the prompt overall.',param:'Restructure  \u00B7  recency'},
{name:'Context Amnesia',icon:'\uD83D\uDCAD',symptom:'Long conversation drifts \u2014 the model forgets details from 20 messages ago, contradicts earlier facts, or repeats itself.',cause:'LLMs are <b>stateless</b>. Every turn re-sends the whole history, but eventually you exceed the context window (or pay enormous token costs). Older tokens get dropped or summarised away.',fix:'(1) Periodically <i>summarise</i> the conversation and replace older messages with the summary.  (2) Use retrieval (RAG) over a memory store for long-term facts.  (3) Design interactions to be stateless when possible \u2014 each call self-contained.',param:'Rolling summary  \u00B7  RAG memory'},
{name:'Format Inconsistency',icon:'\uD83C\uDFB2',symptom:'You asked for JSON. Sometimes you get JSON, sometimes you get JSON in a markdown code fence, sometimes a sentence followed by JSON.',cause:'Without an explicit schema, the model uses its own \u201Cjudgment\u201D about what looks helpful. Different prompts in your training data produced different formats, so the model samples among them.',fix:'(1) Show the exact schema in the prompt, with example values.  (2) Use the provider\u2019s structured-output / JSON-mode flag.  (3) Set <span class="mono">temperature=0</span>.  (4) Wrap with retry-and-validate logic so malformed outputs are auto-retried.',param:'T=0  \u00B7  JSON mode  \u00B7  schema'}
];
function initFailures(){
var g=document.getElementById('failure-grid');g.innerHTML='';
for(var i=0;i<failures.length;i++){
var f=failures[i];
g.innerHTML+='<div class="expand-card" onclick="this.classList.toggle(\'expanded\')">'+
'<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><span style="font-size:28px">'+f.icon+'</span><b style="font-size:18px;font-weight:700;color:#F0F4F8">'+f.name+'</b></div>'+
'<div style="font-size:14.5px;color:#D6DEE8;line-height:1.6">'+f.symptom+'</div>'+
'<div style="font-size:12px;color:var(--teal);margin-top:10px;font-weight:600;letter-spacing:0.4px">\u2192 Click to expand</div>'+
'<div class="ec">'+
'<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-size:14px;line-height:1.65">'+
'<div style="margin-bottom:12px"><div style="color:var(--red);font-size:11.5px;text-transform:uppercase;letter-spacing:0.6px;font-weight:700;margin-bottom:6px">Root cause</div><div style="color:#D6DEE8">'+f.cause+'</div></div>'+
'<div style="margin-bottom:12px"><div style="color:var(--teal);font-size:11.5px;text-transform:uppercase;letter-spacing:0.6px;font-weight:700;margin-bottom:6px">How to fix</div><div style="color:#D6DEE8">'+f.fix+'</div></div>'+
'<div><div style="color:var(--amber);font-size:11.5px;text-transform:uppercase;letter-spacing:0.6px;font-weight:700;margin-bottom:6px">Quick lever</div><div style="color:var(--amber);font-family:\'JetBrains Mono\',monospace;font-size:13.5px">'+f.param+'</div></div>'+
'</div></div></div>';
}
}

// S17 Prompt Builder
var wbExamples=[];
var templates=[
{system:'You are a document summarizer. Extract key points concisely. Use bullet points. Never add information not in the source.',instruction:'Summarize the following document in 5 bullet points:',constraints:['Be concise','No preamble','Cite uncertainty'],examples:[{input:'[Long research paper about transformers]',output:'\u2022 Introduces self-attention mechanism\n\u2022 Eliminates recurrence entirely\n\u2022 Achieves SOTA on translation'}]},
{system:'You are a senior code reviewer. Be specific: cite line numbers, name the issue type, suggest a fix. Never say "looks fine" without checking all inputs.',instruction:'Review this code for bugs, security issues, and improvements:',constraints:['Use specific format','Break into steps'],examples:[{input:'def login(user, pw):\n  query = f"SELECT * FROM users WHERE name=\'{user}\'"',output:'Line 2: SQL Injection. Use parameterized queries.'}]},
{system:'You are a research assistant specializing in AI/ML. Always cite sources. Distinguish established facts from speculation.',instruction:'Research and summarize the current state of:',constraints:['Be concise','Cite uncertainty','Use specific format'],examples:[]}
];
var defaultConstraints=['Be concise','No preamble','Cite uncertainty','Use specific format','Break into steps'];
function initWorkbench(){
wbExamples=[];
var cel=document.getElementById('wb-constraints');cel.innerHTML='';
for(var i=0;i<defaultConstraints.length;i++){
cel.innerHTML+='<label style="display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;font-size:14.5px;color:#D6DEE8"><input type="checkbox" onchange="buildPrompt()" value="'+defaultConstraints[i]+'" style="accent-color:var(--teal);width:18px;height:18px"> '+defaultConstraints[i]+'</label>';
}
document.getElementById('wb-examples').innerHTML='';
buildPrompt();
}
function loadTemplate(idx){
var t=templates[idx];
document.getElementById('wb-system').value=t.system;
document.getElementById('wb-instruction').value=t.instruction;
wbExamples=t.examples.slice();
renderExamples();
var checks=document.querySelectorAll('#wb-constraints input[type=checkbox]');
for(var i=0;i<checks.length;i++){
checks[i].checked=t.constraints.indexOf(checks[i].value)>=0;
}
buildPrompt();
}
function addExample(){
wbExamples.push({input:'',output:''});renderExamples();
}
function renderExamples(){
var el=document.getElementById('wb-examples');el.innerHTML='';
for(var i=0;i<wbExamples.length;i++){
el.innerHTML+='<div style="margin-bottom:10px"><div style="font-size:13px;color:#94A6BA;font-weight:600;margin-bottom:6px">Example '+(i+1)+':</div><input type="text" placeholder="Input \u2026" value="'+escHTML(wbExamples[i].input)+'" onchange="wbExamples['+i+'].input=this.value;buildPrompt()" style="width:100%;background:var(--navy);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--white);font-size:13.5px;margin-bottom:5px"><input type="text" placeholder="Expected output \u2026" value="'+escHTML(wbExamples[i].output)+'" onchange="wbExamples['+i+'].output=this.value;buildPrompt()" style="width:100%;background:var(--navy);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--white);font-size:13.5px"></div>';
}
}
function buildPrompt(){
var sys=document.getElementById('wb-system').value;
var inst=document.getElementById('wb-instruction').value;
var checks=document.querySelectorAll('#wb-constraints input:checked');
var cons=[];for(var i=0;i<checks.length;i++)cons.push(checks[i].value);
var prompt='';
if(sys)prompt+='[SYSTEM]\n'+sys+'\n\n';
if(wbExamples.length>0){
prompt+='[EXAMPLES]\n';
for(var i=0;i<wbExamples.length;i++){
if(wbExamples[i].input)prompt+='Input: '+wbExamples[i].input+'\n';
if(wbExamples[i].output)prompt+='Output: '+wbExamples[i].output+'\n';
}
prompt+='\n';
}
if(inst)prompt+='[INSTRUCTION]\n'+inst+'\n';
if(cons.length)prompt+='\n[CONSTRAINTS]\n'+cons.join('\n')+'\n';
document.getElementById('wb-output').textContent=prompt;
var tokens=Math.ceil(prompt.length/4);
document.getElementById('wb-tokens').innerHTML='~<b>'+tokens+'</b> tokens';
}
function copyPrompt(){
var text=document.getElementById('wb-output').textContent;
navigator.clipboard.writeText(text).then(function(){
document.getElementById('wb-tokens').textContent='Copied!';
setTimeout(buildPrompt,1500);
});
}

// S18 Advanced Patterns
function initAdvanced(){
var panels=[
{name:'RAG (Retrieval-Augmented Generation)',color:'var(--teal)',problem:'LLMs have a knowledge cutoff. They can\'t access your private documents.',solution:'Before calling the LLM, retrieve relevant documents and inject into context.',flow:'User Query \u2192 Embedding Model \u2192 Vector DB Search \u2192 Top-K Docs \u2192 Inject into Prompt \u2192 LLM Response',insight:'RAG separates knowledge (your database) from reasoning (the LLM). Update the database, not the model.',code:'docs = vector_db.search(embed(query), k=5)\nprompt = f"Context: {docs}\\nQuestion: {query}"\nresponse = llm.generate(prompt)'},
{name:'Function Calling / Tool Use',color:'var(--blue)',problem:'LLMs can\'t take actions \u2014 they only generate text.',solution:'Define tools the model can call. Model generates structured JSON, your code executes it.',flow:'User \u2192 LLM \u2192 Tool Call JSON \u2192 Your Code Executes \u2192 Result \u2192 LLM \u2192 Final Response',insight:'Tool use transforms a chatbot into an agent. This is the foundation of Week 6.',code:'tools = [{"name":"get_weather","params":{"city":"string"}}]\n# LLM outputs: {"tool":"get_weather","args":{"city":"Colombo"}}\nresult = get_weather("Colombo")  # 28\u00B0C'},
{name:'Prompt Chaining',color:'var(--purple)',problem:'Complex tasks exceed single-prompt reliability.',solution:'Pipeline \u2014 output of one prompt becomes input to the next. Add validation between steps.',flow:'Step 1: Extract \u2192 Step 2: Validate \u2192 Step 3: Format \u2192 Step 4: Summarize',insight:'Chaining trades single-call simplicity for multi-step reliability. When accuracy > latency, chain.',code:'claims = llm("Extract claims from: " + doc)\nfacts = llm("Fact-check: " + claims)\nreport = llm("Format as report: " + facts)'}
];
var el=document.getElementById('adv-panels');el.innerHTML='';
for(var i=0;i<panels.length;i++){
var p=panels[i];
el.innerHTML+='<div class="expand-card" onclick="this.classList.toggle(\'expanded\')"><div style="display:flex;justify-content:space-between;align-items:center"><b style="color:'+p.color+';font-size:14px">'+p.name+'</b><span style="font-size:11px;color:var(--muted)">Click to expand</span></div><div class="ec" style="padding-top:10px"><div style="font-size:12px;margin-bottom:8px"><span style="color:var(--red)">Problem:</span> '+p.problem+'</div><div style="font-size:12px;margin-bottom:8px"><span style="color:var(--teal)">Solution:</span> '+p.solution+'</div><div class="code-block" style="font-size:11px;margin-bottom:8px">'+p.flow+'</div><div class="code-block" style="font-size:11px;margin-bottom:8px">'+p.code+'</div><div class="insight">'+p.insight+'</div></div></div>';
}
}

// Draw encoder bidirectional attention
function drawEncAttn(){
var cv=document.getElementById('enc-attn-canvas');if(!cv)return;
var ctx=cv.getContext('2d');
var W=cv.width,H=cv.height;
var pad=42,n=4;var grid=Math.min(W,H)-pad-8;var cell=grid/n;var ox=pad,oy=8;
ctx.clearRect(0,0,W,H);
var tokens=['The','cat','sat','on'];
for(var i=0;i<n;i++)for(var j=0;j<n;j++){
ctx.fillStyle=i===j?'rgba(0,212,170,0.85)':'rgba(0,212,170,0.45)';
ctx.fillRect(ox+j*cell+1,oy+i*cell+1,cell-2,cell-2);
ctx.fillStyle='#0D1B2A';ctx.font='bold 11px JetBrains Mono';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText('\u2713',ox+j*cell+cell/2,oy+i*cell+cell/2);
}
ctx.fillStyle='#F0F4F8';ctx.font='bold 11px JetBrains Mono';ctx.textAlign='center';ctx.textBaseline='alphabetic';
for(var j=0;j<n;j++)ctx.fillText(tokens[j],ox+j*cell+cell/2,oy+grid+18);
ctx.textAlign='right';ctx.textBaseline='middle';
for(var i=0;i<n;i++)ctx.fillText(tokens[i],ox-6,oy+i*cell+cell/2);
ctx.fillStyle='var(--muted)';ctx.fillStyle='#64748B';ctx.font='10px Space Grotesk';
ctx.textAlign='center';ctx.textBaseline='alphabetic';
ctx.fillText('to (key)',ox+grid/2,oy+grid+34);
ctx.save();ctx.translate(10,oy+grid/2);ctx.rotate(-Math.PI/2);
ctx.fillText('from (query)',0,0);ctx.restore();
}

function onSlideEnter(n){
switch(n){

case 4:drawTrans();break;

case 10:updateTopP();break;
case 11:drawGreedy();break;
case 12:drawBeam(3);break;

case 15:initPromptTabs();break;
