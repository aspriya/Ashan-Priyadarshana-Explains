<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1A2F"/>
      <stop offset="60%" stop-color="#0D2440"/>
      <stop offset="100%" stop-color="#0A1A2F"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#A6F4E2"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FFFFFF" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- left teal accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#00D4AA"/>

  <!-- decorative probability-distribution bars (right side) -->
  <g transform="translate(780,180)" opacity="0.85">
    <rect x="0"   y="180" width="36" height="60"  rx="4" fill="#00D4AA" opacity="0.35"/>
    <rect x="46"  y="120" width="36" height="120" rx="4" fill="#00D4AA" opacity="0.55"/>
    <rect x="92"  y="40"  width="36" height="200" rx="4" fill="#00D4AA" opacity="0.95"/>
    <rect x="138" y="90"  width="36" height="150" rx="4" fill="#4C9BE8" opacity="0.75"/>
    <rect x="184" y="150" width="36" height="90"  rx="4" fill="#4C9BE8" opacity="0.5"/>
    <rect x="230" y="190" width="36" height="50"  rx="4" fill="#A78BFA" opacity="0.4"/>
    <rect x="276" y="210" width="36" height="30"  rx="4" fill="#A78BFA" opacity="0.3"/>
    <!-- arrow pointing to the peak (greedy/argmax) -->
    <path d="M 110 20 L 110 35 M 105 30 L 110 35 L 115 30" stroke="#00D4AA" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text x="110" y="14" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="600" fill="#00D4AA" text-anchor="middle" letter-spacing="1">argmax</text>
  </g>

  <!-- eyebrow -->
  <text x="80" y="135"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="20" font-weight="700" letter-spacing="6"
        fill="#00D4AA">WEEK 05 &#8226; DECODING &amp; PROMPTING</text>

  <!-- main title -->
  <text x="80" y="245"
        font-family="Georgia,'Times New Roman',serif"
        font-size="100" font-weight="800" letter-spacing="-2"
        fill="url(#title)">The Final Choice</text>

  <!-- description -->
  <text x="80" y="320"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="26" font-weight="400" fill="#E5ECF4">
    <tspan x="80" dy="0">Decoding strategies, prompting patterns,</tspan>
    <tspan x="80" dy="36">and the practical engineering behind LLMs.</tspan>
  </text>

  <!-- pill row -->
  <g font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600">
    <g transform="translate(80,420)">
      <rect width="135" height="34" rx="17" fill="rgba(0,212,170,0.15)" stroke="#00D4AA" stroke-opacity="0.5"/>
      <text x="67.5" y="22" text-anchor="middle" fill="#A6F4E2">Temperature</text>
    </g>
    <g transform="translate(228,420)">
      <rect width="80" height="34" rx="17" fill="rgba(76,155,232,0.15)" stroke="#4C9BE8" stroke-opacity="0.5"/>
      <text x="40" y="22" text-anchor="middle" fill="#9DC3F0">Top-P</text>
    </g>
    <g transform="translate(321,420)">
      <rect width="135" height="34" rx="17" fill="rgba(167,139,250,0.15)" stroke="#A78BFA" stroke-opacity="0.5"/>
      <text x="67.5" y="22" text-anchor="middle" fill="#C9B8FB">Beam Search</text>
    </g>
    <g transform="translate(469,420)">
      <rect width="115" height="34" rx="17" fill="rgba(245,158,11,0.15)" stroke="#F59E0B" stroke-opacity="0.5"/>
      <text x="57.5" y="22" text-anchor="middle" fill="#FBC97A">Prompting</text>
    </g>
    <g transform="translate(597,420)">
      <rect width="65" height="34" rx="17" fill="rgba(0,212,170,0.15)" stroke="#00D4AA" stroke-opacity="0.5"/>
      <text x="32.5" y="22" text-anchor="middle" fill="#A6F4E2">API</text>
    </g>
  </g>

  <!-- divider -->
  <line x1="80" y1="510" x2="1120" y2="510" stroke="#FFFFFF" stroke-opacity="0.1"/>

  <!-- presented by -->
  <text x="80" y="552"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="14" font-weight="700" letter-spacing="4"
        fill="#00D4AA">PRESENTED BY</text>

  <text x="80" y="592"
        font-family="Georgia,'Times New Roman',serif"
        font-size="32" font-weight="700"
        fill="#FFFFFF">K.A. Ashan Priyadarshana</text>

  <!-- channel branding (right) -->
  <text x="1120" y="592"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="20" font-weight="600" font-style="italic"
        text-anchor="end" fill="#94A6BA">Ashan Priyadarshana Explains</text>
</svg>
