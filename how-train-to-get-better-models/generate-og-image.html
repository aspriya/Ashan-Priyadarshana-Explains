<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate OG Image</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Fraunces:ital,wght@0,300;0,700;1,300;1,700&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Space Grotesk', sans-serif;
    }

    /* Exact Open Graph dimensions */
    #og-container {
        width: 1200px;
        height: 630px;
        background-color: #0D1B2A;
        position: relative;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* Grid background */
    .grid {
        position: absolute;
        inset: 0;
        background-image: 
            linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 1;
    }

    /* Gradient Glowing orbs */
    .glow-1 {
        position: absolute;
        top: -100px;
        right: -100px;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(0, 212, 170, 0.15) 0%, transparent 70%);
        border-radius: 50%;
        z-index: 1;
    }

    .glow-2 {
        position: absolute;
        bottom: -200px;
        left: -100px;
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, rgba(76, 155, 232, 0.15) 0%, transparent 70%);
        border-radius: 50%;
        z-index: 1;
    }

    /* Content Layout */
    .content {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 80px 100px;
    }

    .week-badge {
        display: inline-block;
        background: rgba(0, 212, 170, 0.1);
        color: #00D4AA;
        padding: 8px 20px;
        border-radius: 30px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 30px;
        border: 1px solid rgba(0, 212, 170, 0.3);
        width: max-content;
    }

    h1 {
        font-family: 'Fraunces', serif;
        font-size: 5.5rem;
        font-weight: 300;
        color: #F8FAFC;
        margin: 0 0 20px 0;
        line-height: 1.1;
        letter-spacing: -0.02em;
    }

    h1 strong {
        font-weight: 700;
        font-style: italic;
        color: #00D4AA;
    }

    .subtitle {
        font-size: 2rem;
        color: #94A3B8;
        margin: 0;
        font-weight: 300;
        max-width: 800px;
        line-height: 1.4;
    }

    .footer {
        position: absolute;
        bottom: 80px;
        left: 100px;
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .avatar {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #4C9BE8, #8B5CF6);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-family: 'Fraunces', serif;
        font-size: 1.8rem;
        font-weight: 700;
    }

    .author-info {
        display: flex;
        flex-direction: column;
    }

    .author-name {
        color: #F8FAFC;
        font-size: 1.2rem;
        font-weight: 600;
    }

    .author-handle {
        color: #00D4AA;
        font-family: 'JetBrains Mono', monospace;
        font-size: 1rem;
    }

    /* Abstract Graphic on the right */
    .graphic {
        position: absolute;
        right: 80px;
        top: 50%;
        transform: translateY(-50%);
        width: 350px;
        height: 350px;
        z-index: 5;
    }

    .curve-svg {
        width: 100%;
        height: 100%;
        overflow: visible;
    }

</style>
</head>
<body>

<div id="og-container">
    <div class="grid"></div>
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="graphic">
        <svg class="curve-svg" viewBox="0 0 200 200">
            <!-- Training loss curve (decreases) -->
            <path d="M 0,20 C 50,50 100,160 200,180" fill="none" stroke="#4C9BE8" stroke-width="4" stroke-dasharray="4 4" />
            <!-- Validation loss curve (U-shape) -->
            <path d="M 0,40 C 60,60 100,220 200,60" fill="none" stroke="#F97316" stroke-width="6" stroke-linecap="round" />
            
            <!-- Nodes/Dots -->
            <circle cx="120" cy="148" r="8" fill="#1A2B3C" stroke="#F97316" stroke-width="4" />
            
            <!-- Label -->
            <text x="50" y="180" fill="#F8FAFC" font-family="Space Grotesk" font-size="12" font-weight="600" opacity="0.8">Bias-Variance</text>
        </svg>
    </div>

    <div class="content">
        <div class="week-badge">WEEK 3</div>
        <h1>The Deep Learning<br><strong>Balance</strong></h1>
        <p class="subtitle">Interactive visualizations for Bias-Variance Tradeoff, Regularization & Optimizers.</p>
    </div>

    <div class="footer">
        <div class="avatar">A</div>
        <div class="author-info">
            <span class="author-name">Ashan Priyadarshana</span>
            <span class="author-handle">Interactive AI Education</span>
        </div>
    </div>
</div>

<script>
    console.log("To generate the image: Right click the container, Inspect, find #og-container in elements, right click it and select 'Capture node screenshot' (Chrome/Edge/Firefox).");
</script>

</body>
</html>
