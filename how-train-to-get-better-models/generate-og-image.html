<!DOCTYPE html>
<html>
<head>
<title>OG Image Generator - Week 3</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Fraunces:ital,wght@0,300;0,700;1,300;1,700&display=swap" rel="stylesheet">
</head>
<body style="background:#222;display:flex;flex-direction:column;align-items:center;padding:40px;font-family:sans-serif;color:#fff">
<h2>OG Image Generator - Week 3</h2>
<p style="color:#aaa;margin-bottom:10px">Wait for fonts to load, click the button to download, then place <strong>og-image.jpg</strong> in this same folder.</p>
<button id="dl" style="margin-bottom:20px;padding:12px 32px;font-size:18px;background:#00D4AA;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:bold">⬇ Download og-image.jpg (WhatsApp Friendly)</button>
<canvas id="c" width="1200" height="630" style="border:1px solid #444; max-width: 100%;"></canvas>

<script>
// Wait for fonts to load before drawing
document.fonts.ready.then(function() {
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');

    // 1. Background
    ctx.fillStyle = '#0D1B2A';
    ctx.fillRect(0, 0, 1200, 630);

    // 2. Subtle Grid
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x < 1200; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 630); ctx.stroke(); }
    for (let y = 0; y < 630; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(1200, y); ctx.stroke(); }

    // 3. Glowing Orbs
    const glow1 = ctx.createRadialGradient(1100, 100, 0, 1100, 100, 500);
    glow1.addColorStop(0, 'rgba(0, 212, 170, 0.15)');
    glow1.addColorStop(1, 'rgba(0, 212, 170, 0)');
    ctx.fillStyle = glow1;
    ctx.fillRect(600, -400, 1000, 1000);

    const glow2 = ctx.createRadialGradient(100, 600, 0, 100, 600, 600);
    glow2.addColorStop(0, 'rgba(76, 155, 232, 0.15)');
    glow2.addColorStop(1, 'rgba(76, 155, 232, 0)');
    ctx.fillStyle = glow2;
    ctx.fillRect(-500, 0, 1200, 1200);

    // 4. Abstract Graphic
    ctx.save();
    ctx.translate(650, 150);
    ctx.scale(2, 2);

    ctx.beginPath();
    ctx.moveTo(0, 20);
    ctx.bezierCurveTo(50, 50, 100, 160, 200, 180);
    ctx.strokeStyle = '#4C9BE8';
    ctx.lineWidth = 4;
    ctx.setLineDash([4, 4]);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0, 40);
    ctx.bezierCurveTo(60, 60, 100, 220, 200, 60);
    ctx.strokeStyle = '#F97316';
    ctx.lineWidth = 6;
    ctx.setLineDash([]);
    ctx.lineCap = 'round';
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(120, 148, 8, 0, Math.PI * 2);
    ctx.fillStyle = '#1A2B3C';
    ctx.fill();
    ctx.strokeStyle = '#F97316';
    ctx.lineWidth = 4;
    ctx.stroke();

    ctx.fillStyle = 'rgba(248, 250, 252, 0.8)';
    ctx.font = '600 14px "Space Grotesk", sans-serif';
    ctx.fillText('Bias-Variance', 50, 180);
    ctx.restore();

    // 5. Typography Content
    ctx.fillStyle = 'rgba(0, 212, 170, 0.1)';
    ctx.beginPath();
    if (ctx.roundRect) {
        ctx.roundRect(100, 100, 105, 36, 18);
    } else {
        ctx.fillRect(100, 100, 105, 36); 
    }
    ctx.fill();
    ctx.strokeStyle = 'rgba(0, 212, 170, 0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    
    ctx.fillStyle = '#00D4AA';
    ctx.font = '600 18px "JetBrains Mono", monospace';
    ctx.fillText('WEEK 3', 123, 124);

    ctx.fillStyle = '#F8FAFC';
    ctx.font = '300 88px "Fraunces", serif';
    ctx.fillText('The Deep Learning', 100, 230);
    
    ctx.fillStyle = '#00D4AA';
    ctx.font = 'italic 700 88px "Fraunces", serif';
    ctx.fillText('Balance', 100, 320);

    ctx.fillStyle = '#94A3B8';
    ctx.font = '300 32px "Space Grotesk", sans-serif';
    ctx.fillText('Interactive visualizations for Bias-Variance Tradeoff,', 100, 400);
    ctx.fillText('Regularization & Optimizers.', 100, 445);

    // 6. Footer (Avatar + Text)
    const avGrad = ctx.createLinearGradient(100, 520, 160, 580);
    avGrad.addColorStop(0, '#4C9BE8');
    avGrad.addColorStop(1, '#8B5CF6');
    ctx.fillStyle = avGrad;
    ctx.beginPath();
    ctx.arc(130, 550, 30, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'white';
    ctx.font = '700 28px "Fraunces", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('A', 130, 550);

    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';

    // Added eLearning.lk text
    ctx.fillStyle = '#F8FAFC';
    ctx.font = '600 22px "Space Grotesk", sans-serif';
    ctx.fillText('Ashan Priyadarshana | eLearning.lk', 180, 545);

    ctx.fillStyle = '#00D4AA';
    ctx.font = '16px "JetBrains Mono", monospace';
    ctx.fillText('Interactive AI Education', 180, 570);

    // 7. Configure Download Button
    document.getElementById('dl').onclick = function() {
        const link = document.createElement('a');
        link.download = 'og-image.jpg';
        // Outputting as JPEG with 0.85 quality (~150-250KB) works for WhatsApp
        link.href = c.toDataURL('image/jpeg', 0.85); 
        link.click();
    };
});
</script>
</body>
</html>
